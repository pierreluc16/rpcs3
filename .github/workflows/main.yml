name: Detect PowerShell Architecture

on: [push, workflow_dispatch]

jobs:
  detect-arch:
    strategy:
      matrix:
        os: [windows-11-arm]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Architecture Detection Script
        shell: pwsh
        run: |
          # 1. Détecter l'architecture de l'OS sous-jacent
          $OSArch = [System.Runtime.InteropServices.RuntimeInformation]::OSArchitecture
          
          # 2. Détecter l'architecture du processus PowerShell actif
          $ProcessArch = [System.Runtime.InteropServices.RuntimeInformation]::ProcessArchitecture
          
          # 3. Détecter l'édition et la version de PowerShell
          $PSEdition = $PSEdition
          $PSVersion = $PSVersionTable.PSVersion

          # Affichage des résultats dans la console GitHub Actions
          Write-Host "=========================================="
          Write-Host "Système d'exploitation : ${{ matrix.os }}"
          Write-Host "Architecture de l'OS    : $OSArch"
          Write-Host "Architecture du Process : $ProcessArch"
          Write-Host "Édition de PowerShell  : $PSEdition"
          Write-Host "Version de PowerShell   : $PSVersion"
          Write-Host "=========================================="

          # Optionnel : Sauvegarder les valeurs dans les variables d'environnement de l'étape
          echo "OS_ARCH=$OSArch" >> $env:GITHUB_ENV
          echo "PROC_ARCH=$ProcessArch" >> $env:GITHUB_ENV
