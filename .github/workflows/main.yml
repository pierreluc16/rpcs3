name: Verify Issue 14067

on:
  workflow_dispatch: # Allows you to trigger it manually from the Actions tab

jobs:
  check-apt-permission:
    # Issue #14067 explicitly occurs on GitHub's Ubuntu 22.04 ARM64 platform
    runs-on: ubuntu-22.04-arm

    steps:
      - name: System Information
        run: |
          echo "=== Runner Architecture ==="
          uname -m
          echo "=== Image Version Info ==="
          cat /etc/os-release

      - name: Add Third Party Apt Repository
        run: |
          # This copies the setup block exactly from the bug report
          echo "deb [trusted=yes] http://t-firefly.com jammy main" | sudo tee /etc/apt/sources.list.d/firefly.list

      - name: Execute Package Index Update
        run: |
          # If the bug is still active, this step will fail with a permission/sandbox error
          sudo apt-get update
