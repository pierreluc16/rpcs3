name: Windows 11 ARM Active Window Test

on:
  workflow_dispatch: # Allows manual trigger from the GitHub Actions dashboard

jobs:
  check-gui-focus:
    name: Identify Active Window
    runs-on: windows-11-arm # Explicitly targets the Windows 11 ARM64 environment

    steps:
      - name: System Diagnostics
        shell: powershell
        run: |
          Write-Host "=== System Architecture ==="
          $env:PROCESSOR_ARCHITECTURE
          Write-Host "=== Windows Version ==="
          [System.Environment]::OSVersion.Version

      - name: Wait for Shell Initialization
        shell: powershell
        run: |
          Write-Host "Waiting for the desktop shell environment to settle..."
          Start-Sleep -Seconds 5

      - name: Capture Foreground Window Title
        shell: powershell
        run: |
          # Define the Win32 API functions required to query the window manager
          $code = @'
          [DllImport("user32.dll")]
          public static extern IntPtr GetForegroundWindow();
          [DllImport("user32.dll")]
          public static extern int GetWindowText(IntPtr hWnd, System.Text.StringBuilder text, int count);
          '@
          $API = Add-Type -MemberDefinition $code -Name "Win32GetActiveWindow" -Namespace "Win32" -PassThru
          
          # Retrieve the pointer for the active window
          $handle = $API::GetForegroundWindow()
          $title = New-Object System.Text.StringBuilder 256
          $API::GetWindowText($handle, $title, 256) | Out-Null
          
          $activeTitle = $title.ToString()
          
          Write-Host "--------------------------------------------------"
          Write-Host "The current active window title is: '$activeTitle'"
          Write-Host "--------------------------------------------------"
          
          # Automated test validation
          if ([string]::IsNullOrEmpty($activeTitle)) {
             Write-Host "Notice: The foreground window has an empty title (common for desktop or worker shells)."
          } elseif ($activeTitle -match "Privacy" -or $activeTitle -match "Experience" -or $activeTitle -match "OOBE") {
             Write-Error "Test Alert: A setup dialog or privacy window is intercepting focus!"
             exit 1
          } else {
             Write-Host "Success: Focus tracking is operating normally."
          }
