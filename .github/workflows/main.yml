name: Capture Ubuntu Desktop Screenshot

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to trigger manually from the GitHub UI

jobs:
  take-screenshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Display and Screenshot Tools
        run: |
          sudo apt-get update
          # Xvfb provides the virtual screen, scrot captures it
          sudo apt-get install -y xvfb scrot

      - name: Start Virtual Framebuffer and Run App
        run: |
          # 1. Start Xvfb on display port :99 with a common desktop resolution
          Xvfb :99 -screen 0 1920x1080x24 &
          
          # 2. Export the DISPLAY variable so applications know where to draw
          export DISPLAY=:99
          
          # 3. (Optional) Give Xvfb a moment to fully initialize
          sleep 2
          
          # 4. Launch your application here in the background (Example: an app or browser)
          # google-chrome --no-sandbox http://localhost:3000 & 
          # sleep 5 # Give your app time to load
          
          # 5. Take the full desktop screenshot using scrot
          mkdir -p output
          scrot output/desktop-screenshot.png

      - name: Upload Screenshot Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-desktop-capture
          path: output/desktop-screenshot.png
