name: Capture Windows 11 ARM (Alternative Java AWT)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  screenshot-java:
    runs-on: windows-11-arm

    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Configurer le JDK (Java)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Lancer votre application de bureau
        shell: powershell
        run: |
          # LANCEZ VOTRE LOGICIEL ICI
          # Exemple : Lancer l'Explorateur de fichiers Windows
          Start-Process explorer.exe
          Start-Sleep -Seconds 3

      - name: Compiler et Exécuter le script de capture d'écran
        shell: powershell
        run: |
          # Création du code source Java à la volée
          @"
          import java.awt.Rectangle;
          import java.awt.Robot;
          import java.awt.Toolkit;
          import java.awt.image.BufferedImage;
          import java.io.File;
          import javax.imageio.ImageIO;

          public class CaptureScreen {
              public static void main(String[] args) {
                  try {
                      // Initialiser la classe Robot de gestion de l'affichage OS
                      Robot robot = new Robot();
                      
                      // Détecter automatiquement la taille de l'écran principal
                      Rectangle screenRect = new Rectangle(Toolkit.getDefaultToolkit().getScreenSize());
                      
                      // Capturer les pixels de l'écran
                      BufferedImage screenFullImage = robot.createScreenCapture(screenRect);
                      
                      // Enregistrer l'image sur le disque
                      ImageIO.write(screenFullImage, "png", new File("java-screenshot.png"));
                      
                      System.out.println("Capture d'ecran Java reussie !");
                  } catch (Exception ex) {
                      System.err.println("Erreur : " + ex.getMessage());
                      System.exit(1);
                  }
              }
          }
          "@ | Out-File -FilePath CaptureScreen.java -Encoding utf8

          # Compilation et exécution directe
          javac CaptureScreen.java
          java CaptureScreen

      - name: Télécharger la capture d'écran
        uses: actions/upload-artifact@v4
        with:
          name: capture-java
          path: java-screenshot.png
