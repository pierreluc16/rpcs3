name: Check Architecture Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows manual triggers from the GitHub Actions UI

jobs:
  check-architecture:
    runs-on: windows-11-arm # Targets GitHub-hosted Windows ARM64 runners

    steps:
      - name: Check Out Code
        uses: actions/checkout@v4

      # Forces the runner environment to dynamically fetch and install the latest stable pwsh release
      - name: Install Latest PowerShell
        uses: PSModule/install-powershell@v1
        with:
          Version: latest # Automatically fetches the newest version (e.g., 7.6.x)

      - name: Verify System Architecture
        shell: pwsh 
        run: |
          Write-Host "=== POWERSHELL RUNTIME VERSION ==="
          Write-Host "PowerShell Engine Version: $($PSVersionTable.PSVersion)"
        
          Write-Host "`n=== PYTHON RUNTIME ARCHITECTURE ==="
          python -c "import platform; print(f'Python platform.machine():      {platform.machine()}')"
          python -c "import platform; print(f'Python platform.architecture(): {platform.architecture()}')"
          python -c "import platform; print(f'Python platform.processor():    {platform.processor()}')"
          
          Write-Host "`n=== WINDOWS ENVIRONMENT ARCHITECTURE ==="
          Write-Host "PowerShell `$env:PROCESSOR_ARCHITECTURE: $($env:PROCESSOR_ARCHITECTURE)"
          Write-Host "PowerShell `$env:PROCESSOR_IDENTIFIER:   $($env:PROCESSOR_IDENTIFIER)"
          Write-Host "PowerShell `$PSVersionTable.OS:          $($PSVersionTable.OS)"
