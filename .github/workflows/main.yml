name: Test Issue 14067 (APT Repo Permission ARM64)

on:
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

jobs:
  reproduce-apt-error:
    # IMPORTANT: You must use the dedicated GitHub ARM architecture runner
    runs-on: ubuntu-22.04-arm
    
    steps:
      - name: Check OS Architecture & Environment Info
        run: |
          echo "=== Architecture ==="
          uname -m
          echo "=== User Privileges ==="
          whoami
          id

      - name: Add Third Party Repository (From Issue 14067)
        run: |
          # Injecting the specific repository setup mentioned in the issue
          echo "deb [trusted=yes] http://t-firefly.com jammy main" | sudo tee /etc/apt/sources.list.d/firefly.list

      - name: Run APT Update (The Failing Step)
        run: |
          # This is where the sandbox/directory permission error occurs
          sudo apt-get update
