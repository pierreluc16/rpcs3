name: Check Architecture Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Permet de lancer le workflow manuellement depuis GitHub

jobs:
  check-architecture:
    runs-on: windows-11-arm
    steps:
      - name: Detect System Architecture
        id: detect-arch
        shell: powershell
        run: |
          # Détection native de l'architecture sous Windows
          $Arch = $env:PROCESSOR_ARCHITECTURE.ToLower()
          
          if ($Arch -eq "arm64") {
              Write-Host "Architecture détectée : ARM64"
              echo "ARCH=arm64" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
              Write-Host "Architecture détectée : X64 / Autre ($Arch)"
              echo "ARCH=x64" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }
