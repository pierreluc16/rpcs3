name: Windows 11 ARM Desktop Screenshot

on:
  workflow_dispatch: # Allows manual triggering from your GitHub Actions UI

jobs:
  capture-desktop:
    name: Run and Take Screenshot
    runs-on: windows-11-arm # Target the Windows 11 ARM64 environment image

    steps:
      - name: Wait for Desktop Shell
        shell: powershell
        run: |
          Write-Host "Allowing 5 seconds for the desktop shell to initialize..."
          Start-Sleep -Seconds 5

      - name: Capture Screen via PowerShell and .NET
        shell: powershell
        run: |
          # Load necessary Assemblies for graphics rendering
          Add-Type -AssemblyName System.Windows.Forms
          Add-Type -AssemblyName System.Drawing

          # Detect primary screen dimensions
          $Screen = [System.Windows.Forms.SystemInformation]::VirtualScreen
          $Width  = $Screen.Width
          $Height = $Screen.Height

          Write-Host "Detected Screen Resolution: $Width x $Height"

          # Instantiate bitmap canvas object
          $Bitmap  = New-Object System.Drawing.Bitmap($Width, $Height)
          $Graphic = [System.Drawing.Graphics]::FromImage($Bitmap)

          # Copy display stream contents to bitmap memory canvas
          $Graphic.CopyFromScreen($Screen.Left, $Screen.Top, 0, 0, $Bitmap.Size)

          # Ensure target folder exists and save the output image
          $TargetDir = "$env:GITHUB_WORKSPACE\artifacts"
          if (!(Test-Path $TargetDir)) { New-Item -ItemType Directory -Path $TargetDir | Out-Null }
          
          $OutputPath = "$TargetDir\desktop-screenshot.png"
          $Bitmap.Save($OutputPath, [System.Drawing.Imaging.ImageFormat]::Png)

          # Dispose objects to free system resource allocations
          $Graphic.Dispose()
          $Bitmap.Dispose()
          
          Write-Host "Desktop frame captured successfully at: $OutputPath"

      - name: Upload Screenshot as Pipeline Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-arm-desktop-view
          path: artifacts/desktop-screenshot.png
          if-no-files-found: error
