name: Test Firefly Repository

on:
  workflow_dispatch: # Allows you to trigger the test manually from the GitHub UI

jobs:
  run-repository-test:
    runs-on: ubuntu-22.04-arm # Targets the specific ARM64 host image from issue #14067

    steps:
      - name: Add Firefly repository
        run: |
          echo "deb [trusted=yes] http://wiki.t-firefly.com/firefly-ubuntu-repo jammy main" | sudo tee /etc/apt/sources.list.d/firefly.list
          sudo apt-get update
