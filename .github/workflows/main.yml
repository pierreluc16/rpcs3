name: Windows 11 ARM64 Screenshot

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  screenshot-arm64:
    # Use the Windows ARM64 runner image (currently in public preview)
    runs-on: windows-11-arm

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run GUI App or Tests
        run: |
          echo "Launching your ARM64 application here..."

      - name: Capture Desktop Screenshot
        shell: pwsh # Uses PowerShell Core which is fully optimized for ARM64
        run: |
          # Load necessary .NET assemblies
          Add-Type -AssemblyName System.Windows.Forms
          Add-Type -AssemblyName System.Drawing

          # Detect current ARM64 screen metrics
          $screen = [System.Windows.Forms.Screen]::PrimaryScreen
          $bounds = $screen.Bounds

          # Initialize the graphic canvas
          $bmp = New-Object System.Drawing.Bitmap($bounds.Width, $bounds.Height)
          $graphics = [System.Drawing.Graphics]::FromImage($bmp)

          # Copy the visual screen content
          $graphics.CopyFromScreen($bounds.Location, [System.Drawing.Point]::Empty, $bounds.Size)

          # Save to repository workspace
          $outputPath = "${{ github.workspace }}\arm64-screenshot.png"
          $bmp.Save($outputPath, [System.Drawing.Imaging.ImageFormat]::Png)

          # Free system memory
          $graphics.Dispose()
          $bmp.Dispose()
          Write-Output "Screenshot saved successfully to $outputPath"

      - name: Upload Screenshot Artifact
        uses: actions/upload-artifact@v4
        if: always() # Captures the screen even if your tests fail
        with:
          name: win11-arm64-desktop
          path: arm64-screenshot.png
