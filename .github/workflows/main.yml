name: Check Architecture Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows manual triggers from the GitHub Actions UI

jobs:
  check-architecture:
    runs-on: windows-11-arm # Targets GitHub-hosted Windows ARM64 runners

    steps:
      - name: Check Out Code
        uses: actions/checkout@v4

      # Forces the runner environment to dynamically fetch and install the latest stable pwsh release
      - name: Install Latest PowerShell
        uses: PSModule/install-powershell@v1
        with:
          Version: latest # Automatically fetches the newest version (e.g., 7.6.x)

          steps:
      - name: Check System Architecture
        shell: bash
        run: |
          echo "Python platform.machine(): $(python -c 'import platform; print(platform.machine())')"
          echo "Python platform.architecture(): $(python -c 'import platform; print(platform.architecture())')"
          echo "Python platform.processor(): $(python -c 'import platform; print(platform.processor())')"
          echo "PowerShell \$env:PROCESSOR_ARCHITECTURE: $PROCESSOR_ARCHITECTURE"
          echo "PowerShell \$env:PROCESSOR_IDENTIFIER: $PROCESSOR_IDENTIFIER"
