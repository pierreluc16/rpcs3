name: Capture Windows 11 ARM (Alternative Python Pillow)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  screenshot-python:
    runs-on: windows-11-arm

    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Configurer l'environnement Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances d'imagerie
        shell: powershell
        run: |
          # Pillow utilise l'API ImageGrab native de Windows
          pip install Pillow

      - name: Lancer l'application cible
        shell: powershell
        run: |
          # Exemple : Lancer le WordPad de Windows
          Start-Process write.exe
          Start-Sleep -Seconds 3

      - name: Prendre la capture d'écran via Python
        shell: powershell
        run: |
          python -c "
          from PIL import ImageGrab
          
          # Capture l'intégralité de l'écran principal
          screenshot = ImageGrab.grab()
          
          # Sauvegarde l'image au format PNG
          screenshot.save('python-screenshot.png')
          print('Capture d''écran générée avec succès !')
          "

      - name: Télécharger la capture d'écran
        uses: actions/upload-artifact@v4
        with:
          name: capture-python
          path: python-screenshot.png
