name: Capture Windows Server Desktop

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  screenshot-job:
    runs-on: windows-latest # Resolves to the latest Windows Server runner

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Execute UI Actions
        run: |
          # Insert your UI tests, desktop apps, or commands to capture here
          echo "Starting application context..."

      - name: Capture Desktop Screenshot via PowerShell
        shell: powershell
        run: |
          Add-Type -AssemblyName System.Windows.Forms
          Add-Type -AssemblyName System.Drawing

          # Get total screen bounds
          $screen = [System.Windows.Forms.Screen]::PrimaryScreen
          $bounds = $screen.Bounds

          # Create Bitmap object
          $bmp = New-Object System.Drawing.Bitmap($bounds.Width, $bounds.Height)
          $graphics = [System.Drawing.Graphics]::FromImage($bmp)

          # Copy the raw screen contents
          $graphics.CopyFromScreen($bounds.Location, [System.Drawing.Point]::Empty, $bounds.Size)

          # Ensure target folder exists and save image
          New-Item -ItemType Directory -Force -Path ".\screenshots"
          $outputPath = ".\screenshots\desktop-capture.png"
          $bmp.Save($outputPath, [System.Drawing.Imaging.ImageFormat]::Png)

          # Clean up system resources
          $graphics.Dispose()
          $bmp.Dispose()
          Write-Output "Screenshot successfully saved to $outputPath"

      - name: Upload Screenshot as Build Artifact
        uses: actions/upload-artifact@v4
        if: always() # Ensures the screenshot uploads even if preceding steps fail
        with:
          name: windows-server-screenshot
          path: .\screenshots\desktop-capture.png
