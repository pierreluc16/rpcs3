name: Capture Desktop GUI Screenshot

on: [push]

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # Install Xvfb, a screenshot utility, and any dependencies your app needs
          sudo apt-get install -y xvfb scrot imagemagick

      - name: Run GUI App and Capture Screen
        run: |
          # Start your GUI application in the background using xvfb-run
          # (Replace 'echo "Starting App"' with your executable, e.g., python main.py)
          xvfb-run --server-args="-screen 0 1280x1024x24" your-gui-app &
          
          # Give the application 5 seconds to fully launch and render
          sleep 5
          
          # Capture the full virtual desktop screen
          xvfb-run --server-args="-screen 0 1280x1024x24" scrot desktop-capture.png

      - name: Upload Screenshot Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gui-screenshots
          path: desktop-capture.png
