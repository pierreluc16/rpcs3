name: Test Issue 14069 Tweak

on:
  workflow_dispatch: # Allows manual trigger from the GitHub Actions dashboard

jobs:
  # Test Group 1: Vanilla image behavior
  without-registry-fix:
    name: Default Image Window Focus
    runs-on: windows-11-arm

    steps:
      - name: Wait for Desktop Elements
        shell: powershell
        run: Start-Sleep -Seconds 5

      - name: Check Active Window Title
        shell: powershell
        run: |
          $code = @'
          [DllImport("user32.dll")]
          public static extern IntPtr GetForegroundWindow();
          [DllImport("user32.dll")]
          public static extern int GetWindowText(IntPtr hWnd, System.Text.StringBuilder text, int count);
          '@
          $API = Add-Type -MemberDefinition $code -Name "Win32GetActiveWindow" -Namespace "Win32" -PassThru
          
          $handle = $API::GetForegroundWindow()
          $title = New-Object System.Text.StringBuilder 256
          $API::GetWindowText($handle, $title, 256) | Out-Null
          
          Write-Host "Active Window Title is currently: '$($title.ToString())'"
          
          if ($title.ToString() -match "Privacy" -or $title.ToString() -match "Experience") {
             Write-Host "Warning: The first-run prompt is present and taking focus by default."
          } else {
             Write-Host "No OOBE window detected in focus."
