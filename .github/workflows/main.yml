name: Check R Version

# Triggers the workflow on pushes to the main branch or manually via the GitHub UI
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  check-r:
    runs-on: windows-11-arm

    steps:
      # 1. Check out the repository code onto the runner
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 2. Install the official R environment on the runner
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release' # Installs the latest stable version of R

      # 3. Execute your specific R command
      - name: Print R version details
        run: Rscript -e 'print(R.version)'
