name: Test Windows 11 ARM

on: [push, workflow_dispatch]

jobs:
  check-arm-architecture:
    # On force l'exécution sur une vraie machine virtuelle Windows 11 ARM64 de GitHub
    runs-on: windows-11-arm

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Detect Native ARM Environment
        shell: pwsh
        run: |
          # 1. Vérification de l'architecture de la machine hôte
          $OSArch = $env:PROCESSOR_ARCHITECTURE
          
          # 2. Vérification de la version de Windows
          $OSVersion = (Get-CimInstance Win32_OperatingSystem).Caption

          # 3. Vérification de l'architecture du binaire PowerShell (pwsh) en cours d'exécution
          $ProcessArch = [System.Runtime.InteropServices.RuntimeInformation]::ProcessArchitecture

          Write-Host "=========================================="
          Write-Host "Système d'exploitation : $OSVersion"
          Write-Host "Architecture de l'Hôte : $OSArch"
          Write-Host "Architecture du Process : $ProcessArch"
          Write-Host "=========================================="

          # Le script échouera proprement si nous ne sommes pas sur du ARM64
          if ($OSArch -ne "ARM64") {
              Write-Error "Échec : Ce runner n'est pas configuré en ARM64 !"
              exit 1
          }
