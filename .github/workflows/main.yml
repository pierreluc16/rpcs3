name: Capture Bureau Alternative (XFCE)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  xfce-capture:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Installer les outils graphiques et XFCE Screenshooter
        run: |
          sudo apt-get update
          # xfce4-screenshooter est robuste et conçu spécifiquement pour le bureau Linux
          sudo apt-get install -y xvfb xfce4-screenshooter fluxbox

      - name: Lancer le Bureau et Prendre la Photo
        run: |
          # 1. Initialiser le serveur d'affichage virtuel en Full HD
          Xvfb :99 -screen 0 1920x1080x24 &
          export DISPLAY=:99
          sleep 2

          # 2. Lancer un gestionnaire de fenêtres léger (Fluxbox)
          fluxbox &
          sleep 1

          # 3. LANCEZ VOTRE APPLICATION DE BUREAU ICI
          # Exemple : exécuter votre programme Linux en arrière-plan
          # ./mon-application-desktop &
          # sleep 3

          # 4. Prendre la capture d'écran de tout le bureau (--fullscreen)
          xfce4-screenshooter --fullscreen --save desktop-alternative.png

      - name: Télécharger la capture d'écran
        uses: actions/upload-artifact@v4
        with:
          name: capture-bureau-xfce
          path: desktop-alternative.png
