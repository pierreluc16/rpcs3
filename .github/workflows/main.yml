name: Test Firefly Repository

on:
  workflow_dispatch: # Allows you to run this manually from the GitHub UI

jobs:
  # Test 1: The original failing environment (ARM64)
  test-arm64:
    name: Test on Ubuntu 22.04 ARM64
    runs-on: ubuntu-22.04-arm

    steps:
      - name: Add Firefly repository
        run: |
          echo "deb [trusted=yes] http://wiki.t-firefly.com/firefly-ubuntu-repo jammy main" | sudo tee /etc/apt/sources.list.d/firefly.list
          sudo apt-get update

  # Test 2: The baseline environment (Standard x64)
  test-x64:
    name: Test on Ubuntu 22.04 x64
    runs-on: ubuntu-22.04

    steps:
      - name: Add Firefly repository
        run: |
          echo "deb [trusted=yes] http://wiki.t-firefly.com/firefly-ubuntu-repo jammy main" | sudo tee /etc/apt/sources.list.d/firefly.list
          sudo apt-get update
