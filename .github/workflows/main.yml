name: Capture d'écran via Ruby (Windows ARM64)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  screenshot-ruby:
    runs-on: windows-11-arm

    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Configurer l'environnement Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3' # Version stable de Ruby

      - name: Installer les Gems requis
        shell: powershell
        run: |
          # Cuprite contrôle Chrome via le protocole CDP (Chrome DevTools Protocol)
          gem install capybara cuprite

      - name: Exécuter la capture d'écran via Ruby
        shell: powershell
        run: |
          # Création et exécution du script à la volée
          @"
          require 'capybara/cuprite'

          # Configurer Capybara pour utiliser le pilote Cuprite (Chrome Headless)
          Capybara.register_driver :cuprite do |app|
            Capybara::Cuprite::Driver.new(app, window_size: [1920, 1080], headless: true)
          end

          session = Capybara::Session.new(:cuprite)
          
          # Naviguer vers l'URL souhaitée
          session.visit('https://github.com')
          
          # Prendre la capture d'écran
          session.save_screenshot('ruby-screenshot.png', full: true)
          puts 'Capture d’écran générée avec Ruby avec succès !'
          "@ | Out-File -FilePath capture.rb -Encoding utf8
          
          ruby capture.rb

      - name: Télécharger la capture d'écran
        uses: actions/upload-artifact@v4
        with:
          name: capture-ruby
          path: ruby-screenshot.png
