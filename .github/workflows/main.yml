name: Capture Windows 11 ARM (Alternative Boxcutter)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  screenshot-boxcutter:
    runs-on: windows-11-arm

    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Installer Boxcutter via Chocolatey
        shell: powershell
        run: |
          # Chocolatey est pré-installé sur les runners Windows de GitHub
          choco install boxcutter -y

      - name: Lancer votre application de bureau
        shell: powershell
        run: |
          # LANCEZ VOTRE APPLICATION ICI
          # Exemple : Ouvrir la calculatrice Windows
          Start-Process calc.exe
          Start-Sleep -Seconds 3

      - name: Prendre la capture d'écran du bureau
        shell: powershell
        run: |
          # Capturer tout l'écran et enregistrer sous forme de fichier PNG
          boxcutter -f boxcutter-screenshot.png

      - name: Télécharger la capture d'écran
        uses: actions/upload-artifact@v4
        with:
          name: capture-boxcutter
          path: boxcutter-screenshot.png
