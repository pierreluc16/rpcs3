name: Check System Architecture - Windows 11 ARM

on:
  workflow_dispatch: # Allows you to trigger this workflow manually from the Actions tab

jobs:
  check-architecture:
    runs-on: windows-11-arm # Targets GitHub's hosted Windows 11 ARM64 virtual machines

    steps:
      - name: Delete ARM Python versions (Keep x64)
        shell: pwsh
        run: |
          # Locate the default Python directory in the GitHub hosted toolcache
          $toolcacheDir = "$env:AGENT_TOOLSDIRECTORY\Python"
          
          if (Test-Path $toolcacheDir) {
              # Find and loop through all pre-installed Python version folders
              Get-ChildItem $toolcacheDir -Directory | ForEach-Object {
                  # Check if the folder name specifies an arm or aarch architecture
                  if ($_.Name -like "*arm*" -or $_.Name -like "*aarch*") {
                      Write-Host "Removing native ARM installation folder: $($_.FullName)"
                      Remove-Item -Path $_.FullName -Recurse -Force
                  }
              }
          } else {
              Write-Host "The Python toolcache directory does not exist or is empty."
          }

      - name: Check System Architecture
        shell: bash
        run: |
          echo "Python platform.machine(): $(python -c 'import platform; print(platform.machine())')"
          echo "Python platform.architecture(): $(python -c 'import platform; print(platform.architecture())')"
          echo "Python platform.processor(): $(python -c 'import platform; print(platform.processor())')"
          echo "PowerShell \$env:PROCESSOR_ARCHITECTURE: $PROCESSOR_ARCHITECTURE"
          echo "PowerShell \$env:PROCESSOR_IDENTIFIER: $PROCESSOR_IDENTIFIER"
