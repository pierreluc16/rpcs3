name: Strict Error Verification Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  verify-error:
    runs-on: ubuntu-24.04-arm
    # Uses an isolated container to run Cargo without installing Rust via a setup step
    container:
      image: rust:1.80-slim

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        # Cleared path parameter to fix the nested /rpcs3/rpcs3 Cargo.toml error
        path: ''

    - name: Diagnostic System Sweep
      run: |
        echo "=== Locating any native llvm-config ==="
        which llvm-config || echo "No default llvm-config executable found in PATH."
        find /usr/bin /usr/local/bin -name "llvm-config*" 2>/dev/null || true
        
        echo "=== Locating any native libclang shared libraries ==="
        find /usr/lib /usr/local/lib /lib -name "libclang.so*" 2>/dev/null || true

    - name: Execute Cargo Check
      # Runs directly in the root directory where the codebase was checked out
      run: cargo check -p clang-sys --verbose
