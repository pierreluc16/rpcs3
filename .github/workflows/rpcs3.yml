name: Test LLVM LoadLibraryExW Error Only

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test-reproduction:
    # Target GitHub's official Windows 11 ARM hosted runner
    runs-on: windows-11-arm

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Test Pre-installed libclang (Expect LoadLibrary Failure)
      shell: pwsh
      run: |
        $dllPath = "C:\Program Files\LLVM\bin\libclang.dll"
        Write-Host "Targeting Pre-installed Path: $dllPath"
        
        if (-not (Test-Path $dllPath)) {
            Write-Error "Pre-installed LLVM not found at default location: $dllPath"
            exit 1
        }

        # Define native Windows kernel32 LoadLibraryExW method signature via P/Invoke
        $signature = '[DllImport("kernel32.dll", SetLastError = true, CharSet = CharSet.Unicode)] public static extern IntPtr LoadLibraryExW(string lpLibFileName, IntPtr hFile, uint dwFlags);'
        $type = Add-Type -MemberDefinition $signature -Name "Kernel32" -Namespace "Win32" -PassThru

        Write-Host "Invoking native ARM64 LoadLibraryExW on the emulated x86_64 DLL..."
        # 0x00000008 = LOAD_WITH_ALTERED_SEARCH_PATH (Simulates how rust bindgen / clang-sys loads libraries)
        $handle = $type::LoadLibraryExW($dllPath, [IntPtr]::Zero, 0x00000008)

        if ($handle -eq [IntPtr]::Zero) {
            $errorCode = [System.Runtime.InteropServices.Marshal]::GetLastWin32Error()
            Write-Host "❌ BUG REPRODUCED SUCCESSFULLY!"
            Write-Host "LoadLibraryExW failed precisely as reported in actions/runner-images#14085."
            Write-Host "System Win32 Error Code: $errorCode (Error 193 = ERROR_BAD_EXE_FORMAT / Not a valid Win32 application)"
            
            # Force step failure to mark the test run as failed due to the bug
            exit 1
        } else {
            Write-Host "⚠️ Unexpected Success: The pre-installed library loaded without issue."
            
            # Clean up handle if it unexpectedly passed
            $freeSignature = '[DllImport("kernel32.dll", SetLastError = true)] public static extern bool FreeLibrary(IntPtr hModule);'
            $freeType = Add-Type -MemberDefinition $freeSignature -Name "Kernel32Free" -Namespace "Win32" -PassThru
            $freeType::FreeLibrary($handle) | Out-Null
        }
