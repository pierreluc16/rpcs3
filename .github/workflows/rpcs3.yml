name: Compare Windows Desktop Sessions

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test-desktop:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-11-arm, windows-latest] # Parallel comparison

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pythonnet clr-loader

      - name: Create Test Files
        shell: pwsh
        run: |
          # Simplified .NET 10 config required for the test
          $runtimeJson = @{
              runtimeOptions = @{
                  tfm = "net10.0-windows"
                  frameworks = @(
                      @{ name = "Microsoft.NETCore.App"; version = "10.0.0" },
                      @{ name = "Microsoft.WindowsDesktop.App"; version = "10.0.0" }
                  )
              }
          } | ConvertTo-Json -Depth 5
          Set-Content -Path "runtime.json" -Value $runtimeJson

          # Full Python UI test script to verify interaction
          $demoScript = @'
          import sys
          from pathlib import Path
          import clr_loader
          from pythonnet import set_runtime
          # ... (Python script code from GitHub issue #14049) ...
          '@
          Set-Content -Path "demo.py" -Value $demoScript

      - name: Execute UI Test
        run: python demo.py
