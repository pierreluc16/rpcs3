name: Build and Use Latest Podman, Buildah and Skopeo (Ubuntu 26.04)

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build-and-run:
    runs-on: ubuntu-26.04
        
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Ubuntu 26.04 Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          golang-github-containers-common \
          btrfs-progs \
          git \
          golang-go \
          go-md2man \
          libassuan-dev \
          libbtrfs-dev \
          libc6-dev \
          libdevmapper-dev \
          libglib2.0-dev \
          libgpgme-dev \
          libgpg-error-dev \
          libprotobuf-dev \
          libprotobuf-c-dev \
          libseccomp-dev \
          libselinux1-dev \
          libsystemd-dev \
          pkg-config \
          make \
          runc \
          uidmap

    # --- COMPILE SKOPEO ---
    - name: Clone, Build, and Install Skopeo
      run: |
        git clone https://github.com/containers/skopeo.git skopeo
        cd skopeo
        make bin/skopeo
        sudo cp bin/skopeo /usr/local/bin/skopeo
        skopeo --version

    # --- COMPILE BUILDAH ---
    - name: Clone, Build, and Install Buildah
      run: |
        git clone https://github.com/containers/buildah.git buildah
        cd buildah
        make buildah TAGS="seccomp"
        sudo cp bin/buildah /usr/local/bin/buildah
        buildah --version

    # --- COMPILE PODMAN ---
    - name: Clone, Build, and Install Podman
      run: |
        git clone https://github.com/containers/podman.git podman
        cd podman
        make podman TAGS="seccomp"
        sudo cp bin/podman /usr/local/bin/podman
        podman --version

    # --- PIPELINE INTEGRATION TEST ---
    - name: 'Create Containerfile'
      run: |
        cat <<EOF > Containerfile
        FROM alpine:latest
        RUN apk add --no-cache curl
        ENTRYPOINT ["curl"]
        EOF

    - name: 'Build Image via Compiled Buildah'
      continue-on-error: true
      run: |
        sudo buildah bud -t localhost/ubuntu26-test:latest
        IMAGE_ID=$(sudo buildah images -q localhost/ubuntu26-test:latest)
        echo "BUILT_IMAGE_ID=$IMAGE_ID" >> $GITHUB_ENV

    - name: 'Run & Verify Image via Compiled Podman'
      continue-on-error: true
      run: |
        sudo podman images
        TARGET_IMAGE="${{ env.BUILT_IMAGE_ID }}"
        [ -z "$TARGET_IMAGE" ] && TARGET_IMAGE="localhost/ubuntu26-test:latest"
        sudo podman run --rm $TARGET_IMAGE --version

    - name: 'Inspect Remote Image via Compiled Skopeo'
      continue-on-error: true
      run: |
        echo "Inspecting remote image manifest via compiled Skopeo..."
        sudo skopeo inspect docker://docker.io/library/alpine:latest | grep -i '"Architecture":'
