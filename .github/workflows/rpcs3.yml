name: Verify Legacy Container Config Rejection

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual triggering from the UI

jobs:
  verify-v1-format:
    runs-on: ubuntu-26.04 # Standard runner with Podman/Buildah support

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Latest Podman, Buildah, and Skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y podman buildah skopeo
          
          echo "=== Installed Tool Versions ==="
          podman --version
          buildah --version
          skopeo --version

      - name: Run v1 Format Rejection Tests
        run: |
          # 1. Create isolated configuration directory
          TEST_DIR=$(mktemp -d -t container-cfg-XXXXXX)
          export CONTAINERS_REGISTRIES_CONF="$TEST_DIR/registries.conf"
          
          echo "=== 1. Writing Legacy v1 Format to: $CONTAINERS_REGISTRIES_CONF ==="
          cat << 'EOF' > "$CONTAINERS_REGISTRIES_CONF"
          # Legacy v1 flat format (Now unsupported)
          [registries.search]
          registries = ['docker.io', 'quay.io']
          EOF
          
          # Initialize a tracking flag for failures
          TEST_FAILED=0
          
          echo -e "\n=== 2. Testing BUILDAH ==="
          if error_msg=$(buildah images 2>&1); then
              echo "❌ FAILURE: Buildah accepted the legacy v1 format!"
              TEST_FAILED=1
          else
              echo "✅ SUCCESS: Buildah successfully rejected the v1 format."
              echo "Captured Error: $error_msg"
          fi
          
          echo -e "\n=== 3. Testing PODMAN ==="
          if error_msg=$(podman info 2>&1); then
              echo "❌ FAILURE: Podman accepted the legacy v1 format!"
              TEST_FAILED=1
          else
              echo "✅ SUCCESS: Podman successfully rejected the v1 format."
              echo "Captured Error: $error_msg"
          fi
          
          echo -e "\n=== 4. Testing SKOPEO ==="
          if error_msg=$(skopeo list-tags docker://docker.io/library/alpine 2>&1); then
              echo "❌ FAILURE: Skopeo accepted the legacy v1 format!"
              TEST_FAILED=1
          else
              echo "✅ SUCCESS: Skopeo successfully rejected the v1 format."
              echo "Captured Error: $error_msg"
          fi
          
          # Clean up temporary file path
          rm -rf "$TEST_DIR"
          
          # 5. Handle step termination
          if [ $TEST_FAILED -ne 0 ]; then
              echo -e "\n❌ CRITICAL ERROR: One or more tools failed to reject the deprecated v1 format."
              exit 1
          else
              echo -e "\n🎉 ALL TESTS PASSED: Legacy v1 configurations safely rejected across the stack."
              exit 0
          fi
