      - name: Create and Run Test Script
        shell: pwsh
        run: |
          # 1. Generate runtime configuration
          @'
          {
            "runtimeOptions": {
              "tfm": "net10.0-windows",
              "frameworks": [{"name": "Microsoft.NETCore.App", "version": "10.0.0"}]
            }
          }
          '@ | Out-File -FilePath runtime.json -Encoding utf8

          # 2. Generate the python script
          @'
          import sys
          from pathlib import Path
          import clr_loader
          from pythonnet import set_runtime
          
          # ... (Python script content to create forms and check active state) ...
          
          if __name__ == "__main__":
              sys.exit(main())
          '@ | Out-File -FilePath demo.py -Encoding utf8

          # 3. Execute the script
          python demo.py
