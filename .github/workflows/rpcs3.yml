name: Build and Test Ubuntu 26.04 Image with Podman

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  podman-build:
    runs-on: ubuntu-26.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upgrade Podman to Latest Upstream Version (APT Native)
        run: |
          echo "=== Adding openSUSE Kubic Repository ==="
          sudo mkdir -p /etc/apt/keyrings
          
          # Téléchargement de la clé de signature du dépôt
          curl -fsSL "https://opensuse.org" \
            | sudo gpg --dearmor -o /etc/apt/keyrings/libcontainers-archive-keyring.gpg
            
          # Ajout du dépôt de paquets officiels d'avant-garde
          echo "deb [signed-by=/etc/apt/keyrings/libcontainers-archive-keyring.gpg] https://opensuse.org /" \
            | sudo tee /etc/apt/sources.list.d/devel-kubic-libcontainers-unstable.list
            
          sudo apt-get update -y
          
          echo "=== Installing Latest Podman and Stack tools ==="
          # L'installation via APT configure automatiquement les permissions de réexécution (reexec) du noyau
          sudo apt-get install -y podman uidmap fuse-overlayfs

      - name: Configure Rootless User Namespaces
        run: |
          echo "=== Activating unprivileged user namespaces ==="
          # Permet au runner d'exécuter des conteneurs isolés sans être administrateur (root)
          sudo sysctl -w kernel.unprivileged_userns_clone=1
          
          # Vérification de la configuration uidmap par défaut du runner
          cat /etc/subuid || true
          cat /etc/subgid || true

      - name: Verify Podman installation
        run: |
          podman --version
          podman info

      - name: Create Containerfile
        run: |
          cat <<EOF > Containerfile
          FROM docker.io/library/ubuntu:26.04
          
          RUN apt-get update && apt-get install -y \
              curl \
              ca-certificates \
              && rm -rf /var/lib/apt/lists/*
              
          CMD ["echo", "Hello from Ubuntu 26.04 inside working Podman!"]
          EOF

      - name: Build image with Podman
        run: |
          podman build -t my-ubuntu-app:26.04 -f Containerfile .

      - name: Test the built image
        run: |
          podman run --rm my-ubuntu-app:26.04
