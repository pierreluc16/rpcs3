name: Build and Test Ubuntu 26.04 Image with Podman 6.0.1

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  podman-build:
    runs-on: ubuntu-26.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Podman 6.0.1 Binary
        id: cache-podman
        uses: actions/cache@v4
        with:
          path: /home/runner/podman-bin/podman
          key: podman-6.0.1-ubuntu2604-v1

      # This step only runs if the binary is NOT found in the GitHub cache
      - name: Install Build Dependencies on Cache Miss
        if: steps.cache-podman.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git golang-go make libseccomp-dev libgpgme-dev \
            libassuan-dev libbtrfs-dev libdevmapper-dev pkg-config \
            uidmap fuse-overlayfs iptables

      # Clones and compiles the exact v6.0.1 code securely
      - name: Compile Podman 6.0.1 Source on Cache Miss
        if: steps.cache-podman.outputs.cache-hit != 'true'
        run: |
          mkdir -p src
          git clone --depth 1 --branch v6.0.1 https://github.com/containers/podman src/podman-repo
          cd src/podman-repo
          
          # Native compilation resolves any "failed to reexec" engine crashes
          make BUILDTAGS="seccomp" podman
          
          mkdir -p /home/runner/podman-bin
          cp bin/podman /home/runner/podman-bin/podman

      - name: Inject Podman 6.0.1 and Configure System
        run: |
          # Moves the compiled 6.0.1 binary into the native /usr/bin system execution path
          sudo cp /home/runner/podman-bin/podman /usr/bin/podman
          sudo chmod +x /usr/bin/podman
          
          sudo apt-get update && sudo apt-get install -y uidmap fuse-overlayfs iptables

      - name: Configure Rootless User Namespaces
        run: |
          echo "=== Configuring Kernel Security for Rootless Execution ==="
          sudo sysctl -w kernel.unprivileged_userns_clone=1
          
          # Explicitly layout storage configuration templates to prevent Permission Denied (Exit Code 125)
          mkdir -p /home/runner/.local/share/containers/storage
          mkdir -p /home/runner/.config/containers

      - name: Verify Exact Installed Version
        run: |
          podman --version
          podman info || true

      - name: Create Containerfile
        run: |
          cat <<EOF > Containerfile
          # Fully qualified name registry matching enforcement is strictly required on Ubuntu 26.04
          FROM docker.io/library/ubuntu:26.04
          
          RUN apt-get update && apt-get install -y \
              curl \
              ca-certificates \
              && rm -rf /var/lib/apt/lists/*
              
          CMD ["echo", "Hello from Ubuntu 26.04 inside verified Podman 6.0.1!"]
          EOF

      - name: Build image with Podman 6.0.1
        run: |
          podman build -t my-ubuntu-app:26.04 -f Containerfile .

      - name: Test the built image
        run: |
          podman run --rm my-ubuntu-app:26.04
