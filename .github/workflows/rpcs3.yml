name: Build and Test Ubuntu 26.04 Image with Podman 6.0.1

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  podman-build:
    runs-on: ubuntu-26.04

    # Run the entire job inside a Docker container tracking the explicit Podman 6 upstream runtime
    container:
      image: quay.io/podman/stable:v6.0.1
      options: --privileged # Grants full rootless nesting and namespace reexec pass-through

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Podman Environment
        run: |
          podman --version
          podman info

      - name: Create Containerfile
        run: |
          cat <<EOF > Containerfile
          # Strictly enforce the fully qualified image registry URL on Ubuntu 26.04
          FROM docker.io/library/ubuntu:26.04
          
          RUN apt-get update && apt-get install -y \
              curl \
              ca-certificates \
              && rm -rf /var/lib/apt/lists/*
              
          CMD ["echo", "Hello from Ubuntu 26.04 inside guaranteed Podman 6.0.1!"]
          EOF

      - name: Build image with Podman 6.0.1
        run: |
          podman build -t my-ubuntu-app:26.04 -f Containerfile .

      - name: Test the built image
        run: |
          podman run --rm my-ubuntu-app:26.04
