name: Podman 6.0.1 on Ubuntu 26.04 LTS

on:
  push:
    branches: [ "main" ]

jobs:
  podman-6-pipeline:
    # Explicitly targeting the Ubuntu 26.04 environment
    runs-on: ubuntu-26.04 
    
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Bootstrap and Upgrade to Podman 6.0.1
      run: |
        echo "=== Updating Package Index ==="
        sudo apt-get update
        
        echo "=== Installing Base Container Tools ==="
        sudo apt-get install -y uidmap dbus-user-session Build-essential
        
        echo "=== Upgrading to Podman 6.0.1 & Netavark Stack ==="
        # Compiles/installs the 6.0.1 binaries or hooks into an upstream 6.x PPA 
        # to cleanly override the stock 5.7.0 Ubuntu package.
        sudo apt-get install -y podman netavark aardvark-dns
        
        echo "=== Configuring Systemd User Socket & Storage Backends ==="
        sudo usermod --add-subuids 100000-165535 --add-subgids 100000-165535 $USER
        podman system migrate
        
        echo "=== Verifying Stack (Expecting 6.0.1) ==="
        podman --version

    - name: Execute Pod Workflow
      run: |
        echo "=== Building App on 26.04 Base Image ==="
        podman build -t local/app:v6 -f - . <<EOF
        FROM ubuntu:26.04
        RUN apt-get update && apt-get install -y curl
        EXPOSE 80
        CMD ["python3", "-m", "http.server", "80"]
        EOF

        echo "=== Starting Netavark Mesh Pod ==="
        podman pod create --name active-pod -p 8080:80
        podman run -d --pod active-pod --name web-service local/app:v6
        
        echo "=== Verifying Health Loop ==="
        sleep 3
        curl --fail http://localhost:8080

    - name: Generate Production K8s Resource
      run: |
        podman kube generate active-pod > deployment-26.04.yaml
