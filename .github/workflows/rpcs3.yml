name: Build and Test Ubuntu 26.04 Image with Podman

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Manual launch button

jobs:
  podman-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update Podman to Latest Upstream
        run: |
          echo "=== Checking native runner Podman version ==="
          podman --version || true
          
          echo "=== Adding repository for the latest Podman packages ==="
          sudo mkdir -p /etc/apt/keyrings
          
          # Pulling the latest tools from the openSUSE Kubic development repository
          curl -fsSL "https://opensuse.org" \
            | sudo gpg --dearmor -o /etc/apt/keyrings/libcontainers-archive-keyring.gpg
            
          echo "deb [signed-by=/etc/apt/keyrings/libcontainers-archive-keyring.gpg] https://opensuse.org /" \
            | sudo tee /etc/apt/sources.list.d/devel-kubic-libcontainers-unstable.list
            
          sudo apt-get update
          sudo apt-get install -y podman conmon crun runc netavark aardvark-dns
          
          echo "=== Upgraded Podman version ==="
          podman --version

      - name: Create Containerfile
        run: |
          cat <<EOF > Containerfile
          # Always use the fully qualified registry URL
          FROM docker.io/library/ubuntu:26.04
          
          RUN apt-get update && apt-get install -y \
              curl \
              ca-certificates \
              && rm -rf /var/lib/apt/lists/*
              
          CMD ["echo", "Hello from Ubuntu 26.04 inside modern Podman!"]
          EOF

      - name: Build image with Podman
        run: |
          podman build -t my-ubuntu-app:26.04 -f Containerfile .

      - name: Test the built image
        run: |
          podman run --rm my-ubuntu-app:26.04
