name: Test Specific Clang Errors on Ubuntu 24.04 ARM

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to trigger the test manually from the Actions tab

jobs:
  test-errors-arm:
    # Target the official GitHub Actions Ubuntu 24.04 ARM64 runner
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # --- TEST 1: Check for llvm-config presence ---
      - name: Test Error 1 (llvm-config missing)
        id: test_llvm_config
        continue-on-error: true
        run: |
          echo "Checking for the presence of llvm-config on ARM..."
          llvm-config --prefix

      # --- TEST 2: Check for libclang.so presence ---
      - name: Test Error 2 (libclang.so missing)
        id: test_libclang
        continue-on-error: true
        run: |
          echo "Searching for libclang shared libraries on ARM..."
          # Attempts to find libclang in standard system paths
          ldconfig -p | grep libclang

      # --- TEST SUMMARY REPORT ---
      - name: Evaluate Error Presence
        run: |
          echo "=== UBUNTU 24.04 ARM TEST RESULTS ==="
          
          if [ "${{ steps.test_llvm_config.outcome }}" = "success" ]; then
            echo "✅ ERROR 1 RESOLVED: 'llvm-config' is present by default on ARM."
          else
            echo "❌ ERROR 1 STILL OCCURRING: 'llvm-config' is missing (No such file or directory)."
          fi

          if [ "${{ steps.test_libclang.outcome }}" = "success" ]; then
            echo "✅ ERROR 2 RESOLVED: 'libclang.so' is detected on the ARM system."
          else
            echo "❌ ERROR 2 STILL OCCURRING: 'libclang.so' is missing from ARM system paths."
          fi
          
          # Force the job to fail if either error is still active
          if [ "${{ steps.test_llvm_config.outcome }}" = "failure" ] || [ "${{ steps.test_libclang.outcome }}" = "failure" ]; then
            exit 1
          fi
