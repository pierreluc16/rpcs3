name: Run Ubuntu 24.04 ARM64 in QEMU

on: [push]

jobs:
  qemu-ubuntu-2404:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install QEMU Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-arm qemu-utils cloud-image-utils

      - name: Download Ubuntu 24.04 Kernel, Initrd, and Cloud Disk Image
        run: |
          # 1. Download official Ubuntu 24.04 netboot ARM64 kernel & initrd
          wget -q https://cdimage.ubuntu.com/ubuntu/releases/24.04/release/netboot/arm64/linux -O vmlinuz
          wget -q https://cdimage.ubuntu.com/ubuntu/releases/24.04/release/netboot/arm64/initrd -O initrd.img

          # 2. Download official Ubuntu 24.04 ARM64 Cloud Image
          wget -q https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img -O ubuntu-24.04.img

          # 3. Resize disk image to allow room for testing
          qemu-img resize ubuntu-24.04.img +5G

      - name: Create Cloud-Init Seed (Auto-login & Test Commands)
        run: |
          # Configure cloud-init to run your guest script automatically on boot
          cat << 'EOF' > user-data
          #cloud-config
          password: ubuntu
          chpasswd: { expire: False }
          ssh_pwauth: True

          runcmd:
            - echo "=== EXECUTING TEST COMMANDS IN GUEST ==="
            - ip link add vxlan-br type bridge
            - ip link set dev vxlan-br up
            - ip link add vx-test type vxlan id 101 remote 172.20.25.23 dev vxlan-br dstport 14788
            - ip -d link show dev vx-test
            - echo "exit code: $?"
            # Gracefully power off VM when finished
            - poweroff
          EOF

          touch meta-data
          cloud-localds seed.img user-data meta-data

      - name: Boot Ubuntu 24.04 VM in QEMU
        run: |
          # Detect hardware virtualization capabilities
          if [ -e /dev/kvm ] && [ -w /dev/kvm ]; then
            ACCEL_ARGS="-enable-kvm -cpu host"
            echo "KVM device found! Booting with KVM hardware acceleration."
          else
            ACCEL_ARGS="-cpu cortex-a57"
            echo "KVM not available on this runner. Falling back to software TCG emulation."
          fi

          timeout --foreground 10m qemu-system-aarch64 \
            $ACCEL_ARGS \
            -machine virt \
            -m 2048 \
            -smp 2 \
            -kernel vmlinuz \
            -initrd initrd.img \
            -drive file=ubuntu-24.04.img,format=qcow2,if=virtio \
            -drive file=seed.img,format=raw,if=virtio \
            -nographic \
            -append "console=ttyAMA0 root=/dev/vda1 rw panic=-1"
