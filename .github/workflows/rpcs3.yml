name: CI Automation Tests on Ubuntu 24.04 ARM64

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  run-tests-on-arm:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y wget curl xvfb libxi6 libnss3 libgbm1 libasound2t64

      # Removed nested inner quotes to prevent YAML parsing and unexpected EOF errors
      - name: Download from Google Chrome Website
        run: |
          curl -L https://google.com -o google-chrome.deb

      - name: Install Google Chrome ARM64
        run: |
          sudo apt install -y ./google-chrome.deb

      - name: Verify Chrome Installation
        run: |
          google-chrome --version
          which google-chrome

      - name: Run E2E Headless Tests
        env:
          CHROME_BIN: /usr/bin/google-chrome
        run: |
          xvfb-run --server-args="-screen 0 1280x1024x24" npm test
