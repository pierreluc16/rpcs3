name: Check System Architecture - Windows 11 ARM

on:
  workflow_dispatch: # Manual trigger

jobs:
  check-architecture:
    runs-on: windows-11-arm

    steps:
      - name: Force Purge ARM Python From Environment and Cache
        shell: pwsh
        run: |
          Write-Host "=== Purging ARM Python Environments ==="
          
          # 1. Clean up and filter the current Process PATH
          $currentPath = [Environment]::GetEnvironmentVariable("Path", "Process")
          $pathElements = $currentPath -split ";"
          
          # Filter out paths containing "Python" and "arm" or "aarch"
          $filteredElements = $pathElements | Where-Object {
              -not ($_ -like "*Python*arm*" -or $_ -like "*Python*aarch*")
          }
          
          $newPath = $filteredElements -join ";"
          [Environment]::SetEnvironmentVariable("Path", $newPath, "Process")
          
          # 2. Force delete folders out of the ToolCache if they exist
          $toolcacheDir = "$env:AGENT_TOOLSDIRECTORY\Python"
          if (Test-Path $toolcacheDir) {
              Get-ChildItem $toolcacheDir -Directory | ForEach-Object {
                  if ($_.Name -like "*arm*" -or $_.Name -like "*aarch*") {
                      Write-Host "Deleting Toolcache: $($_.FullName)"
                      Remove-Item -Path $_.FullName -Recurse -Force -ErrorAction SilentlyContinue
                  }
              }
          }
          
          # 3. Output the updated Path to GitHub Environment to persist into subsequent steps
          echo "PATH=$newPath" >> $env:GITHUB_ENV
          Write-Host "ARM Python paths successfully purged from the environment."

      - name: Check System Architecture
        shell: bash
        run: |
          echo "Python platform.machine(): $(python -c 'import platform; print(platform.machine())')"
          echo "Python platform.architecture(): $(python -c 'import platform; print(platform.architecture())')"
          echo "Python platform.processor(): $(python -c 'import platform; print(platform.processor())')"
          echo "PowerShell \$env:PROCESSOR_ARCHITECTURE: $PROCESSOR_ARCHITECTURE"
          echo "PowerShell \$env:PROCESSOR_IDENTIFIER: $PROCESSOR_IDENTIFIER"
