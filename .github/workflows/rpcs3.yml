name: Build and Test Ubuntu 26.04 Image with Latest Podman

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  podman-build:
    runs-on: ubuntu-26.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Latest Podman from System Repositories
        run: |
          echo "=== Enabling Proposed and Backports for Latest Stable Packages ==="
          # Enable proposed/backports to ensure we pull the absolute newest builds for 26.04
          sudo sed -i 's/^# deb/deb/g' /etc/apt/sources.list
          
          sudo apt-get update -y
          
          echo "=== Installing Native Podman and Security Tools ==="
          # Installing via apt integrates natively with AppArmor, fixing the reexec issue
          sudo apt-get install -y podman uidmap fuse-overlayfs

      - name: Configure Rootless User Namespaces
        run: |
          echo "=== Configuring Kernel Security for Rootless Execution ==="
          sudo sysctl -w kernel.unprivileged_userns_clone=1
          
          # Force configuration templates into the local home directory
          mkdir -p /home/runner/.local/share/containers/storage
          mkdir -p /home/runner/.config/containers

      - name: Verify Podman installation
        run: |
          podman --version
          podman info

      - name: Create Containerfile
        run: |
          cat <<EOF > Containerfile
          # Fully qualified name registry matching enforcement is required on Ubuntu 26.04
          FROM docker.io/library/ubuntu:26.04
          
          RUN apt-get update && apt-get install -y \
              curl \
              ca-certificates \
              && rm -rf /var/lib/apt/lists/*
              
          CMD ["echo", "Hello from Ubuntu 26.04 inside working latest Podman!"]
          EOF

      - name: Build image with Podman
        run: |
          podman build -t my-ubuntu-app:26.04 -f Containerfile .

      - name: Test the built image
        run: |
          podman run --rm my-ubuntu-app:26.04
