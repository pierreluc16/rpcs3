name: Windows 11 ARM LLVM Full Architecture Audit

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  audit-llvm:
    runs-on: windows-11-arm
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Deep Scan LLVM Installation
      shell: pwsh
      run: |
        $llvmPath = "C:\Program Files\LLVM"
        
        if (-not (Test-Path $llvmPath)) {
            Write-Error "LLVM directory not found at $llvmPath"
            exit 1
        }
        
        Write-Host "🔍 Starting a deep 100% ARM64 audit on: $llvmPath"
        
        # Gather all executable and library files inside the folder recursively
        $files = Get-ChildItem -Path $llvmPath -Recurse -Include *.exe, *.dll
        
        $nonArm64Binaries = @()
        $totalChecked = 0

        foreach ($file in $files) {
            $totalChecked++
            try {
                # Open binary stream to parse PE headers safely
                $stream = New-Object System.IO.FileStream($file.FullName, [System.IO.FileMode]::Open, [System.IO.FileAccess]::Read, [System.IO.FileShare]::Read)
                $reader = New-Object System.IO.BinaryReader($stream)
                
                # Verify DOS Magic Number (MZ)
                $mz = $reader.ReadBytes(2)
                if ($mz[0] -ne 0x4D -or $mz[1] -ne 0x5A) {
                    $reader.Close(); $stream.Close(); continue # Skip if not a valid PE file
                }
                
                # Seek to PE header offset
                $stream.Seek(0x3C, [System.IO.SeekOrigin]::Begin)
                $peOffset = $reader.ReadUInt32()
                
                # Seek to COFF Machine Type field (PE signature + 4 bytes)
                $stream.Seek(($peOffset + 4), [System.IO.SeekOrigin]::Begin)
                $machineType = $reader.ReadUInt16()
                
                $reader.Close()
                $stream.Close()
                
                # 0xAA64 = IMAGE_FILE_MACHINE_ARM64
                if ($machineType -ne 0xAA64) {
                    # Determine architectural identity for reporting
                    $archStr = switch ($machineType) {
                        0x8664 { "x86_64 (AMD64)" }
                        0x014c { "x86 (32-bit)" }
                        0x01c4 { "ARM (32-bit)" }
                        default { "Unknown (0x{0:X4})" -f $machineType }
                    }
                    
                    Write-Host "❌ NON-ARM64 FOUND: $($file.FullName) -> Target: $archStr"
                    $nonArm64Binaries += [PSCustomObject]@{
                        Path = $file.FullName
                        Arch = $archStr
                    }
                }
            }
            catch {
                Write-Host "⚠️ Warning: Could not read $($file.FullName) - $_"
            }
        }

        Write-Host "`n📊 Scan Summary:"
        Write-Host "Total files checked: $totalChecked"
        
        if ($nonArm64Binaries.Count -gt 0) {
            Write-Host "❌ FAILED: The LLVM installation is NOT 100% ARM64 native. Found $($nonArm64Binaries.Count) non-ARM64 files."
            # Set environment variable flag for subsequent steps if needed
            Add-Content -Path $env:GITHUB_ENV -Value "LLVM_IS_PURE_ARM64=false"
            exit 1
        } else {
            Write-Host "✅ SUCCESS: The LLVM installation is 100% ARM64 native!"
            Add-Content -Path $env:GITHUB_ENV -Value "LLVM_IS_PURE_ARM64=true"
        }
