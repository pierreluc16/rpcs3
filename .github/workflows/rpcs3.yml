name: Build and Test Ubuntu 26.04 Image with Podman

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Permet le lancement manuel depuis l'interface GitHub

# Définition des variables d'environnement au niveau global du Job pour corriger Podman 6
env:
  XDG_RUNTIME_DIR: /run/user/1001
  CONTAINERS_STORAGE_CONF: ${{ github.workspace }}/storage.conf

jobs:
  podman-build:
    runs-on: ubuntu-26.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upgrade Podman to Latest Upstream Version
        run: |
          echo "=== Updating package indexes ==="
          sudo apt-get update -y
          
          echo "=== Installing Homebrew ==="
          NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://githubusercontent.com)"
          
          echo "=== Evaluating Homebrew environment ==="
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          
          echo "=== Installing Podman via brew ==="
          brew install podman
          
          # Injecte le binaire Homebrew au début du PATH pour écraser la version native d'Ubuntu
          echo "/home/linuxbrew/.linuxbrew/bin" >> $GITHUB_PATH

      - name: Configure Rootless Storage Paths for Podman 6
        run: |
          echo "=== Creating user local storage directories ==="
          mkdir -p mkdir -p /home/runner/.local/share/containers/storage
          mkdir -p /home/runner/.config/containers
          
          echo "=== Generating local storage.conf to bypass system restrictions ==="
          # Ce fichier force Podman à écrire dans le dossier Home du runner et non dans /var/lib
          cat <<EOF > ${{ github.workspace }}/storage.conf
          [storage]
          driver = "overlay"
          runroot = "/home/runner/.local/share/containers/storage/run"
          graphroot = "/home/runner/.local/share/containers/storage"
          [storage.options.overlay]
          mount_program = "/usr/bin/fuse-overlayfs"
          EOF

      - name: Verify Podman installation
        run: |
          podman --version
          podman info

      - name: Create Containerfile
        run: |
          cat <<EOF > Containerfile
          # Utilisation du nom de registre complet (Strict matching requis)
          FROM docker.io/library/ubuntu:26.04
          
          RUN apt-get update && apt-get install -y \
              curl \
              ca-certificates \
              && rm -rf /var/lib/apt/lists/*
              
          CMD ["echo", "Hello from Ubuntu 26.04 inside Podman 6.0!"]
          EOF

      - name: Build image with Podman
        run: |
          podman build -t my-ubuntu-app:26.04 -f Containerfile .

      - name: Test the built image
        run: |
          podman run --rm my-ubuntu-app:26.04
