name: Strict Verification of Clang Errors on Ubuntu 24.04 ARM

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to manually trigger this anytime from the GitHub UI

jobs:
  strict-test:
    runs-on: ubuntu-24.04-arm
    
    # Target the explicit LLVM-18 directories
    env:
      LIBCLANG_PATH: /usr/lib/llvm-18/lib
      LLVM_CONFIG_PATH: /usr/lib/llvm-18/bin/llvm-config

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      # --- THE CRITICAL FIX: Link the unversioned library ---
      - name: Fix Missing libclang.so Symlink Natively
        run: |
          if [ ! -f /usr/lib/llvm-18/lib/libclang.so ] && [ -f /usr/lib/llvm-18/lib/libclang.so.1 ]; then
            echo "Creating missing symlink for clang-sys compatibility..."
            sudo ln -s /usr/lib/llvm-18/lib/libclang.so.1 /usr/lib/llvm-18/lib/libclang.so
          fi

      # --- CONSTRUCT REAL CARGO EXPERIMENT ---
      - name: Generate Dummy Project to Force Clang-Sys Probing
        run: |
          cargo new arm-clang-tester --bin
          cd arm-clang-tester
          # Add the exact crate and version causing your original error
          echo 'clang-sys = "=1.8.1"' >> Cargo.toml
          # Force dependency inclusion in code to ensure it compiles during build
          echo 'fn main() { unsafe { clang_sys::clang_createIndex(0, 0); } }' > src/main.rs

      # --- THE ULTIMATE COMPILATION TEST ---
      - name: Execute Cargo Build (Isolating the Errors)
        id: build_execution
        continue-on-error: true
        run: |
          cd arm-clang-tester
          cargo build --verbose

      # --- FINAL MULTI-ERROR REPORTING SUITE ---
      - name: Evaluate Error States
        run: |
          echo "=========================================================="
          echo "          UBUNTU 24.04 ARM REALITY-CHECK RESULTS          "
          echo "=========================================================="
          
          if [ "${{ steps.build_execution.outcome }}" = "success" ]; then
            echo "✅ BOTH ERRORS RESOLVED NATIVELY!"
            echo "The compilation succeeded after creating the local symlink override."
            echo "You do not need to install apt packages anymore."
          else
            echo "❌ CRITICAL ERRORS ENCOUNTERED ON NATIVE IMAGE!"
            echo "The build still failed. Inspect the Cargo compilation logs above."
            exit 1
          fi
