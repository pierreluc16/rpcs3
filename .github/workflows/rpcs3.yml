name: Brew Double Update

on:
  push:
  workflow_dispatch:

jobs:
  brew:
    runs-on: macos-15
    steps:
      - name: Purge, Install, and Lock Homebrew 5.0.0
        run: |
          # 1. Clean out existing environments safely 
          NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://githubusercontent.com)" || true
          sudo rm -rf /opt/homebrew
          sudo rm -rf /usr/local/Homebrew
          sudo rm -rf /usr/local/Cellar
          sudo rm -rf /usr/local/var/homebrew

          # 2. Run official installer script
          NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://githubusercontent.com)"

          # 3. Correctly export Homebrew paths to GitHub Actions environment
          /opt/homebrew/bin/brew shellenv >> $GITHUB_ENV
          
          # 4. Load them locally for the remainder of this step
          eval "$(/opt/homebrew/bin/brew shellenv)"

          # 5. Target the specific git checkout tag for release 5.0.0
          cd "$(brew --repository)"
          git fetch --tags
          git checkout tags/5.0.0

          # 6. Output state to confirm locking
          brew --version

      - name: Run brew update twice
        run: |
          # The paths are now automatically loaded via $GITHUB_ENV from the previous step
          brew --version
          
          # Execute step checks
          brew update && brew update
