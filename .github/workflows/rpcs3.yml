name: Check LLVM and Libclang Binaries

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  locate-llvm:
    name: Detect LLVM components
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Locate llvm-config
        run: |
          echo "=== Searching for llvm-config ==="
          if command -v llvm-config &> /dev/null; then
            echo "✅ Default llvm-config: $(which llvm-config)"
            llvm-config --version
          else
            echo "❌ No default llvm-config found in PATH."
          fi
          
          echo -e "\n=== Scanning filesystem for llvm-config variants ==="
          sudo find /usr/bin /usr/local/bin -name "llvm-config*" 2>/dev/null || echo "No files found."

      - name: Locate libclang.so
        run: |
          echo "=== Searching for libclang.so ==="
          if ldconfig -p 2>/dev/null | grep -q "libclang"; then
            echo "✅ Found in dynamic linker cache:"
            ldconfig -p | grep "libclang"
          else
            echo "❌ Not found in ldconfig cache."
          fi
          
          echo -e "\n=== Scanning filesystem for libclang.so files ==="
          sudo find /usr/lib /usr/local/lib -name "libclang.so*" 2>/dev/null || echo "No files found."
