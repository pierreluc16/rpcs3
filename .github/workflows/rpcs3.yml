name: Detect All Installed libicu Versions

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  audit-icu-versions:
    runs-on: ubuntu-26.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Scan and List All Installed libicu Packages
        run: |
          echo "=== [START] SCANNING ALL INSTALLED LIBICU VERSIONS ==="
          
          # Interrogation de dpkg-query filtrée sur les paquets contenant "libicu"
          # Le format d'affichage montre : Nom du paquet | Version | Statut d'installation
          if dpkg-query -W -f='${Status} ${Package} ${Version}\n' "*libicu*" 2>/dev/null | grep "ok installed" > temp_icu.txt; then
              
              echo "[INFO] Paquets libicu détectés sur le système :"
              echo "--------------------------------------------------"
              
              # Parcours et mise en forme propre des résultats
              while read -r status1 status2 status3 package version; do
                  echo "-> Paquet  : $package"
                  echo "   Version : $version"
                  echo "--------------------------------------------------"
              done < temp_icu.txt
              
              rm temp_icu.txt
              echo "=== [SUCCESS] SCAN COMPLETE ==="
              exit 0
          else
              echo "[ALERTE] Aucun paquet correspondant à '*libicu*' n'est actuellement installé."
              echo "=== [SUCCESS] SCAN COMPLETE ==="
              exit 0
          fi
