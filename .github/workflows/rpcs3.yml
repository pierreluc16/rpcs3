name: Check Windows 11 OOBE Status

on: [push, pull_request]

jobs:
  check-environment:
    runs-on: windows-11-arm 

    steps:
      - name: Detect OOBE Block
        id: check_oobe
        shell: powershell
        run: |
          # 1. Query Windows Registry for Setup/OOBE status
          $oobePath = "HKLM:\SYSTEM\Setup\Status\ChildCompletion"
          $setupStatus = (Get-ItemProperty -Path $oobePath).Setup.exe
          Write-Host "OOBE Setup Status Code: $setupStatus"

          # 2. Trigger critical red failure if OOBE is not completed
          if ("$setupStatus" -ne "3") {
              Write-Output "::error::CRITICAL FAILURE: Windows 11 ARM runner is locked in OOBE state!"
              exit 1
          } else {
              Write-Host "Environment is valid. Proceeding..."
          }
