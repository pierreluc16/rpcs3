name: Verify Pre-installed LLVM and LibClang on Ubuntu ARM

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  verify-preinstalled:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Locate pre-installed llvm-config
        run: |
          LLVM_CONF=$(which llvm-config-18 || which llvm-config-19 || which llvm-config-17 || which llvm-config)
          
          if [ -z "$LLVM_CONF" ]; then
            echo "Error: llvm-config could not be found in the system path."
            exit 1
          fi
          
          echo "Found: $LLVM_CONF"
          $LLVM_CONF --version
          
          echo "LLVM_CONFIG_PATH=$LLVM_CONF" >> $GITHUB_ENV

      - name: Locate pre-installed libclang.so
        run: |
          LIBCLANG_FILE=$(find /usr/lib/aarch64-linux-gnu /usr/lib -name "libclang.so*" 2>/dev/null | head -n 1)
          
          if [ -z "$LIBCLANG_FILE" ]; then
            echo "Error: libclang.so shared object could not be found."
            exit 1
          fi
          
          LIBCLANG_DIR=$(dirname "$LIBCLANG_FILE")
          echo "LibClang directory found at: $LIBCLANG_DIR"
          
          echo "LIBCLANG_PATH=$LIBCLANG_DIR" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=$LIBCLANG_DIR:$LD_LIBRARY_PATH" >> $GITHUB_ENV
