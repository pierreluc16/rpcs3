name: Ubuntu 24.04 Native ICU Deep Audit

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  native-icu-scan:
    name: Pure Binary & Toolchain Audit
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Run Native Deep Scan Loop
      shell: bash
      run: |
        set -euo pipefail

        echo "========================================================"
        echo "🚀 STEP 1: COMPONENT DEPLOYMENT & ECOSYSTEM CHECK"
        echo "========================================================"
        
        echo "Updating apt cache and installing absolute baseline dependencies..."
        sudo apt-get update -y
        sudo apt-get install -y libicu-dev icu-devtools pkg-config file binutils

        # Extraction des métadonnées du système
        ICU_VERSION=$(pkg-config --modversion icu-i18n)
        LIB_DIR=$(pkg-config --variable=libdir icu-i18n)
        INC_DIR=$(pkg-config --variable=includedir icu-i18n)

        echo "• System ICU Version  : $ICU_VERSION"
        echo "• Library Directory   : $LIB_DIR"
        echo "• Include Directory   : $INC_DIR"

        echo -e "\n========================================================"
        echo "🔍 STEP 2: FILE SYSTEM & ARCHITECTURE VERIFICATION"
        echo "========================================================"
        
        # Vérification stricte de la présence des fichiers d'en-tête (headers)
        if [ -d "$INC_DIR/unicode" ]; then
            echo "  ✅ Include path matches standard specifications."
        else
            echo "  ❌ CRITICAL ERROR: Header tracking directory is missing."
            exit 1
        fi

        # Traçage du lien symbolique de la bibliothèque principale
        TARGET_SO_FILE=$(readlink -f "$LIB_DIR/libicuuc.so")
        echo "• Resolved Binary Target: $TARGET_SO_FILE"

        if [ -f "$TARGET_SO_FILE" ]; then
            BIN_METADATA=$(file "$TARGET_SO_FILE")
            echo "  ➔ Binary Info: $BIN_METADATA"
            
            if [[ "$BIN_METADATA" == *"x86-64"* || "$BIN_METADATA" == *"aarch64"* ]]; then
                echo "  ✅ Architecture matches host profile successfully."
            else
                echo "  ❌ CRITICAL ERROR: Unsupported binary architecture signature."
                exit 1
            fi
        else
            echo "  ❌ CRITICAL ERROR: System shared object link is completely broken."
            exit 1
        fi

        echo -e "\n========================================================"
        echo "🛠️ STEP 3: DEEP SYMBOL SCAN & ENGINE RUNTIME TEST"
        echo "========================================================"
        
        echo "• Scanning binary symbols for core engine signatures..."
        # Analyse des symboles internes : On cherche la présence de la fonction d'initialisation de base 'u_init'
        if nm -D "$TARGET_SO_FILE" | grep -q "u_init"; then
            echo "  ✅ Core engine function signature 'u_init' verified inside the library symbols."
        else
            echo "  ❌ CRITICAL ERROR: Library file is corrupted. 'u_init' symbol missing."
            exit 1
        fi

        echo "• Running execution test using native translation tools..."
        # Test de runtime via l'utilitaire système 'uconv' pour convertir une chaîne UTF-8 standard
        echo "Ubuntu 24.04 ICU Check" | uconv -f utf-8 -t utf-16 > /dev/null
        echo "  ✅ Runtime subsystem conversion engine validated successfully."

        echo -e "\n========================================================"
        echo "🎉 AUDIT COMPLETE: ENVIRONMENT CONFIRMED STABLE"
        echo "========================================================"
        echo "ICU_VER_VERIFIED=$ICU_VERSION" >> "$GITHUB_ENV"
