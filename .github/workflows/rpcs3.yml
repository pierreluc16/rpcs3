name: Ubuntu 24.04 ICU 74 Dev Environment Validation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  audit-and-setup-icu24:
    # Explicitly targeted for Ubuntu 24.04 LTS environments
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Multi-Method ICU 74 Audit and Remediation
      shell: bash
      run: |
        run_icu_audit() {
            DPKG_VERSION="Not Found"
            PKG_CONFIG_VERSION="Not Found"
            ICUINFO_VERSION="Not Found"
            FAILED_METHODS=0

            echo "---------------------------------------------------------"
            echo "🔍 INSPECTING UBUNTU 24.04 COMPILER LAYOUT..."
            echo "---------------------------------------------------------"

            # 1. System Package Tree Verification
            if dpkg -s libicu-dev >/dev/null 2>&1; then
                DPKG_VERSION=$(dpkg-query -W -f='${Version}' libicu-dev)
                echo "✅ Method 1 (dpkg)       : Found Package ($DPKG_VERSION)"
            else
                echo "❌ Method 1 (dpkg)       : Package 'libicu-dev' is missing"
                FAILED_METHODS=$((FAILED_METHODS + 1))
            fi

            # 2. Modern Upstream-Standard Toolchain Verification (pkg-config)
            if pkg-config --exists icu-i18n >/dev/null 2>&1; then
                PKG_CONFIG_VERSION=$(pkg-config --modversion icu-i18n)
                echo "✅ Method 2 (pkg-config) : Found Config Flags ($PKG_CONFIG_VERSION)"
            else
                echo "❌ Method 2 (pkg-config) : Metadata missing (.pc path unmapped)"
                FAILED_METHODS=$((FAILED_METHODS + 1))
            fi

            # 3. Native Engine Execution Tool Verification (icuinfo)
            if command -v icuinfo >/dev/null 2>&1; then
                ICUINFO_VERSION=$(icuinfo | grep -i "International Components for Unicode" | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?')
                echo "✅ Method 3 (icuinfo)    : Found Operational Tool ($ICUINFO_VERSION)"
            else
                echo "❌ Method 3 (icuinfo)    : 'icuinfo' executable not found in PATH"
                FAILED_METHODS=$((FAILED_METHODS + 1))
            fi

            return $FAILED_METHODS
        }

        echo "========================================================="
        echo "🚀 RUNNING VALIDATION ON UBUNTU 24.04 TARGET MACHINE"
        echo "========================================================="
        
        run_icu_audit
        AUDIT_RESULT=$?

        # Fix the system if the baseline package components are not present
        if [ $AUDIT_RESULT -gt 0 ]; then
            echo -e "\n⚠️ WARNING: Broken links or missing components found on Ubuntu 24.04."
            echo "🔧 Triggering automatic APT tracking update & restoration..."
            
            sudo apt-get update
            # Enforce explicit layout mapping alongside the ICU dev headers
            sudo apt-get install -y libicu-dev icu-devtools pkg-config
            
            echo -e "\n🔄 Executing system sanity audit loop..."
            run_icu_audit
            FINAL_RESULT=$?
            
            if [ $FINAL_RESULT -gt 0 ]; then
                echo -e "\n❌ CRITICAL: Environment remediation failed on target OS image."
                exit 1
            fi
        fi

        # Assertive version sanity check to ensure compatibility with modern configurations
        if [[ "$PKG_CONFIG_VERSION" != 74.* ]]; then
            echo -e "\n⚠️ OS NOTICE: Ubuntu 24.04 expects ICU version 74.x natively."
            echo "   Detected cross-linked or customized local build configuration: $PKG_CONFIG_VERSION"
        fi

        echo -e "\n========================================================="
        echo "🎉 INT-COMPONENTS DEPLOYED SUCCESSFULLY ON UBUNTU 24.04"
        echo "========================================================="
        echo "• Fully Resolved System Target Version: $PKG_CONFIG_VERSION"
        
        # Share target environmental context variable cleanly to subsequent runner hooks
        echo "ICU_VER_VERIFIED=$PKG_CONFIG_VERSION" >> $GITHUB_ENV
        echo "========================================================="

    - name: Verify Downstream Access
      run: |
        echo "Target environment successfully recognized ICU Engine Version: ${{ env.ICU_VER_VERIFIED }}"
