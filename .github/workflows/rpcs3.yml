name: Test LLVM and Clang Errors From Scratch

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-test-script:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Step 1 - Checkout repository code
        uses: actions/checkout@v4

      - name: Step 2 - Clean Environment and Run Cargo Check
        id: run_cargo
        run: |
          echo "=== Cleaning Environment Variables ==="
          unset LLVM_CONFIG_PATH
          unset LIBCLANG_PATH

          echo "=== Running Cargo Check ==="
          cargo check > manual_build.log 2>&1 || true
          cat manual_build.log

      - name: Step 3 - Verify LLVM Config Warning
        continue-on-error: true
        run: |
          echo "=== Verifying Error 1 (llvm-config warning) ==="
          # Use grep -E to loosely catch 'could not execute' alongside 'llvm-config' to bypass cargo:warning formatting and backticks
          if grep -qE "could not execute.*llvm-config|llvm-config.*could not execute" manual_build.log && grep -qE "(No such file|os error 2|program not found)" manual_build.log; then
            echo "✅ SUCCESS: Missing llvm-config warning detected."
          else
            echo "❌ FAILURE: Expected llvm-config warning not found."
            exit 1
          fi

      - name: Step 4 - Verify Clang Unwrap Panic
        run: |
          echo "=== Verifying Error 2 (unwrap panic) ==="
          if grep -q "called Result::unwrap() on an Err value:" manual_build.log && grep -q "couldn't find any valid shared libraries matching" manual_build.log; then
            echo "✅ SUCCESS: Result::unwrap() panic detected."
          else
            echo "❌ FAILURE: Expected libclang shared library panic not found."
            exit 1
          fi

      - name: Step 5 - Cleanup Log
        if: always()
        run: |
          echo "🎉 Manual test finished: Both errors are confirmed present on this Ubuntu ARM system."
          [ -f manual_build.log ] && rm manual_build.log || true
