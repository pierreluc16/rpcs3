name: CI Automation Tests on Ubuntu 24.04 ARM64

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  run-tests-on-arm:
    # Targets the official GitHub-hosted Ubuntu 24.04 ARM64 runner
    runs-on: ubuntu-24.04-arm

    steps:
      # 1. Pull the source code from your repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Update packages and install modern 24.04 system utilities (libgconf removed)
      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y wget xvfb libxi6 libnss3 libgbm1 libasound2t64

      # 3. Download and install the official stable version of Google Chrome ARM64
      - name: Download and Install Official Google Chrome (ARM64)
        run: |
          # Fetch the official stable ARM64 deb package provided by Google
          wget https://google.com
          
          # Install the local package while letting apt handle any 24.04 package dependencies
          sudo apt install -y ./google-chrome-stable_current_arm64.deb

      # 4. Verify the installed Chrome version for debugging logs
      - name: Verify Chrome Installation
        run: |
          google-chrome --version
          which google-chrome

      # 5. Run your test suite using a virtual framebuffer (Xvfb)
      - name: Run E2E Headless Tests
        env:
          # Standard environment variable pointing to the native ARM64 Chrome binary
          CHROME_BIN: /usr/bin/google-chrome
        run: |
          # Wrap your testing command inside xvfb-run to simulate a display server
          # Replace 'npm test' with your exact command (e.g., 'pytest', 'mvn test')
          xvfb-run --server-args="-screen 0 1280x1024x24" npm test
