name: Build and Test Ubuntu 26.04 Image with Podman 6.0.1

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  podman-build:
    runs-on: ubuntu-26.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Runtime Security Tools
        run: |
          sudo apt-get update
          # System isolation dependencies required to manage rootless operations
          sudo apt-get install -y uidmap fuse-overlayfs iptables golang-go make libseccomp-dev

      - name: Compile and Inject Podman 6.0.1
        run: |
          echo "=== Fetching and Compiling Podman 6.0.1 via Go ==="
          # Compiling natively overrides path limits and matches your OS context
          export GOPATH=$HOME/go
          go install ://github.com
          
          echo "=== Overlaying Executable onto System Path ==="
          sudo cp $HOME/go/bin/podman /usr/bin/podman
          sudo chmod +x /usr/bin/podman

      - name: Configure Rootless User Namespaces
        run: |
          echo "=== Configuring Kernel Security for Rootless Execution ==="
          sudo sysctl -w kernel.unprivileged_userns_clone=1
          
          # Initialize directory trees for non-root workflow execution
          mkdir -p /home/runner/.local/share/containers/storage
          mkdir -p /home/runner/.config/containers

      - name: Verify Exact Version Target
        run: |
          podman --version
          podman info || true

      - name: Create Containerfile
        run: |
          cat <<EOF > Containerfile
          # Fully qualified name registry matching enforcement is required on Ubuntu 26.04
          FROM docker.io/library/ubuntu:26.04
          
          RUN apt-get update && apt-get install -y \
              curl \
              ca-certificates \
              && rm -rf /var/lib/apt/lists/*
              
          CMD ["echo", "Hello from Ubuntu 26.04 inside working Podman 6.0.1!"]
          EOF

      - name: Build image with Podman 6.0.1
        run: |
          podman build -t my-ubuntu-app:26.04 -f Containerfile .

      - name: Test the built image
        run: |
          podman run --rm my-ubuntu-app:26.04
