name: Strict Error Verification Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  verify-error:
    runs-on: ubuntu-24.04-arm
    container:
      image: rust:1.80-slim

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Create Dynamic Cargo Environment
      run: |
        echo "=== Generating absolute minimal Cargo workspace ==="
        # Forces the creation of a temporary project structure to fix the missing Cargo.toml error
        echo '[package]' > Cargo.toml
        echo 'name = "rpcs3_test"' >> Cargo.toml
        echo 'version = "0.1.0"' >> Cargo.toml
        echo 'edition = "2021"' >> Cargo.toml
        echo '[dependencies]' >> Cargo.toml
        echo 'clang-sys = "1.8.1"' >> Cargo.toml
        mkdir -p src
        echo 'fn main() {}' > src/main.rs

    - name: Diagnostic System Sweep
      run: |
        echo "=== Locating any native llvm-config ==="
        which llvm-config || echo "No default llvm-config executable found in PATH."
        find /usr/bin /usr/local/bin -name "llvm-config*" 2>/dev/null || true
        
        echo "=== Locating any native libclang shared libraries ==="
        find /usr/lib /usr/local/lib /lib -name "libclang.so*" 2>/dev/null || true

    - name: Execute Cargo Check
      # Runs successfully now because Cargo.toml was created dynamically above
      run: cargo check -p clang-sys --verbose
