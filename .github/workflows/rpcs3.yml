name: Test LLVM and Clang Errors From Scratch

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  assert-errors:
    runs-on: ubuntu-24.04-arm64

    steps:
    - name: Step 1 - Checkout repository code
      uses: actions/checkout@v4

    - name: Step 2 - Install clean Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Step 3 - Run compilation and assert exact errors
      run: |
        # Clear environment variables to guarantee fallback mechanisms fail
        unset LLVM_CONFIG_PATH
        unset LIBCLANG_PATH

        echo "Starting build to capture target errors..."
        
        # Run cargo check and save all outputs (stdout and stderr) to a log file
        # We add '|| true' so the script doesn't crash before we can check the text
        cargo check > build.log 2>&1 || true

        # Print the logs to the GitHub console for visibility
        cat build.log

        echo "--------------------------------------------------------"
        echo "Verifying Error 1: Missing llvm-config warning..."
        echo "--------------------------------------------------------"
        if grep -q "could not execute llvm-config one or more times" build.log && grep -q "error: No such file or directory (os error 2)" build.log; then
            echo "Success: Missing llvm-config warning detected!"
        else
            echo "Error: The expected llvm-config warning was not found in the logs."
            exit 1
        fi

        echo "--------------------------------------------------------"
        echo "Verifying Error 2: Result::unwrap() panic..."
        echo "--------------------------------------------------------"
        if grep -q "called Result::unwrap() on an Err value:" build.log && grep -q "couldn't find any valid shared libraries matching: \['libclang.so'" build.log; then
            echo "Success: Result::unwrap() panic detected!"
        else
            echo "Error: The expected libclang shared library panic was not found."
            exit 1
        fi

        echo "Test completed successfully. Both specific errors are confirmed present on this runner."
