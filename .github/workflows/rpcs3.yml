name: Strict OOBE Validation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  system-gate:
    name: Critical System Check
    runs-on: windows-11-arm
    timeout-minutes: 3

    steps:
    - name: Scan Active Environment
      shell: powershell
      run: |
        $blockers = Get-Process | Where-Object { 
          $_.Name -match 'CloudExperienceHost|wwahost|ConsentUx' -or 
          $_.MainWindowTitle -match 'Privacy|Experience|OOBE' 
        }

        if ($blockers) {
          Write-Output "::error title=CRITICAL RUNNER FAILURE::Windows 11 OOBE/Privacy dialog detected. Halting pipeline execution immediately."
          exit 1
        }

        Write-Host "System check passed: No blocking interfaces detected."
