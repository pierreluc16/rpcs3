name: Strict Error Verification Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Allows manual triggering from the Actions tab UI
  workflow_dispatch:

jobs:
  verify-error:
    runs-on: ubuntu-24.04-arm

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Rust Toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Diagnostic System Sweep
      run: |
        echo "=== Locating any native llvm-config ==="
        which llvm-config || echo "No default llvm-config executable found in PATH."
        find /usr/bin /usr/local/bin -name "llvm-config*" 2>/dev/null || true
        
        echo "=== Locating any native libclang shared libraries ==="
        find /usr/lib /usr/local/lib /lib -name "libclang.so*" 2>/dev/null || true

    - name: Execute Cargo Check
      # Running this without environment variables will reproduce your exact errors if they still exist
      run: cargo check -p clang-sys --verbose
