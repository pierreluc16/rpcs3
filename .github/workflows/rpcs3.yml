name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_call:
    inputs:
      attest-package:
        description: "Create GitHub provenance attestation for the package."
        default: "false"
        type: string
    outputs:
      artifact-basename:
        description: "Base name of the uploaded artifacts; use for artifact retrieval."
        value: ${{ jobs.package.outputs.artifact-basename }}
  workflow_dispatch:

env:
  min_python_version: "3.10"
  FORCE_COLOR: "1"

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow}}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  demo:
    name: Demo (${{ matrix.runs-on }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        runs-on: ["windows-latest", "windows-11-arm"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install -U pip
          python -m pip install pythonnet
          # Install the demo package and the underlying framework backends from source
          python -m pip install toga-demo
          python -m pip install -e core -e winforms

      - name: Run test
        run: |
          python -m toga_demo normal launch
