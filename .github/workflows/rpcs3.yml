name: Verify Windows 11 ARM Native GUI Limitations

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows manual execution from the Actions tab

jobs:
  run-limitation-test:
    runs-on: windows-11-arm

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK (ARM64 Native)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x' # Adjust to match your project version

      - name: Restore NuGet Dependencies
        run: dotnet restore MyGuiApp.sln

      - name: Build Test Project
        run: dotnet build MyGuiApp.sln --configuration Release /p:Platform=ARM64

      - name: Execute GUI Constraint Test
        # We explicitly run the test we created above. 
        # This execution will output your exact desired text results directly into the CI logs.
        run: |
          dotnet test --filter "FullyQualifiedName=MyGuiApp.Tests.HeadlessEnvironmentTests.Verify_Windows11Arm_Is_Headless_And_NonInteractive" --logger "console;verbosity=detailed"
