name: Windows 11 ARM OOBE Threat Detection

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  environment-scan:
    # Target the Windows 11 ARM64 runner environment
    runs-on: windows-11-arm64

    steps:
    - name: Scan Environment for Active OOBE Lock
      shell: powershell
      run: |
        Write-Host "Initializing native API check for Windows Out-of-Box Experience (OOBE)..."
        
        # 1. Query the native Windows API via P/Invoke to determine if OOBE is active
        $Signature = @'
        [DllImport("OOBEApi.dll", CallingConvention = CallingConvention.StdCall)]
        public static extern bool OOBEComplete(out bool isOOBEComplete);
        '@
        
        $OobeApi = Add-Type -MemberDefinition $Signature -Name "OobeCheck" -Namespace "Win32" -PassThru
        $IsComplete = $false
        
        try {
            $Result = $OobeApi::OOBEComplete([ref]$IsComplete)
            if ($Result -and -not $IsComplete) {
                Write-Warning "Windows API indicates that OOBE is NOT complete on this host instance!"
                $ApiTriggered = $true
            } else {
                Write-Host "Windows API check verified: OOBE phase marked as complete."
                $ApiTriggered = $false
            }
        } catch {
            Write-Host "Unable to poll OOBEApi.dll directly. Falling back to active threat signature parsing..."
            $ApiTriggered = $false
        }

        # 2. Check for active execution fingerprints of OOBE runtime layers
        $TargetProcesses = Get-Process -Name "CloudExperienceHost*", "wwahost", "ConsentUx" -ErrorAction SilentlyContinue
        $TargetWindows = Get-Process | Where-Object { $_.MainWindowTitle -match "Privacy" -or $_.MainWindowTitle -match "Experience" -or $_.MainWindowTitle -match "OOBE" }

        # 3. Handle detection results and fail the workflow if detected
        if ($ApiTriggered -or $TargetProcesses -or $TargetWindows) {
            Write-Error "=========================================================================="
            Write-Error "CRITICAL FAILURE: Windows 11 ARM OOBE / Privacy screen layer detected!"
            Write-Error "This workflow step is exiting immediately to prevent pipeline hang timeouts."
            Write-Error "=========================================================================="
            
            if ($TargetProcesses) {
                Write-Host "Active blocking background processes found:"
                $TargetProcesses | Select-Object Name, Id, Path | Format-Table -AutoSize
            }
            
            if ($TargetWindows) {
                Write-Host "Active blocking interactive window interfaces found:"
                $TargetWindows | Select-Object Name, MainWindowTitle | Format-Table -AutoSize
            }
            
            # Terminate execution with a hard failure signature
            exit 1
        }
        
        Write-Host "SUCCESS: Environment scan complete. No active OOBE blocking threads detected."
