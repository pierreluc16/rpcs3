name: LLVM ARM Percentage and Emulation Breakdown Scan

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  analyze-llvm-components:
    runs-on: windows-11-arm

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Run Recursive Binary Architecture Breakdown
      shell: pwsh
      run: |
        $llvmPath = "C:\Program Files\LLVM"
        if (-not (Test-Path $llvmPath)) {
            Write-Error "LLVM installation directory was not found at: $llvmPath"
            exit 1
        }
        
        Write-Host "🔍 Initiating deep architectural scanning on components..."
        $files = Get-ChildItem -Path $llvmPath -Recurse -Include *.exe, *.dll
        
        $arm64Count = 0
        $emulatedCount = 0
        $totalFiles = 0
        $emulatedList = @()

        foreach ($file in $files) {
            try {
                $stream = New-Object System.IO.FileStream($file.FullName, [System.IO.FileMode]::Open, [System.IO.FileAccess]::Read, [System.IO.FileShare]::Read)
                $reader = New-Object System.IO.BinaryReader($stream)
                
                $mz = $reader.ReadBytes(2)
                if ($mz -ne 0x4D -or $mz -ne 0x5A) { $reader.Close(); $stream.Close(); continue }
                
                $stream.Seek(0x3C, [System.IO.SeekOrigin]::Begin)
                $peOffset = $reader.ReadUInt32()
                
                $stream.Seek(($peOffset + 4), [System.IO.SeekOrigin]::Begin)
                $machineType = $reader.ReadUInt16()
                
                $reader.Close()
                $stream.Close()
                $totalFiles++
                
                if ($machineType -eq 0xAA64) {
                    $arm64Count++
                } else {
                    $emulatedCount++
                    $archLabel = switch($machineType) {
                        0x8664  { "x86_64 (64-bit Intel Emulated)" }
                        0x014c  { "x86 (32-bit Intel Emulated)" }
                        0x01c4  { "ARM (32-bit Legacy)" }
                        default { "Unknown Arch (0x{0:X4})" -f $machineType }
                    }
                    $emulatedList += [PSCustomObject]@{
                        FileName     = $file.Name
                        Architecture = $archLabel
                        RelativePath = $file.FullName.Replace($llvmPath, "")
                    }
                }
            } catch {
                # Safe skip for system lock blocks
            }
        }

        if ($totalFiles -eq 0) {
            Write-Error "No valid binaries found to audit."
            exit 1
        }

        $arm64Percentage = [Math]::Round(($arm64Count / $totalFiles) * 100, 2)
        $emulatedPercentage = [Math]::Round(($emulatedCount / $totalFiles) * 100, 2)

        # 1. Standard Runner Log Terminal Strings
        Write-Host "`n=========================================================="
        Write-Host "📊 LLVM COMPOSITION SUMMARY REPORT"
        Write-Host "=========================================================="
        Write-Host "• Native ARM64 Binaries    : $arm64Count files"
        Write-Host "• Non-ARM64 Binaries       : $emulatedCount files"
        Write-Host "• Total Analyzed Components: $totalFiles files"
        Write-Host "➔ TOTAL NATIVE ARM64 CONCENTRATION : $arm64Percentage %"
        Write-Host "==========================================================`n"

        if ($emulatedCount -gt 0) {
            $emulatedList | Format-Table -Property FileName, Architecture, RelativePath -AutoSize
        }

        # 2. Corrected Target Summary Generation Block
        # Uses explicit $env:GITHUB_STEP_SUMMARY to bypass local null evaluations
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### 📊 LLVM Binary Composition Audit"
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Metric | Value |"
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| :--- | :--- |"
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| **Native ARM64 Concentration** | **$arm64Percentage %** ($arm64Count/$totalFiles) |"
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Emulated Concentration | $emulatedPercentage % ($emulatedCount/$totalFiles) |"
        
        if ($emulatedCount -gt 0) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### ⚠️ Breakdown of Emulated Components"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| File Name | Detected Architecture | Relative Path |"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| :--- | :--- | :--- |"
            
            # Clean string parsing without template token collision risks
            foreach ($item in $emulatedList) {
                Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| `$($item.FileName) | $($item.Architecture) | `$($item.RelativePath) |"
            }
        } else {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### ✅ Purity Check Passed"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "Zero emulated files found. Toolchain profile configuration is 100% native ARM64."
        }
