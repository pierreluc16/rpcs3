name: Windows 11 ARM OOBE Complete Detection Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  oobe-detection:
    name: Verify Windows 11 ARM OOBE Finalization
    # Utilizes the native Windows 11 ARM64 runner infrastructure
    runs-on: windows-11-arm
    timeout-minutes: 30

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      # STEP 1: Execute your target system initialization or deployment
      - name: Run Windows 11 ARM OOBE Process
        id: oobe_execution
        continue-on-error: true # Safe interception: prevents abrupt pipeline termination
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "Initializing target Windows 11 ARM deployment tasks..."
          
          # Replace the line below with your actual provisioning script or VM boot command
          # Example: .\scripts\Deploy-Image.ps1 -Target "ARM64"
          Write-Host "Simulation: System configuration payload executed."

      # STEP 2: Native internal detection for active OOBE state
      - name: Detect Active OOBE Status
        id: oobe_detector
        continue-on-error: true
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "=== Commencing OOBE State Detection ==="
          
          # 1. Compile C# Win32 wrapper to interop with Kernel32.dll for OOBEComplete API
          $TypeDef = @"
          using System;
          using System.Runtime.InteropServices;
          namespace Win32API {
              public class OobeCheck {
                  [DllImport("kernel32.dll", CharSet = CharSet.Auto, SetLastError = true)]
                  public static extern int OOBEComplete(ref int bIsOOBEComplete);
              }
          }
          "@
          Add-Type -TypeDefinition $TypeDef -Language CSharp
          
          $IsOOBEComplete = 0
          $Result = [Win32API::OobeCheck]::OOBEComplete([ref]$IsOOBEComplete)
          
          # 2. Extract Process Owner telemetry from the current active shell
          $ExplorerProcess = Get-CimInstance -ClassName 'Win32_Process' -Filter "Name = 'explorer.exe'" -ErrorAction Ignore
          $OwnerInfo = Invoke-CimMethod -InputObject $ExplorerProcess -MethodName GetOwner -ErrorAction Ignore
          $ActiveShellUser = $OwnerInfo.User
          
          Write-Host "Telemetry -> OOBE API Code Response: $Result"
          Write-Host "Telemetry -> API IsOOBEComplete Flag: $IsOOBEComplete (1 = Complete, 0 = In OOBE)"
          Write-Host "Telemetry -> Active Windows Explorer Owner: $ActiveShellUser"
          Write-Host "========================================="
          
          # 3. Assert Criteria: Fail step if API indicates OOBE or user is 'defaultuser0'
          if ($IsOOBEComplete -eq 0) {
              throw "[CRITICAL] Windows API states that the system is stuck inside the active OOBE loop."
          }
          
          if ($ActiveShellUser -eq 'defaultuser0') {
              throw "[CRITICAL] Session owner is 'defaultuser0'. The configuration phase never finalized."
          }
          
          Write-Host "[SUCCESS] Windows 11 ARM has successfully passed OOBE."

      # STEP 3: Handle execution crashes from Step 1 OR assertion failures from Step 2
      - name: Intercept and Handle Critical OOBE Failures
        if: steps.oobe_execution.outcome == 'failure' || steps.oobe_detector.outcome == 'failure'
        shell: powershell
        run: |
          Write-Host "::error::[OOBE DETECTED CRITICAL FAILURE] Execution halted. The target OS failed to resolve OOBE or crashed during provisioning."
          
          # Optional: Gather diagnostic files for review
          # Compress-Archive -Path "C:\Windows\Panther\" -DestinationPath ".\oobe_panther_logs.zip" -ErrorAction Ignore
          
          exit 1
