name: Test with Custom Kernel on ARM64

on: [push]

jobs:
  qemu-kernel-test:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install QEMU for ARM64
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-arm qemu-utils initramfs-tools iproute2

      - name: Download Target Kernel
        run: |
          # Replace with your actual URL providing an ARM64 vmlinuz binary
          wget -q https://your-kernel-storage.com -O vmlinuz

      - name: Prepare Guest Test Script
        run: |
          # Create custom initramfs local script
          sudo mkdir -p /etc/initramfs-tools/scripts/init-bottom

          cat << 'EOF' | sudo tee /etc/initramfs-tools/scripts/init-bottom/run_tests.sh
          #!/bin/sh
          PREREQ=""
          prereqs() { echo "$PREREQ"; }
          case $1 in prereqs) prereqs; exit 0;; esac

          echo "=== EXECUTING TEST COMMANDS IN QEMU ==="
          ip link add vxlan-br type bridge
          ip link set dev vxlan-br up
          ip link add vx-test type vxlan id 101 remote 172.20.25.23 dev vxlan-br dstport 14788
          ip -d link show dev vx-test
          echo "exit code: $?"

          # Shut down QEMU after running commands
          echo b > /proc/sysrq-trigger
          EOF

          sudo chmod +x /etc/initramfs-tools/scripts/init-bottom/run_tests.sh
          mkinitramfs -o initrd.img

      - name: Run Kernel in QEMU
        run: |
          timeout --foreground 2m qemu-system-aarch64 \
            -enable-kvm \
            -machine virt \
            -cpu host \
            -m 1024 \
            -kernel vmlinuz \
            -initrd initrd.img \
            -nographic \
            -append "console=ttyAMA0 root=/dev/ram0 panic=1 quiet"
