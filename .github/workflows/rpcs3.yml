name: Official Podman 6.0.1 Source Compilation

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  XDG_RUNTIME_DIR: /home/runner/.runtime
  CONTAINER_ENGINE_ROOTLESS: "1"

jobs:
  build-and-run:
    runs-on: ubuntu-26.04

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install Official Build and Runtime Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          btrfs-progs \
          git \
          go-md2man \
          iptables \
          libassuan-dev \
          libbtrfs-dev \
          libc6-dev \
          libdevmapper-dev \
          libglib2.0-dev \
          libgpgme-dev \
          libgpg-error-dev \
          libprotobuf-c-dev \
          libprotobuf-dev \
          libseccomp-dev \
          libselinux1-dev \
          libsystemd-dev \
          pkg-config \
          uidmap \
          dbus-user-session \
          libapparmor-dev \
          containernetworking-plugins \
          fuse-overlayfs

    - name: Setup Official Go Environment
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Clone and Compile Official Podman v6.0.1
      run: |
        git clone --depth 1 --branch v6.0.1 https://github.com/containers/podman.git
        cd podman
        make BUILDTAGS="seccomp apparmor" PREFIX=/usr
        sudo make install PREFIX=/usr

    - name: Download Upstream Default Container Configurations
      run: |
        sudo mkdir -p /etc/containers
        sudo curl -L -o /etc/containers/registries.conf https://raw.githubusercontent.com/containers/image/main/registries.conf
        sudo curl -L -o /etc/containers/policy.json https://raw.githubusercontent.com/containers/image/main/default-policy.json

    - name: Configure Forceful Rootless Storage Path Maps
      run: |
        sudo usermod --add-subuids 100000-165535 --add-subgids 100000-165535 $USER
        
        mkdir -p "$XDG_RUNTIME_DIR"
        chmod 700 "$XDG_RUNTIME_DIR"
        mkdir -p ~/.config/containers
        
        cat <<EOF > ~/.config/containers/storage.conf
        [storage]
        driver = "overlay"
        runroot = "/home/runner/.runtime/containers"
        graphroot = "/home/runner/.local/share/containers/storage"
        
        [storage.options.overlay]
        mount_program = "/usr/bin/fuse-overlayfs"
        EOF
        
        podman system migrate

    - name: Verify Upstream Release Version
      run: |
        podman --version

    - name: Generate Containerfile
      run: |
        cat <<EOF > Containerfile
        FROM ubuntu:26.04
        RUN apt-get update && apt-get install -y curl && apt-get clean
        CMD ["echo", "Hello from Podman 6.0.1 on Ubuntu 26.04"]
        EOF

    - name: Build image with Podman 6.0.1
      run: |
        podman build -t my-ubuntu-app:26.04 -f Containerfile .
