name: Test LLVM LoadLibraryExW Error and Fix

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test-bug-report:
    runs-on: windows-11-arm

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # =========================================================================
    # PHASE 1: TEST PRE-INSTALLED LLVM (EXPECT FAILURE)
    # =========================================================================
    - name: 1. Test Pre-installed LLVM (Expect LoadLibrary Failure)
      shell: pwsh
      continue-on-error: true # Continues workflow when the bug triggers
      id: test_preinstalled
      run: |
        $dllPath = "C:\Program Files\LLVM\bin\libclang.dll"
        Write-Host "Targeting Pre-installed Path: $dllPath"
        
        # Define native Windows kernel32 LoadLibraryExW method signature via P/Invoke
        $signature = '[DllImport("kernel32.dll", SetLastError = true, CharSet = CharSet.Unicode)] public static extern IntPtr LoadLibraryExW(string lpLibFileName, IntPtr hFile, uint dwFlags);'
        $type = Add-Type -MemberDefinition $signature -Name "Kernel32" -Namespace "Win32" -PassThru

        Write-Host "Invoking native ARM64 LoadLibraryExW on the emulated x86_64 DLL..."
        # 0x00000008 = LOAD_WITH_ALTERED_SEARCH_PATH (Matches how rust bindgen loads libraries)
        $handle = $type::LoadLibraryExW($dllPath, [IntPtr]::Zero, 0x00000008)

        if ($handle -eq [IntPtr]::Zero) {
            $errorCode = [System.Runtime.InteropServices.Marshal]::GetLastWin32Error()
            Write-Host "❌ BUG REPRODUCED: LoadLibraryExW failed as reported in actions/runner-images#14085."
            Write-Host "System Win32 Error Code: $errorCode (Error 193 = ERROR_BAD_EXE_FORMAT)"
        } else {
            Write-Host "⚠️ Unexpected Success: The pre-installed library loaded without issue."
            $freeSignature = '[DllImport("kernel32.dll", SetLastError = true)] public static extern bool FreeLibrary(IntPtr hModule);'
            $freeType = Add-Type -MemberDefinition $freeSignature -Name "Kernel32Free" -Namespace "Win32" -PassThru
            $freeType::FreeLibrary($handle) | Out-Null
        }

    # =========================================================================
    # PHASE 2: APPLY FIX
    # =========================================================================
    - name: 2. Apply Fix (Install Native LLVM ARM64)
      uses: KyleMayes/install-llvm-action@v2
      with:
        version: "20.1.0"
        arch: arm64

    # =========================================================================
    # PHASE 3: TEST FIX (EXPECT SUCCESS)
    # =========================================================================
    - name: 3. Test Fixed LLVM Environment (Expect LoadLibrary Success)
      shell: pwsh
      run: |
        $fixedDllPath = "$env:LLVM_PATH\bin\libclang.dll"
        Write-Host "Targeting Injected Native Path: $fixedDllPath"

        $signature = '[DllImport("kernel32.dll", SetLastError = true, CharSet = CharSet.Unicode)] public static extern IntPtr LoadLibraryExW(string lpLibFileName, IntPtr hFile, uint dwFlags);'
        $type = Add-Type -MemberDefinition $signature -Name "Kernel32Fixed" -Namespace "Win32" -PassThru

        Write-Host "Invoking native ARM64 LoadLibraryExW on the newly installed Native ARM64 DLL..."
        $handle = $type::LoadLibraryExW($fixedDllPath, [IntPtr]::Zero, 0x00000008)

        if ($handle -eq [IntPtr]::Zero) {
            $errorCode = [System.Runtime.InteropServices.Marshal]::GetLastWin32Error()
            Write-Error "❌ FIX FAILED: LoadLibraryExW still dropped a Win32 Error: $errorCode"
            exit 1
        } else {
            Write-Host "✅ FIX VERIFIED SUCCESSFULLY!"
            Write-Host "The native ARM64 libclang.dll was safely loaded into memory space."
            Write-Host "Valid Memory Pointer Address: $handle"
            
            $freeSignature = '[DllImport("kernel32.dll", SetLastError = true)] public static extern bool FreeLibrary(IntPtr hModule);'
            $freeType = Add-Type -MemberDefinition $freeSignature -Name "Kernel32FreeFixed" -Namespace "Win32" -PassThru
            $freeType::FreeLibrary($handle) | Out-Null
        }
