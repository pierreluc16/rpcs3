name: Ultimate Clang Error Test

on: [push, workflow_dispatch]

jobs:
  test-both-errors:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Replicate Rust Clang-Sys Behavior
        id: diagnostic
        run: |
          ERROR_1=false
          ERROR_2=false

          echo "=================================================="
          echo "🔍 TESTING ERROR 1: llvm-config Execution"
          echo "=================================================="
          # Attempt the exact command the crate failed on: "llvm-config --prefix"
          if ! llvm-config --prefix > /dev/null 2>&1; then
            echo "❌ ERROR 1 IS PRESENT!"
            echo "   Reason: 'llvm-config' executable cannot be found in PATH."
            echo "   Rust Error: (error: No such file or directory (os error 2))"
            ERROR_1=true
          else
            echo "✅ ERROR 1 IS FIXED!"
            echo "   Location: $(which llvm-config)"
            echo "   Prefix path: $(llvm-config --prefix)"
          fi

          echo ""
          echo "=================================================="
          echo "🔍 TESTING ERROR 2: libclang Shared Library Search"
          echo "=================================================="
          # Scan common library directories for standard libclang files
          LIBCLANG_FILES=$(find /usr/lib /usr/local/lib /lib -name "libclang.so" -o -name "libclang-*.so" 2>/dev/null)
          
          if [ -z "$LIBCLANG_FILES" ]; then
            echo "❌ ERROR 2 IS PRESENT!"
            echo "   Reason: No shared objects matching ['libclang.so', 'libclang-*.so'] found."
            echo "   Rust Error: called Result::unwrap() on an Err value"
            ERROR_2=true
          else
            echo "✅ ERROR 2 IS FIXED!"
            echo "   Found matching libraries:"
            echo "$LIBCLANG_FILES"
          fi

          echo ""
          echo "=================================================="
          echo "📊 FINAL DIAGNOSTIC VERDICT"
          echo "=================================================="
          if [ "$ERROR_1" = true ] || [ "$ERROR_2" = true ]; then
            echo "🚨 Result: Environment is BROKEN. Rust compilation will fail."
            exit 1
          else
            echo "🎉 Result: Environment is PERFECT. Ready for Cargo build."
          fi
