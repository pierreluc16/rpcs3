name: Test with Custom Kernel on ARM64

on: [push]

jobs:
  qemu-kernel-test:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install QEMU for ARM64
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-arm qemu-utils initramfs-tools cpio

      - name: Download Target Kernel
        run: |
          # Replace with your actual URL providing an ARM64 vmlinuz binary
          wget -q https://your-kernel-storage.com -O vmlinuz

      - name: Create Custom Initramfs with Execution Script
        run: |
          # Create a working directory for initramfs modification
          mkdir -p custom_root/bin custom_root/sbin custom_root/proc custom_root/sys custom_root/dev
          
          # Create init script inside guest initramfs
          cat << 'EOF' > custom_root/init
          #!/bin/sh
          mount -t proc none /proc
          mount -t sysfs none /sys
          mount -t devtmpfs none /dev

          echo "=== Executing Guest Commands ==="
          ip link add vxlan-br type bridge
          ip link set dev vxlan-br up
          ip link add vx-test type vxlan id 101 remote 172.20.25.23 dev vxlan-br dstport 14788
          ip -d link show dev vx-test
          STATUS=$?
          echo "exit code: $STATUS"

          # Halt VM cleanly
          echo "poweroff" > /proc/sysrq-trigger
          EOF

          chmod +x custom_root/init

          # Extract system default initramfs base and append custom init script
          mkinitramfs -o base_initrd.img
          cd custom_root && find . | cpio -o -H newc | gzip -9 > ../custom_overlay.img && cd ..
          cat base_initrd.img custom_overlay.img > initrd.img

      - name: Run Kernel in QEMU
        run: |
          timeout --foreground 2m qemu-system-aarch64 \
            -enable-kvm \
            -machine virt \
            -cpu host \
            -m 1024 \
            -kernel vmlinuz \
            -initrd initrd.img \
            -nographic \
            -append "console=ttyAMA0 root=/dev/ram0 panic=1 quiet init=/init"
