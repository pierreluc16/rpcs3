name: Build and Test Ubuntu 26.04 Image with Podman 6.0.1
on:  
  push:    
    branches: [ "main" ]  
  pull_request:    
    branches: [ "main" ]  
  workflow_dispatch:

jobs:
  podman-build:
    runs-on: ubuntu-26.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git golang-go make libseccomp-dev libgpgme-dev \
            libassuan-dev libbtrfs-dev libdevmapper-dev pkg-config \
            uidmap fuse-overlayfs iptables btrfs-progs crun

      - name: Compile Podman 6.0.1 Source
        run: |
          mkdir -p src
          git clone --depth 1 --branch v6.0.1 https://github.com/containers/podman src/podman-repo
          cd src/podman-repo
          
          # Native compilation with standard build tags
          make BUILDTAGS="seccomp apparmor" podman
          
          # Inject the compiled binary into the native path
          sudo cp bin/podman /usr/bin/podman
          sudo chmod +x /usr/bin/podman

      - name: Configure Rootless User Namespaces & Storage
        run: |
          echo "=== Configuring Kernel Security for Rootless Execution ==="
          sudo sysctl -w kernel.unprivileged_userns_clone=1
          
          # Ensure subuid/subgid are configured for the runner user
          if ! grep -q "runner" /etc/subuid; then
            echo "runner:100000:65536" | sudo tee -a /etc/subuid
            echo "runner:100000:65536" | sudo tee -a /etc/subgid
          fi
          
          # Create user-space container directories
          mkdir -p /home/runner/.local/share/containers/storage
          mkdir -p /home/runner/.config/containers
          
          # Force Podman to use rootless storage paths and use crun
          cat <<EOF > /home/runner/.config/containers/storage.conf
          [storage]
          driver = "overlay"
          graphroot = "/home/runner/.local/share/containers/storage"
          [storage.options.overlay]
          mount_program = "/usr/bin/fuse-overlayfs"
          EOF

      - name: Clear Invalid Global Registries Configuration
        run: |
          # Clear out-of-date v1 system configurations causing Podman 6.0.1 engine crashes
          sudo rm -f /etc/containers/registries.conf

      - name: Verify Exact Installed Version
        run: |
          podman --version
          podman info

      - name: Create Containerfile
        run: |
          cat <<EOF > Containerfile
          # Fully qualified name bypasses the need for registries.conf
          FROM docker.io/library/ubuntu:26.04
          
          RUN apt-get update && apt-get install -y \
              curl \
              ca-certificates \
              && rm -rf /var/lib/apt/lists/*
              
          CMD ["echo", "Hello from Ubuntu 26.04 inside verified Podman 6.0.1!"]
          EOF

      - name: Build image with Podman 6.0.1
        run: |
          podman build -t my-ubuntu-app:26.04 -f Containerfile .

      - name: Test the built image
        run: |
          podman run --rm my-ubuntu-app:26.04
