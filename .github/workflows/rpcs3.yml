name: Verify Pre-installed LLVM & Libclang

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger from the GitHub UI

jobs:
  check-preinstalled-tools:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Check Out Source Code
        uses: actions/checkout@v4

      - name: Inspect Runner Platform
        run: |
          echo "=== Hardware Architecture ==="
          uname -m
          echo "=== OS Version ==="
          lsb_release -a

      - name: Locate llvm-config
        id: locate-llvm
        run: |
          echo "=== Checking Global Path ==="
          if command -v llvm-config &> /dev/null; then
            echo "llvm-config is globally available!"
            which llvm-config
            echo "LLVM_CMD=llvm-config" >> $GITHUB_ENV
          else
            echo "llvm-config is NOT in the global PATH."
            echo "Searching for versioned binaries (e.g., llvm-config-18) in /usr/bin..."
            
            # Find the first versioned llvm-config available (Ubuntu often prefixes them)
            VERSIONED_CONFIG=$(ls /usr/bin/llvm-config-* 2>/dev/null | head -n 1)
            
            if [ -n "$VERSIONED_CONFIG" ]; then
              echo "Found versioned tool: $VERSIONED_CONFIG"
              echo "LLVM_CMD=$VERSIONED_CONFIG" >> $GITHUB_ENV
            else
              echo "Error: No version of llvm-config found on this system."
              exit 1
            fi
          fi

      - name: Validate llvm-config Output
        run: |
          echo "=== LLVM Version ==="
          ${{ env.LLVM_CMD }} --version
          
          echo "=== Compiler Flags ==="
          ${{ env.LLVM_CMD }} --cflags
          
          # Extract the major version for path lookups later
          MAJOR_VER=$(${{ env.LLVM_CMD }} --version | cut -d. -f1)
          echo "LLVM_MAJOR_VERSION=$MAJOR_VER" >> $GITHUB_ENV

      - name: Locate libclang and Headers
        run: |
          echo "=== Searching for libclang shared library ==="
          find /usr/lib /usr/local/lib -name "libclang.so*" 2>/dev/null || echo "No libclang.so found in standard paths."
          
          echo "=== Searching for Clang C Headers ==="
          find /usr/include /usr/local/include -name "Index.h" 2>/dev/null || echo "No Index.h found in standard paths."

      - name: Test Compilation and Runtime
        run: |
          echo "=== Creating C Test File ==="
          cat << 'EOF' > test_clang.c
          #include <clang-c/Index.h>
          #include <stdio.h>

          int main() {
              CXIndex index = clang_createIndex(0, 0);
              if (index != NULL) {
                  printf("SUCCESS: libclang is installed and fully working on ARM64!\n");
                  clang_disposeIndex(index);
                  return 0;
              }
              fprintf(stderr, "ERROR: Failed to initialize libclang index.\n");
              return 1;
          }
          EOF

          echo "=== Attempting Native Compilation ==="
          # Compile using flags provided by the found llvm-config binary
          gcc test_clang.c -o test_clang $(${-- env.LLVM_CMD --} --cflags) $(${-- env.LLVM_CMD --} --ldflags) -lclang

          echo "=== Running Compiled Binary ==="
          ./test_clang
