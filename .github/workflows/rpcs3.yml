name: Windows 11 ARM LLVM Detection (Dumpbin)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  check-llvm-architecture:
    # Target GitHub's official Windows 11 ARM hosted runner
    runs-on: windows-11-arm
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Detect LLVM Binary Architecture (Dumpbin)
      id: detect_llvm
      shell: cmd
      run: |
        :: Initialize Visual Studio Developer Environment Variables
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" arm64
        
        :: Default path for LLVM installation
        set "CLANG_PATH=C:\Program Files\LLVM\bin\clang.exe"
        
        :: Verify file exists before analyzing
        if not exist "%CLANG_PATH%" (
            echo ERROR: LLVM/Clang was not found at %CLANG_PATH%
            exit /b 1
        )
        
        echo Analyzing binary: %CLANG_PATH%
        
        :: Extract the machine architecture line from headers
        dumpbin /headers "%CLANG_PATH%" | findstr /i "machine" > architecture_output.txt
        type architecture_output.txt
        
        :: Check if the output lists x64 (AMD64) or ARM64 and set the GitHub Environment variable
        findstr /i "x64" architecture_output.txt >nul
        if %errorlevel%==0 (
            echo ⚠️ DETECTED: LLVM binary is an x86_64 version running under Windows emulation.
            echo LLVM_IS_X86_64=true>>"%GITHUB_ENV%"
            goto :end
        )
        
        findstr /i "ARM64" architecture_output.txt >nul
        if %errorlevel%==0 (
            echo ✅ SUCCESS: LLVM binary is natively compiled for ARM64.
            echo LLVM_IS_X86_64=false>>"%GITHUB_ENV%"
            goto :end
        )
        
        :: Fallback if neither matches explicitly
        echo Unknown machine type detected.
        echo LLVM_IS_X86_64=unknown>>"%GITHUB_ENV%"
        
        :end
        del architecture_output.txt

    - name: Action if LLVM is Emulated (x86_64)
      if: env.LLVM_IS_X86_64 == 'true'
      shell: cmd
      run: |
        echo This step runs because LLVM is emulated (x86_64).
        :: Add fallback tools or step configurations here

    - name: Action if LLVM is Native (ARM64)
      if: env.LLVM_IS_X86_64 == 'false'
      shell: cmd
      run: |
        echo This step runs because LLVM is natively running on ARM64!
        "C:\Program Files\LLVM\bin\clang.exe" --version
