name: Test on macOS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest   # se résout en macOS 15 ARM64 (Apple Silicon)
            name: macos

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install package
        run: pip install -e .

      - name: Run tests
        run: pytest # Remplacez par votre outil (ex: python -m unittest, pytest, tox)
