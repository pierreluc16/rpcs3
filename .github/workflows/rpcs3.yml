name: Test Real Chromium Depot_Tools Failure

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows manual pipeline triggering from the GitHub UI

jobs:
  reproduce-real-google-tools:
    runs-on: windows-11-arm

    steps:
    - name: Checkout Source Context
      uses: actions/checkout@v4

    - name: Step 1 - Clone and Initialize Google Depot Tools
      shell: cmd
      run: |
        echo Cloning official Chromium depot_tools repository...
        git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git C:\depot_tools
        
        echo Appending depot_tools to the front of system PATH...
        echo C:\depot_tools>> %GITHUB_PATH%

    - name: Step 2 - Bootstrap gclient and Python
      shell: cmd
      env:
        # Prevent depot_tools from auto-updating during initialization steps if needed
        DEPOT_TOOLS_UPDATE: 1
      run: |
        cd C:\depot_tools
        echo Forcing first-run bootstrap to download Python, GN, and Ninja...
        :: Running gclient with no args downloads Windows specific tools required by Google
        call gclient
        
    - name: Step 3 - Simulate Chromium Project Environment
      shell: cmd
      run: |
        echo Creating a mock workspace for a Chromium engine setup...
        mkdir C:\chromium_repro
        cd C:\chromium_repro
        
        echo Generating a dummy workspace configuration (.gclient)...
        (
        echo solutions = [
        echo   {
        echo     "name": "src",
        echo     "url": "https://googlesource.com",
        echo     "deps_file": "DEPS",
        echo     "managed": False,
        echo   },
        echo ]
        ) > .gclient

    - name: Step 4 - Force Local SDK Evaluation (Triggers Bug #14061)
      shell: cmd
      env:
        # CRITICAL: Forces Google to evaluate the runner's native Windows SDK package
        DEPOT_TOOLS_WIN_TOOLCHAIN: 0
      run: |
        cd C:\depot_tools
        echo Directing Python execution straight into Google's real validation tool...
        
        :: Executing the isolated toolchain validator packaged inside depot_tools.
        :: This invokes the real code blocking your builds.
        python win_toolchain.py
