name: Download and Install US Google Chrome

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-install:
    runs-on: ubuntu-24.04-arm  # Optimized for ARM64 runners
    
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Download US Chrome Installer via Firefox User-Agent
        run: |
          # 1. Base download portal for the United States configuration
          URL="https://www.google.com/intl/en-us/chrome/"
          
          # 2. Spoofed Mozilla Firefox identity string 
          FIREFOX_UA="Mozilla/5.0 (X11; Linux aarch64; rv:128.0) Gecko/20100101 Firefox/128.0"
          
          # 3. Save the page footprint while forcing US english localization paths
          wget --user-agent="$FIREFOX_UA" \
               --header="Accept-Language: en-US,en;q=0.9" \
               --trust-server-names \
               -O google-chrome-us-landing.html \
               "$URL"

      - name: Configure Secure APT Keyrings for ARM64 Architecture
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg
          
          # Create dedicated directory for repository authentication
          sudo mkdir -p /usr/share/keyrings
          
          # Fetch and translate the verification keys securely 
          curl -fSsL https://google.com | gpg --dearmor | sudo tee /usr/share/keyrings/google-chrome.gpg > /dev/null
          
          # Set up specific ARM64 package pointers
          echo "deb [arch=arm64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://google.com stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list

      - name: Update Package Index and Run Installer Engine
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Validate Binary Version Output
        run: |
          # Confirms the installation succeeded on the ARM processor layout
          google-chrome --version

      - name: Archive HTML Landing Page to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: google-chrome-us-webpage
          path: google-chrome-us-landing.html
          retention-days: 7
