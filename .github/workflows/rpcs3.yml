name: Official Podman 6.0.1 Source Compilation

on:
  push:
    branches: [ "main" ]
  # --- BLANK MANUAL LAUNCH BUTTON ---
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-26.04

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install Official Build and Runtime Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          btrfs-progs \
          git \
          go-md2man \
          iptables \
          libassuan-dev \
          libbtrfs-dev \
          libc6-dev \
          libdevmapper-dev \
          libglib2.0-dev \
          libgpgme-dev \
          libgpg-error-dev \
          libprotobuf-c-dev \
          libprotobuf-dev \
          libseccomp-dev \
          libselinux1-dev \
          libsystemd-dev \
          pkg-config \
          uidmap \
          dbus-user-session \
          libapparmor-dev

    - name: Setup Official Go Environment
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Clone and Compile Official Podman v6.0.1
      run: |
        git clone --depth 1 --branch v6.0.1 https://github.com/containers/podman.git
        cd podman
        # Build using native secure seccomp and apparmor flags recommended by upstream
        make BUILDTAGS="seccomp apparmor" PREFIX=/usr
        sudo make install PREFIX=/usr
        
    - name: Configure Rootless Execution
      run: |
        sudo usermod --add-subuids 100000-165535 --add-subgids 100000-165535 $USER
        podman system migrate

    - name: Verify Upstream Release Version
      run: |
        podman --version

    - name: Execute Pod Workflow
      run: |
        echo "=== Building App ==="
        podman build -t local/app:v6 -f - . <<EOF
        FROM ubuntu:26.04
        RUN apt-get update && apt-get install -y curl
        EXPOSE 80
        CMD ["python3", "-m", "http.server", "80"]
        EOF

        echo "=== Starting Netavark Mesh Pod ==="
        podman pod create --name active-pod -p 8080:80
        podman run -d --pod active-pod --name web-service local/app:v6
        
        sleep 3
        curl --fail http://localhost:8080

    - name: Generate Production K8s Resource
      run: |
        podman kube generate active-pod > deployment-26.04.yaml
