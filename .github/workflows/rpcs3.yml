name: Check Clang and LLVM Binaries (Ubuntu 24.04 ARM)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  diagnostic:
    name: Locate Clang Tools Natively
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # --- STEP 1: SEARCH FOR LLVM-CONFIG ---
      - name: Find llvm-config Path
        id: scan_llvm
        run: |
          echo "=========================================================="
          echo "        1. SEARCHING FOR LLVM-CONFIG BINARIES             "
          echo "=========================================================="
          
          # Find any instance of llvm-config in the system
          LLVM_PATH=$(sudo find /usr -name "llvm-config*" -type f -executable | head -n 1)
          
          if [ -n "$LLVM_PATH" ]; then
            echo "FOUND_LLVM=true" >> $GITHUB_ENV
            echo "✅ Found valid executable at: $LLVM_PATH"
          else
            echo "FOUND_LLVM=false" >> $GITHUB_ENV
            echo "❌ No llvm-config found anywhere in /usr."
          fi

      # --- STEP 2: SEARCH FOR LIBCLANG.SO ---
      - name: Find libclang.so Path
        id: scan_libclang
        run: |
          echo "=========================================================="
          echo "        2. SEARCHING FOR LIBCLANG SHARED LIBRARIES        "
          echo "=========================================================="
          
          # Find any instance of libclang.so (including versioned variants like .so.1)
          CLANG_LIB=$(sudo find /usr -name "libclang.so*" -type f | head -n 1)
          
          if [ -n "$CLANG_LIB" ]; then
            echo "FOUND_CLANG=true" >> $GITHUB_ENV
            echo "✅ Found shared library variant at: $CLANG_LIB"
          else
            echo "FOUND_CLANG=false" >> $GITHUB_ENV
            echo "❌ No libclang.so files found anywhere in /usr."
          fi

      # --- STEP 3: EXPLICIT INSTALLATION CONFIRMATION ---
      - name: Confirm Installation Status
        run: |
          echo "=========================================================="
          echo "              FINAL INSTALLATION VERIFICATION             "
          echo "=========================================================="
          
          if [ "${{ env.FOUND_LLVM }}" = "true" ] && [ "${{ env.FOUND_CLANG }}" = "true" ]; then
            echo "✅ SUCCESS: Both llvm-config and libclang.so are verified as INSTALLED on this image."
            echo "They exist on the system, though they may require environment variable mappings to be discovered by Rust."
          else
            echo "❌ FAILURE: One or both core dependencies are completely missing from the system."
            
            if [ "${{ env.FOUND_LLVM }}" != "true" ]; then
              echo "  -> Missing: llvm-config utility"
            fi
            if [ "${{ env.FOUND_CLANG }}" != "true" ]; then
              echo "  -> Missing: libclang shared library engine"
            fi
            
            exit 1
          fi
