name: Podman 6.0.1 on Ubuntu 26.04 LTS

on:
  push:
    branches: [ "main" ]
  # --- BLANK MANUAL LAUNCH BUTTON ---
  workflow_dispatch:

jobs:
  podman-6-pipeline:
    runs-on: ubuntu-26.04 
    
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Pull and Install Static Podman 6.0.1 Binaries
      run: |
        echo "=== Installing Engine Dependencies ==="
        sudo apt-get update
        sudo apt-get install -y uidmap dbus-user-session conmon iptables catatonit
        
        echo "=== Downloading Podman 6.0.1 Statically Linked Binary ==="
        # Fetching the official compiled static assets directly from upstream containers release
        curl -fsSL https://github.com/containers/podman/releases/download/v6.0.1/podman-remote-static-linux_amd64.tar.gz -o podman.tar.gz
        tar -xzf podman.tar.gz
        
        # Move the true binary safely into execution spaces
        sudo mv bin/podman-remote-static-linux_amd64 /usr/local/bin/podman
        rm -rf bin podman.tar.gz
        
        echo "=== Configuring User Sub-UIDs for Rootless ==="
        sudo usermod --add-subuids 100000-165535 --add-subgids 100000-165535 $USER
        podman system migrate

    - name: Verify Version Block
      run: |
        podman --version

    - name: Execute Pod Workflow
      run: |
        echo "=== Building App ==="
        podman build -t local/app:v6 -f - . <<EOF
        FROM ubuntu:26.04
        RUN apt-get update && apt-get install -y curl
        EXPOSE 80
        CMD ["python3", "-m", "http.server", "80"]
        EOF

        echo "=== Starting Netavark Mesh Pod ==="
        podman pod create --name active-pod -p 8080:80
        podman run -d --pod active-pod --name web-service local/app:v6
        
        sleep 3
        curl --fail http://localhost:8080

    - name: Generate Production K8s Resource
      run: |
        podman kube generate active-pod > deployment-26.04.yaml
