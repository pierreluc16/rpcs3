name: Build and Use Latest Podman, Buildah, & Skopeo (Ubuntu 26.04)

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows manual pipeline triggering from the GitHub Actions tab

jobs:
  build-and-run:
    runs-on: ubuntu-26.04
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Ubuntu 26.04 Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          btrfs-progs \
          git \
          golang-go \
          go-md2man \
          libassuan-dev \
          libbtrfs-dev \
          libc6-dev \
          libdevmapper-dev \
          libglib2.0-dev \
          libgpgme-dev \
          libgpg-error-dev \
          libprotobuf-dev \
          libprotobuf-c-dev \
          libseccomp-dev \
          libselinux1-dev \
          libsystemd-dev \
          pkg-config \
          make \
          runc \
          uidmap

    # --- COMPILE SKOPEO ---
    - name: Clone and Build Skopeo (Latest)
      run: |
        git clone https://github.com/containers/skopeo.git src/github.com/containers/skopeo
        cd src/github.com/containers/skopeo
        make bin/skopeo
        sudo cp bin/skopeo /usr/local/bin/skopeo
        skopeo --version

    # --- COMPILE BUILDAH ---
    - name: Clone and Build Buildah (Latest)
      run: |
        git clone https://github.com/containers/buildah.git src/github.com/containers/buildah
        cd src/github.com/containers/buildah
        make buildah TAGS="seccomp"
        sudo cp buildah /usr/local/bin/buildah
        buildah --version

    # --- COMPILE PODMAN ---
    - name: Clone and Build Podman (Latest)
      run: |
        git clone https://github.com/containers/podman.git src/github.com/containers/podman
        cd src/github.com/containers/podman
        make podman TAGS="seccomp"
        sudo cp podman /usr/local/bin/podman
        podman --version

    # --- PIPELINE INTEGRATION TEST ---
    - name: 'Test Pipeline: Create Containerfile'
      run: |
        cat <<EOF > Containerfile
        FROM alpine:latest
        RUN apk add --no-cache curl
        ENTRYPOINT ["curl"]
        EOF

    - name: 'Test Pipeline: Build Image via Compiled Buildah'
      run: |
        sudo buildah bud -t localhost/ubuntu26-test:latest .

    - name: 'Test Pipeline: Run & Verify Image via Compiled Podman'
      run: |
        sudo podman images
        sudo podman run --rm localhost/ubuntu26-test:latest --version

    - name: 'Test Pipeline: Extract & Inspect OCI Image via Compiled Skopeo'
      run: |
        # Use Skopeo to migrate the built image out of containers-storage into a raw OCI layout directory
        sudo skopeo copy containers-storage:localhost/ubuntu26-test:latest oci:compiled-oci-image:latest
        
        # Parse and inspect the extracted OCI manifest using Skopeo
        skopeo inspect oci:compiled-oci-image:latest
