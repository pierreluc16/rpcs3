name: Windows 11 ARM64 Native WinForms Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-native-arm64:
    # Targets GitHub's official, native Windows 11 ARM64 runner image
    runs-on: windows-11-arm

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Target the required Python 3.12 version on native ARM64 architecture
      - name: Set up Python 3.12 (ARM64 Native)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'arm64'

      # Install .NET 10 explicitly to ensure the preview/release is present on the runner
      - name: Setup .NET 10 Runtime Environment
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Verify Environment Architecture
        shell: pwsh
        run: |
          Write-Host "=== Architecture Validation ==="
          python -c "import platform; print('OS/Python Machine Target:', platform.machine())"
          dotnet --list-runtimes
          
      - name: Configure Python Virtual Environment
        shell: pwsh
        run: |
          Write-Host "=== Instantiating Virtual Environment ==="
          python -m venv venv
          ./venv/Scripts/Activate.ps1
          python -m pip install --upgrade pip
          python -m pip install clr_loader pythonnet

      - name: Generate Headless Test Script (demo.py)
        shell: pwsh
        run: |
          Write-Host "=== Generating demo.py safely via Here-String ==="
          $code = @'
          import sys
          from pathlib import Path
          import clr_loader
          from pythonnet import set_runtime

          # 1. Dynamically write runtime json configuration mapping to .NET 10
          runtime_json = Path(__file__).parent / "runtime.json"
          runtime_json.write_text("""
          {
            "runtimeOptions": {
              "tfm": "net10.0-windows",
              "frameworks": [
                {
                  "name": "Microsoft.NETCore.App",
                  "version": "10.0.0"
                },
                {
                  "name": "Microsoft.WindowsDesktop.App",
                  "version": "10.0.0"
                }
              ]
            }
          }
          """, encoding="utf-8")

          # 2. Wire up the CoreCLR bridge
          set_runtime(clr_loader.get_coreclr(runtime_config=str(runtime_json)))

          # 3. Import Windows Forms assemblies cleanly
          import clr
          clr.AddReference("System.Windows.Forms")
          import System.Windows.Forms as WinForms

          def main():
              # Instantiate forms engine elements in memory
              form = WinForms.Form()
              form.Text = "Headless Desktop Test"
              form.Show()
              WinForms.Application.DoEvents()
              
              form.Activate()
              WinForms.Application.DoEvents()
              
              active = WinForms.Form.ActiveForm
              print(f"Form.Visible:         {form.Visible}")
              print(f"Form.IsHandleCreated: {form.IsHandleCreated}")
              print(f"Form.ActiveForm:      {active}")
              print()
              
              # Validate via handle state since ActiveForm evaluates to None headlessly
              if form.IsHandleCreated:
                  print("RESULT: Headless WinForms session verified successfully.")
                  print("        The window handle was created flawlessly under .NET 10 ARM64.")
                  if active is None:
                      print("        Note: ActiveForm is None as expected in headless CI.")
                  rc = 0
              else:
                  print("RESULT: Test failed. Handle creation failed.")
                  rc = 1
                  
              form.Close()
              form.Dispose()
              return rc

          if __name__ == "__main__":
              sys.exit(main())
          '@
          Set-Content -Path demo.py -Value $code -Encoding utf8

      - name: Print Debug Script File
        shell: pwsh
        run: |
          Write-Host "=== Verification of Written Script Syntax ==="
          Get-Content demo.py

      - name: Execute Interop Test
        shell: pwsh
        run: |
          Write-Host "=== Executing Python.NET Execution Layer ==="
          ./venv/Scripts/Activate.ps1
          python demo.py
