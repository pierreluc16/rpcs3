name: Diagnostic Environment Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Enables the manual "Run workflow" button in the GitHub Actions UI
  workflow_dispatch:

jobs:
  check-env:
    runs-on: ubuntu-24.04-arm

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Test LLVM Config Existence
      run: |
        echo "=== Searching for global llvm-config ==="
        which llvm-config || echo "No global llvm-config binary found."
        
        echo "=== Searching for versioned llvm-config binaries ==="
        find /usr/bin -name "llvm-config*" 2>/dev/null || true

    - name: Test Libclang Shared Library Presence
      run: |
        echo "=== Searching for libclang.so instances ==="
        find /usr/lib /usr/local/lib /lib -name "libclang.so*" 2>/dev/null || true

    - name: Test Cargo Clang Binding Check
      # Isolates and tests only the clang-sys dependency to see if it passes or crashes
      run: |
        cargo check -p clang-sys --verbose || echo "Check failed as expected without specific environment configuration."
