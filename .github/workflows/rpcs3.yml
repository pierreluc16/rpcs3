name: Brew Double Update

on:
  push:
  workflow_dispatch:

jobs:
  brew:
    strategy:
      fail-fast: false # 👈 Prevents GitHub from canceling other matrix jobs if one fails
      matrix:
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Run brew update twice
        run: brew update && brew update
