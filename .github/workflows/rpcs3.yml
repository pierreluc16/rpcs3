name: Reproduce Windows 11 ARM Headless Issue

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  test-gui-interactivity:
    runs-on: windows-11-arm
    steps:
      - name: 'Dismiss Windows privacy experience (windows-11-arm workaround)'
        # The windows-11-arm image does not suppress the Windows 11 first-logon
        # "Choose privacy settings for your device" screen. It steals foreground on the
        # interactive desktop, blocking NVDA system tests. See:
        # https://github.com
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          
          # --- Debug: capture state before we touch anything ---
          Write-Host '::group::Processes with a visible window'
          Get-Process | Where-Object { $_.MainWindowTitle } | Select-Object Id, ProcessName, MainWindowTitle | Format-Table -AutoSize | Out-String | Write-Host
          Write-Host '::endgroup::'
          
          Write-Host '::group::OOBE / privacy / shell experience processes'
          Get-Process -Name 'CloudExperienceHostBroker', 'UserOOBEBroker', 'ShellExperienceHost', 'StartMenuExperienceHost' -ErrorAction SilentlyContinue | Select-Object Id, ProcessName, MainWindowTitle, StartTime | Format-Table -AutoSize | Out-String | Write-Host
          Write-Host '::endgroup::'
          
          Write-Host '::group::Existing OOBE policy'
          $key = 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\OOBE'
          if (Test-Path $key) {
              Get-ItemProperty -Path $key | Out-String | Write-Host
          } else {
              Write-Host "Policy key '$key' does not exist."
          }
          Write-Host '::endgroup::'
          
          # --- Suppress on any subsequent logon during this job ---
          if (!(Test-Path $key)) { New-Item -Path $key -Force | Out-Null }
          Set-ItemProperty -Path $key -Name 'DisablePrivacyExperience' -Type DWord -Value 1
          Write-Host 'Set DisablePrivacyExperience=1.'
          
          # --- Kill the process rendering the already-visible privacy screen ---
          $targets = 'CloudExperienceHostBroker', 'UserOOBEBroker'
          $killed = Get-Process -Name $targets -ErrorAction SilentlyContinue
          if ($killed) {
              $killed | ForEach-Object { Write-Host "Stopping $($_.ProcessName) (PID $($_.Id))." }
              $killed | Stop-Process -Force -ErrorAction SilentlyContinue
          } else {
              Write-Host 'No CloudExperienceHostBroker / UserOOBEBroker process found.'
          }
          Start-Sleep -Seconds 3
          
          # --- Ensure the shell (explorer) is running so the desktop is available ---
          # The privacy screen can appear before the shell starts; if so, killing it
          # leaves a session with no desktop. Start explorer only when it is absent
          # (do not restart a healthy shell, that would disrupt a working session).
          $explorer = Get-Process -Name 'explorer' -ErrorAction SilentlyContinue
          if ($explorer) {
              Write-Host "explorer.exe already running (PID $($explorer.Id -join ', '))."
          } else {
              Write-Host 'explorer.exe not running; starting it.'
              Start-Process 'explorer.exe'
              Start-Sleep -Seconds 3
          }
          
          # --- Debug: confirm the foreground window after dismissal ---
          Write-Host '::group::Processes with a visible window (after)'
          Get-Process | Where-Object { $_.MainWindowTitle } | Select-Object Id, ProcessName, MainWindowTitle | Format-Table -AutoSize | Out-String | Write-Host
          Write-Host '::endgroup::'

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pythonnet clr-loader

      - name: Create and Run Test Script
        shell: pwsh
        run: |
          # 1. Write runtime.json
          @'
          {
            "runtimeOptions": {
              "tfm": "net8.0-windows",
              "frameworks": [
                {
                  "name": "Microsoft.WindowsDesktop.App",
                  "version": "8.0.0"
                }
              ]
            }
          }
          '@ | Out-File -FilePath runtime.json -Encoding utf8
          
          # 2. Write the complete Python reproduction script
          @'
          import sys
          from pathlib import Path
          import clr_loader
          from pythonnet import set_runtime
          
          def main():
              print("Initializing .NET Core runtime environment...")
              try:
                  # Bind using local runtime config
                  config_path = Path("runtime.json").resolve()
                  rt = clr_loader.get_coreclr(runtime_config=str(config_path))
                  set_runtime(rt)
                  
                  # Import Windows Forms components
                  import clr
                  clr.AddReference("System.Windows.Forms")
                  from System.Windows.Forms import Form, FormCollection, Application
                  
                  print("Testing interactive UI context...")
                  test_form = Form()
                  test_form.Show()
                  
                  # If headless/non-interactive, ActiveForm evaluation or collection is null/empty
                  if Form.ActiveForm is None:
                      print("ERROR: Non-interactive session detected! ActiveForm is None.")
                      return 1
                      
                  print("SUCCESS: Interactive Windows session detected.")
                  test_form.Close()
                  return 0
              except Exception as e:
                  print(f"Exception encountered during evaluation: {e}")
                  return 1
                  
          if __name__ == "__main__":
              sys.exit(main())
          '@ | Out-File -FilePath demo.py -Encoding utf8
          
          # 3. Run the generated file
          python demo.py
