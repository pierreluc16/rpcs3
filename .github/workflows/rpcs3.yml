name: Podman Build Workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: docker.io
  # Must be fully qualified (e.g., docker.io/username/image)
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/ubuntu-app
  IMAGE_TAG: 26.04

jobs:
  podman-pipeline:
    runs-on: ubuntu-26.04 # Uses the Ubuntu 26.04 host runner
    
    steps:
    - name: Checkout Code Base
      uses: actions/checkout@v4

    - name: Registry Login
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | podman login ${{ env:REGISTRY }} \
          -u "${{ secrets.DOCKER_USERNAME }}" \
          --password-stdin

    - name: Build Container Image
      run: |
        podman build \
          --pull \
          -t ${{ env:REGISTRY }}/${{ env:IMAGE_NAME }}:${{ env:IMAGE_TAG }} \
          -f Containerfile .

    - name: Test Container Runtime
      run: |
        # Explicitly targets cgroupfs to safely bypass Systemd 259 driver lockouts
        podman run --cgroup-manager=cgroupfs --rm ${{ env:REGISTRY }}/${{ env:IMAGE_NAME }}:${{ env:IMAGE_TAG }} uname -a

    - name: Push Verified Image
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        podman push ${{ env:REGISTRY }}/${{ env:IMAGE_NAME }}:${{ env:IMAGE_TAG }}
