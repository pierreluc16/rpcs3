name: Test and Confirm Runner Configuration Failure
on:
  workflow_dispatch:

jobs:
  confirm-failure:
    runs-on: ubuntu-26.04
    steps:
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git golang-go make libseccomp-dev libgpgme-dev \
            libassuan-dev libbtrfs-dev libdevmapper-dev pkg-config \
            uidmap fuse-overlayfs iptables

      - name: Compile Native Podman 6.0.1
        run: |
          mkdir -p src
          git clone --depth 1 --branch v6.0.1 https://github.com/containers/podman src/podman-repo
          cd src/podman-repo
          make BUILDTAGS="seccomp" podman
          sudo cp bin/podman /usr/bin/podman

      - name: Expose Runner Script Configuration Vulnerability
        run: |
          echo "=== Step 1: Confirm system-wide configs exist from install-container-tools.sh ==="
          ls -la /etc/containers/
          
          echo "=== Step 2: Triggering Podman 6.0.1 Engine against Runner Files ==="
          # This will read the runner's /etc/containers/ policy and registry files directly.
          # It is expected to fail or throw critical parsing/signature errors due to the V1/V2 clash.
          podman info
