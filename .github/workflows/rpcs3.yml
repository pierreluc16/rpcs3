name: Test Runner Issue 14086 Profile (Windows 11 ARM64)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-issue-behavior-windows:
    # Target the official GitHub-hosted Windows 11 ARM64 runner
    runs-on: windows-11-arm

    steps:
      # 1. Pull the codebase context
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup the Go runtime standard environment
      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      # 3. Print the active compiler environment configurations for logging
      - name: Inspect Pre-existing Toolchain Paths
        shell: pwsh
        run: |
          Write-Host "=== Active Go Environment ==="
          go env
          Write-Host "=== Windows System CC Compiler ==="
          go env CC
          Get-Command gcc -ErrorAction SilentlyContinue | Select-Object Name, Path

      # 4. Generate and test the exact failing Go/C code snippet from Issue #14086
      - name: Reproduce CGO Compilation Step
        # continue-on-error ensures the workflow run doesn't hard-fail when the compilation breaks
        continue-on-error: true
        shell: pwsh
        env:
          CGO_ENABLED: '1'
        run: |
          # Dynamically create the exact test scenario script from the bug report
          $code = @"
          package main
          
          // int foo(){ return 0; }
          import "C"
          
          func main() {
              C.foo()
          }
          "@
          
          Set-Content -Path "bug_repro.go" -Value $code
          
          Write-Host "Attempting compilation on Windows 11 ARM64 to observe error profile..."
          go build bug_repro.go
