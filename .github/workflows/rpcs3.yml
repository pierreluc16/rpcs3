name: Build and Test Ubuntu 26.04 Image with Native Podman 6

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  podman-build:
    runs-on: ubuntu-26.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Official Upstream Podman 6
        run: |
          echo "=== Updating package indexes ==="
          sudo apt-get update -y
          
          echo "=== Installing Native Podman 6 and Security Layout ==="
          # Les paquets officiels de la version 26.04 fournissent nativement la branche 6.0
          sudo apt-get install -y podman uidmap fuse-overlayfs iptables

      - name: Configure Rootless User Namespaces
        run: |
          echo "=== Configuring Kernel Security for Rootless Execution ==="
          # Force le noyau Ubuntu à autoriser la réexécution des espaces de noms
          sudo sysctl -w kernel.unprivileged_userns_clone=1
          
          # Initialise les répertoires locaux de l'utilisateur éphémère du runner
          mkdir -p /home/runner/.local/share/containers/storage
          mkdir -p /home/runner/.config/containers

      - name: Verify Exact Installed Version
        run: |
          podman --version
          podman info

      - name: Create Containerfile
        run: |
          cat <<EOF > Containerfile
          # Le nom de registre complet (strict) reste obligatoire sur Ubuntu 26.04
          FROM docker.io/library/ubuntu:26.04
          
          RUN apt-get update && apt-get install -y \
              curl \
              ca-certificates \
              && rm -rf /var/lib/apt/lists/*
              
          CMD ["echo", "Hello from Ubuntu 26.04 inside working native Podman 6!"]
          EOF

      - name: Build image with Podman 6
        run: |
          podman build -t my-ubuntu-app:26.04 -f Containerfile .

      - name: Test the built image
        run: |
          podman run --rm my-ubuntu-app:26.04
