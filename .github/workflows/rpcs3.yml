name: Test Clang Error Presence

on: [push, workflow_dispatch]

jobs:
  diagnostic-test:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Verify Clang Sys Dependencies
        run: |
          ERROR_DETECTED=false

          echo "=== Testing Error 1: llvm-config execution ==="
          if ! command -v llvm-config &> /dev/null; then
            echo "❌ ERROR DETECTED: 'llvm-config' could not be executed (No such file or directory)."
            ERROR_DETECTED=true
          else
            echo "✅ OK: llvm-config is executable. Version: $(llvm-config --version)"
          fi

          echo ""
          echo "=== Testing Error 2: libclang shared libraries ==="
          # Look for libclang.so files just like clang-sys does
          LIB_MATCHES=$(find /usr/lib /usr/local/lib -name "libclang.so*" 2>/dev/null)
          
          if [ -z "$LIB_MATCHES" ]; then
            echo "❌ ERROR DETECTED: Result::unwrap() will fail. No valid shared libraries matching 'libclang.so' or 'libclang-*.so' found."
            ERROR_DETECTED=true
          else
            echo "✅ OK: Found valid libclang shared libraries at:"
            echo "$LIB_MATCHES"
          fi

          echo ""
          # Force the job to fail if the environment is broken
          if [ "$ERROR_DETECTED" = true ]; then
            echo "⚠️ VERDICT: The environment is broken. Your Rust compilation will fail with the clang-sys error."
            exit 1
          else
            echo "🎉 VERDICT: The environment is clean! Rust clang-sys will compile successfully."
          fi
