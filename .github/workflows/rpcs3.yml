name: Reproduce Windows 11 ARM Headless Issue
on: [push, workflow_dispatch]

jobs:
  reproduce-gui-bug:
    runs-on: windows-11-arm
    steps:
    - uses: actions/checkout@v4
    - name: Create Config and Run Test
      shell: powershell
      run: |
        $runtimeJson = '{"runtimeOptions": {"tfm": "net10.0-windows", "frameworks": [{"name": "Microsoft.NETCore.App", "version": "10.0.0"}]}}'
        $runtimeJson | Out-File -FilePath "runtime.json" -Encoding utf8
        $script = @'
        import sys, clr_loader, clr, System.Windows.Forms as WinForms
        from pathlib import Path
        from pythonnet import set_runtime
        set_runtime(clr_loader.get_coreclr(runtime_config=str(Path(__file__).parent / "runtime.json")))
        clr.AddReference("System.Windows.Forms")
        form = WinForms.Form()
        form.Show()
        print(f"Active: {WinForms.Form.ActiveForm is not None}")
        '@
        $script | Out-File -FilePath "demo.py" -Encoding utf8
        pip install pythonnet clr-loader
        python demo.py
