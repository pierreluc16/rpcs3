name: Fast OOBE Check

on: [push, workflow_dispatch]

jobs:
  check-system:
    runs-on: windows-11-arm
    steps:
    - name: Run Blocker Audit
      shell: powershell
      run: |
        $blocker = Get-Process | Where-Object { 
          $_.Name -match 'CloudExperienceHost|wwahost|ConsentUx' -or 
          $_.MainWindowTitle -match 'Privacy|Experience|OOBE' 
        }
        if ($blocker) {
          echo "::error title=CRITICAL ERROR::Windows 11 OOBE/Privacy dialog detected! Failing job immediately to prevent runner hang."
          exit 1
        }
        echo "Runner state clear."
