name: Windows Runner Screenshot

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to trigger the workflow manually from the GitHub UI

jobs:
  screenshot-job:
    runs-on: windows-2025-vs2026 # Targets a Windows runner

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Optional Step: Place your application startup or automated tests here
      - name: Launch application or run tests
        run: |
          echo "The system is executing tasks..."
          start calc.exe # Example: Open Windows Calculator to capture it on screen
          Start-Sleep -Seconds 3

      - name: Capture Windows Runner Desktop
        shell: powershell # Required to execute the .NET graphics API
        run: |
          Add-Type -AssemblyName System.Windows.Forms
          Add-Type -AssemblyName System.Drawing
          
          # Retrieve primary screen dimensions
          $screen = [System.Windows.Forms.Screen]::PrimaryScreen
          $bounds = $screen.Bounds
          
          # Initialize bitmap image based on display size
          $bitmap = New-Object System.Drawing.Bitmap($bounds.Width, $bounds.Height)
          $graphics = [System.Drawing.Graphics]::FromImage($bitmap)
          
          # Copy screen contents to the bitmap
          $graphics.CopyFromScreen($bounds.X, $bounds.Y, 0, 0, $bounds.Size)
          
          # Save image file to the workspace root directory
          $bitmap.Save("windows-runner-screenshot.png", [System.Drawing.Imaging.ImageFormat]::Png)
          
          # Dispose graphical objects to clear memory
          $graphics.Dispose()
          $bitmap.Dispose()
          Write-Host "Screenshot successfully saved as 'windows-runner-screenshot.png'"

      - name: Upload Screenshot Artifact
        uses: actions/upload-artifact@v4 # Always use the latest stable version
        if: always() # Ensures screenshots are uploaded even if previous steps fail
        with:
          name: runner-screenshots
          path: windows-runner-screenshot.png
