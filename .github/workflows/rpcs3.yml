name: Build and Test Ubuntu 26.04 Image with Podman 6

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  podman-build:
    runs-on: ubuntu-26.04

    # Utilisation du tag officiel fonctionnel configuré pour la CI
    container:
      image: quay.io/podman/stable:latest
      options: >-
        --privileged
        --user root

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Verified Podman Version
        run: |
          echo "=== Displaying Podman Engine Metadata ==="
          podman --version
          podman info

      - name: Create Containerfile
        run: |
          cat <<EOF > Containerfile
          # Le nom de registre complet reste obligatoire sur Ubuntu 26.04
          FROM docker.io/library/ubuntu:26.04
          
          RUN apt-get update && apt-get install -y \
              curl \
              ca-certificates \
              && rm -rf /var/lib/apt/lists/*
              
          CMD ["echo", "Hello from Ubuntu 26.04 inside working safe Podman 6 environment!"]
          EOF

      - name: Build image with Podman 6
        run: |
          podman build -t my-ubuntu-app:26.04 -f Containerfile .

      - name: Test the built image
        run: |
          podman run --rm my-ubuntu-app:26.04
