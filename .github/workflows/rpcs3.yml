name: Podman 6.0.1 on Ubuntu 26.04 LTS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  podman-6-pipeline:
    runs-on: ubuntu-26.04 
    
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install Podman 6.0.1 Host Engine
      run: |
        echo "=== Installing Environment Tools ==="
        sudo apt-get update
        sudo apt-get install -y uidmap dbus-user-session conmon iptables catatonit
        
        echo "=== Fetching Upstream Podman 6.0.1 Static Asset ==="
        # Downloading the true, full host engine package
        curl -fsSL https://github.com/containers/podman/releases/download/v6.0.1/podman-static-amd64.tar.gz -o podman-static.tar.gz
        tar -xzf podman-static.tar.gz
        
        echo "=== Overriding Native Package Binaries ==="
        sudo cp -r podman-v6.0.1/* /usr/
        rm -rf podman-v6.0.1 podman-static.tar.gz
        
        echo "=== Allocating Rootless Namespaces ==="
        sudo usermod --add-subuids 100000-165535 --add-subgids 100000-165535 $USER
        
        # This will now succeed with the correct full host engine binary
        podman system migrate

    - name: Verify Version Block
      run: |
        podman --version

    - name: Execute Pod Workflow
      run: |
        echo "=== Building App ==="
        podman build -t local/app:v6 -f - . <<EOF
        FROM ubuntu:26.04
        RUN apt-get update && apt-get install -y curl
        EXPOSE 80
        CMD ["python3", "-m", "http.server", "80"]
        EOF

        echo "=== Starting Netavark Mesh Pod ==="
        podman pod create --name active-pod -p 8080:80
        podman run -d --pod active-pod --name web-service local/app:v6
        
        sleep 3
        curl --fail http://localhost:8080

    - name: Generate Production K8s Resource
      run: |
        podman kube generate active-pod > deployment-26.04.yaml
