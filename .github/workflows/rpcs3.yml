name: Windows 11 ARM OOBE Win32 API Verification

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  check-oobe-state:
    name: Execute Low-Level OOBE API Check
    runs-on: windows-11-arm

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      # Step 1: Query the Win32 API natively (Using fixed dot notation syntax)
      - name: Execute Native Win32 OOBE Detection Script
        id: win32_oobe_check
        continue-on-error: true
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          
          # Declare the C# signature to interface with kernel32.dll
          $TypeDef = @"
          using System;
          using System.Runtime.InteropServices;
          namespace Win32API {
              public class OobeCheck {
                  [DllImport("kernel32.dll", CharSet = CharSet.Auto, SetLastError = true)]
                  public static extern int OOBEComplete(ref int bIsOOBEComplete);
              }
          }
          "@

          Write-Host "Compiling custom Win32 interop type..."
          Add-Type -TypeDefinition $TypeDef -Language CSharp

          $IsOOBEComplete = 0
          Write-Host "Invoking OOBEComplete from Kernel32.dll..."
          
          # Dot notation syntax prevents PowerShell from throwing ParseExceptions
          $Result = [Win32API.OobeCheck]::OOBEComplete([ref]$IsOOBEComplete)

          # Process evaluation flags
          if ($IsOOBEComplete -eq 0) {
              Write-Host "[DETECTED] Windows is actively inside the OOBE stage."
              exit 0
          } else {
              Write-Host "[NOT DETECTED] OOBE is complete. System is running at desktop."
              exit 1
          }

      # Step 2: This step ONLY executes if Step 1 detected that the system is trapped (Outcome = success)
      - name: Trigger OOBE Critical Failure Annotation
        if: steps.win32_oobe_check.outcome == 'success'
        shell: powershell
        run: |
          Write-Output "::error::[CRITICAL FAILURE] OOBE state validation failed. The Windows 11 ARM system remains trapped in the deployment wizard."
          exit 1

      # Step 3: This step ONLY executes if Step 1 confirmed OOBE is complete (Outcome = failure)
      - name: Log Successful OOBE Bypass
        if: steps.win32_oobe_check.outcome == 'failure'
        shell: powershell
        run: |
          Write-Output "[OOBE VALIDATED] Target platform has bypassed OOBE successfully. The desktop environment is ready."
          exit 0
