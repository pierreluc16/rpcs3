name: Détection Version Podman

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Permet de lancer le workflow manuellement depuis GitHub

jobs:
  check-podman:
    runs-on: ubuntu-22.04

    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Détecter et afficher la version de Podman
        run: |
          # Récupère proprement le numéro de version (ex: 3.4.4)
          PODMAN_VER=$(podman version --format '{{.Server.Version}}')
          
          echo "=========================================="
          echo "La version installée est : $PODMAN_VER"
          echo "=========================================="
          
          # Enregistre la version pour l'utiliser dans d'autres étapes si besoin
          echo "PODMAN_VERSION=$PODMAN_VER" >> $GITHUB_ENV

      - name: Étape optionnelle (Utilisation de la variable)
        run: |
          echo "La version stockée précédemment est ${{ env.PODMAN_VERSION }}"
