name: Compiler ICU Failure Workflow

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  test-compile-fail:
    runs-on: ubuntu-latest

    steps:
    - name: Try compiling against ICU (This step will FAIL)
      run: |
        echo "=== Creating a mock application that requires libicu-dev ==="
        cat << 'EOF' > test.cpp
        #include <unicode/utypes.h> // Core ICU header file
        #include <iostream>

        int main() {
            std::cout << "ICU is working!" << std::endl;
            return 0;
        }
        EOF

        echo "=== Attempting compilation while isolating system includes ==="
        # -nostdinc tells GCC to ignore the system's pre-installed header directories
        g++ -nostdinc -I/usr/include/c++/13 -I/usr/include/x86_64-linux-gnu/c++/13 test.cpp -o test_app
