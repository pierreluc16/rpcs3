name: Strict Verification of Clang Errors on Ubuntu 24.04 ARM

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to manually trigger this anytime from the GitHub UI

jobs:
  strict-test:
    runs-on: ubuntu-24.04-arm
    
    env:
      LIBCLANG_PATH: /usr/lib/llvm-18/lib
      LLVM_CONFIG_PATH: /usr/lib/llvm-18/bin/llvm-config

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      # --- CONSTRUCT REAL CARGO EXPERIMENT ---
      - name: Generate Dummy Project to Force Clang-Sys Probing
        run: |
          cargo new arm-clang-tester --bin
          cd arm-clang-tester
          echo 'clang-sys = "=1.8.1"' >> Cargo.toml
          echo 'fn main() { unsafe { clang_sys::clang_createIndex(0, 0); } }' > src/main.rs

      # --- THE ULTIMATE COMPILATION TEST ---
      - name: Execute Cargo Build (Isolating the Errors)
        id: build_execution
        continue-on-error: true
        run: |
          cd arm-clang-tester
          # Save stdout and stderr to inspect the exact errors later
          cargo build --verbose > ../build.log 2>&1
          cat ../build.log

      # --- FINAL MULTI-ERROR REPORTING SUITE ---
      - name: Evaluate Error States
        run: |
          echo "=========================================================="
          echo "          UBUNTU 24.04 ARM REALITY-CHECK RESULTS          "
          echo "=========================================================="
          
          # 1. Check if the whole compilation passed
          if [ "${{ steps.build_execution.outcome }}" = "success" ]; then
            echo "✅ BOTH ERRORS RESOLVED NATIVELY!"
            echo "The compilation succeeded. You do not need to install apt packages anymore."
            exit 0
          fi

          echo "❌ LOG ANALYSIS FOR TARGETED CRASHES:"
          echo ""

          # 2. Check for Error 1 (llvm-config missing warning)
          if grep -q "couldn't execute llvm-config --prefix" ../build.log; then
            echo "❌ ERROR 1 IS STILL OCCURRING!"
            echo "   -> Warning: clang-sys could not execute 'llvm-config'"
          else
            echo "✅ ERROR 1 IS FIXED!"
            echo "   -> 'llvm-config' path warning did not trigger."
          fi

          echo ""

          # 3. Check for Error 2 (libclang.so unwrap crash)
          if grep -q "couldn't find any valid shared libraries matching" ../build.log; then
            echo "❌ ERROR 2 IS STILL OCCURRING!"
            echo "   -> Called Result::unwrap() on an Err value: couldn't find libclang.so"
          else
            echo "✅ ERROR 2 IS FIXED!"
            echo "   -> Crate successfully bound to the shared library without unwrap() crashing."
          fi

          echo ""
          echo "=========================================================="
          exit 1
