name: Windows 11 ARM OOBE Strict Detection

on:
  # Allows manual triggering from the GitHub Actions UI
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  oobe-detection:
    # Target the official GitHub Windows 11 ARM runner
    runs-on: windows-11-arm

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Strict OOBE Detection Scan
      shell: powershell
      run: |
        Write-Host "Scanning system environment for Windows 11 OOBE trackers..."
        $ViolationDetected = $false

        # 1. Analyze background initialization processes
        $OOBEProcesses = @("UserOOBEBroker", "CloudExperienceHost")
        foreach ($proc in $OOBEProcesses) {
            if (Get-Process -Name $proc -ErrorAction SilentlyContinue) {
                Write-Host "##[error] CRITICAL FAILURE: OOBE background process '$proc' is actively running!"
                $ViolationDetected = $true
            }
        }

        # 2. Analyze active Graphical User Interface (GUI) windows
        $OOBEWindows = Get-Process | Where-Object { 
            $_.MainWindowTitle -like "*Privacy*" -or 
            $_.MainWindowTitle -like "*Experience*" -or 
            $_.MainWindowTitle -like "*Out-of-Box*" 
        }
        
        if ($OOBEWindows) {
            foreach ($win in $OOBEWindows) {
                Write-Host "##[error] CRITICAL FAILURE: Interactive OOBE Window discovered! Title: '$($win.MainWindowTitle)'"
                $ViolationDetected = $true
            }
        }

        # 3. Halt the workflow if any violation is caught
        if ($ViolationDetected) {
            Write-Host "OOBE or Privacy screen detected. Aborting runner execution to protect testing state."
            exit 1
        } else {
            Write-Host "Success: The environment is clean. No OOBE elements detected."
        }
