name: Ubuntu 24.04 Deep ICU Toolchain & Binary Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deep-scan-icu:
    name: Structural Integrity & Compilation Audit
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Run Multi-Layer Deep Scan
      shell: bash
      run: |
        set -euo pipefail

        echo "========================================================"
        echo "🚀 STEP 1: INITIAL DEPLOYMENT & COHERENCY CHECK"
        echo "========================================================"
        
        # Ensure packages are actively present on the runner before deep scanning
        if ! pkg-config --exists icu-i18n; then
            echo "⚠️ ICU development files missing. Installing packages..."
            sudo apt-get update
            sudo apt-get install -y libicu-dev icu-devtools pkg-config build-essential
        fi

        # Extract system variables
        ICU_VERSION=$(pkg-config --modversion icu-i18n)
        CFLAGS=$(pkg-config --cflags icu-i18n)
        LIBS=$(pkg-config --libs icu-i18n)

        echo "• Detected ICU Version : $ICU_VERSION"
        echo "• Compiler Flags       : $CFLAGS"
        echo "• Linker Flags         : $LIBS"

        echo -e "\n========================================================"
        echo "🔍 STEP 2: FILE SYSTEM PATHS & DEEP BINARY AUDIT"
        echo "========================================================"
        
        # Extract the library directory path from pkg-config
        LIB_DIR=$(pkg-config --variable=libdir icu-i18n)
        INC_DIR=$(pkg-config --variable=includedir icu-i18n)

        echo "• Checking Header Path : $INC_DIR/unicode/ucnv.h"
        if [ -f "$INC_DIR/unicode/ucnv.h" ]; then
            echo "  ✅ Main C headers present."
        else
            echo "  ❌ CRITICAL: ICU header directory is corrupted or missing."
            exit 1
        fi

        # Locate the real dynamic library file (.so) and deep scan its architecture
        REAL_SO_FILE=$(readlink -f "$LIB_DIR/libicui18n.so")
        echo "• Target Binary File   : $REAL_SO_FILE"
        
        if [ -f "$REAL_SO_FILE" ]; then
            # Deep scan binary signature using the 'file' utility
            BIN_INFO=$(file "$REAL_SO_FILE")
            echo "  ➔ Binary Metadata: $BIN_INFO"
            
            # Assert that it matches the runner architecture
            if [[ "$BIN_INFO" == *"x86-64"* ]]; then
                echo "  ✅ Architecture Verification Passed: Native 64-bit ELF."
            else
                echo "  ❌ CRITICAL: Architecture mismatch detected inside the binary."
                exit 1
            fi
        else
            echo "  ❌ CRITICAL: Shared object file link is broken."
            exit 1
        fi

        echo -e "\n========================================================"
        echo "🛠️ STEP 3: LIVE COMPILATION & RUNTIME ASSERTION TEST"
        echo "========================================================"
        
        # Write a temporary C++ program that initializes the ICU environment
        cat << 'EOF' > icu_test.cpp
#include <iostream>
#include <unicode/utypes.h>
#include <unicode/uclean.h>

int main() {
    UErrorCode status = U_ZERO_ERROR;
    
    // Initialize ICU subsystem
    u_init(&status);
    
    if (U_FAILURE(status)) {
        std::cerr << "❌ ICU Initialization Failed! Error code: " << u_errorName(status) << std::endl;
        return 1;
    }
    
    std::cout << "✅ ICU Subsystem Initialized Successfully in Runtime Environment." << std::endl;
    
    // Clean up memory
    u_cleanup();
    return 0;
}
EOF

        echo "• Compiling test verification binary..."
        # Compile using the exact flags provided by pkg-config
        g++ icu_test.cpp -o icu_test_runtime $CFLAGS $LIBS

        echo "• Running execution test..."
        ./icu_test_runtime

        echo -e "\n========================================================"
        echo "🎉 DEEP SCAN COMPLETE: ALL LAYERS OPERATIONAL"
        echo "========================================================"
        echo "ICU_VER_VERIFIED=$ICU_VERSION" >> "$GITHUB_ENV"
