name: Build and Test Ubuntu 26.04 Image with Podman 6.0.1

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  podman-build:
    runs-on: ubuntu-26.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download and Install Static Podman 6.0.1 Binaries
        run: |
          echo "=== Downloading Podman 6.0.1 Static Asset ==="
          # Fetches the official pre-compiled static archive directly from upstream
          curl -fsSL -O https://github.com
          
          echo "=== Extracting and Moving Executable ==="
          tar -xzf podman-remote-static-linux_amd64.tar.gz
          
          # Rename and overlay directly onto system binary paths so it runs natively 
          sudo mv bin/podman-remote-static-linux_amd64 /usr/bin/podman
          sudo chmod +x /usr/bin/podman
          
          echo "=== Cleaning up workspace ==="
          rm -rf bin podman-remote-static-linux_amd64.tar.gz

      - name: Configure Rootless User Namespaces
        run: |
          echo "=== Configuring Kernel Security for Rootless Execution ==="
          # Overrides default Ubuntu VM limits to allow unprivileged execution
          sudo sysctl -w kernel.unprivileged_userns_clone=1
          
          # Initialize underlying workspace folders for non-root runner tasks
          mkdir -p /home/runner/.local/share/containers/storage
          mkdir -p /home/runner/.config/containers

      - name: Verify Target Podman Version
        run: |
          podman --version
          podman info || true

      - name: Create Containerfile
        run: |
          cat <<EOF > Containerfile
          # Strict fully-qualified registry target naming required on Ubuntu 26.04
          FROM docker.io/library/ubuntu:26.04
          
          RUN apt-get update && apt-get install -y \
              curl \
              ca-certificates \
              && rm -rf /var/lib/apt/lists/*
              
          CMD ["echo", "Hello from Ubuntu 26.04 inside working Podman 6.0.1!"]
          EOF

      - name: Build image with Podman 6.0.1
        run: |
          podman build -t my-ubuntu-app:26.04 -f Containerfile .

      - name: Test the built image
        run: |
          podman run --rm my-ubuntu-app:26.04
