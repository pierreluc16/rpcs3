- name: Install Dependencies
      run: |
        python -m pip install -U pip
        python -m pip install pythonnet
        # Let Python generate the perfect native OS path absolute string
        python -m pip install -e "$(python -c 'import os; print(os.path.abspath("core"))')" -e "$(python -c 'import os; print(os.path.abspath("demo"))')"
