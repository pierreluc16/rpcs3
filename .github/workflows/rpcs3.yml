name: Windows 11 ARM OOBE Detection Only

on:
  # Allows you to trigger this workflow manually from the GitHub Actions UI
  workflow_dispatch:

jobs:
  strict-check:
    # Target the official GitHub-hosted Windows 11 ARM64 runner infrastructure
    runs-on: windows-11-arm

    steps:
    # Checks out your repository code onto the runner machine
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Scans the system for privacy prompts and focus-stealing setup tasks
    - name: Strict OOBE and Privacy Detection
      shell: powershell
      run: |
        Write-Host "Scanning system environment for active Windows 11 OOBE trackers..."
        $ViolationDetected = $false

        # 1. Analyze background setup tasks
        $OOBEProcesses = @("UserOOBEBroker", "CloudExperienceHost")
        foreach ($proc in $OOBEProcesses) {
            if (Get-Process -Name $proc -ErrorAction SilentlyContinue) {
                # Creates a native red critical error banner on the GitHub run summary overview
                Write-Host "::error title=OOBE Process Detected::CRITICAL FAILURE: OOBE background process '$proc' is actively running!"
                $ViolationDetected = $true
            }
        }

        # 2. Analyze active Graphical User Interface (GUI) windows
        $OOBEWindows = Get-Process | Where-Object { 
            $_.MainWindowTitle -like "*Privacy*" -or 
            $_.MainWindowTitle -like "*Experience*" -or 
            $_.MainWindowTitle -like "*Out-of-Box*" 
        }
        
        if ($OOBEWindows) {
            foreach ($win in $OOBEWindows) {
                # Creates a native red critical error banner on the GitHub run summary overview
                Write-Host "::error title=OOBE Window Detected::CRITICAL FAILURE: Interactive OOBE Window discovered! Title: '$($win.MainWindowTitle)'"
                $ViolationDetected = $true
            }
        }

        # 3. Halt execution immediately on detection
        if ($ViolationDetected) {
            Write-Host "OOBE environment check failed. Aborting workflow execution due to critical failure."
            exit 1
        } else {
            Write-Host "Success: No OOBE or privacy screens detected. The runner environment is completely clean."
        }
