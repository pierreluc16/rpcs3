name: Build and Test Ubuntu 26.04 Image with Podman 6.0.1

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  podman-build:
    runs-on: ubuntu-26.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Networking Dependencies
        run: |
          sudo apt-get update
          # Standard isolation sidecars needed by the static core
          sudo apt-get install -y uidmap fuse-overlayfs iptables

      - name: Download and Install Static Podman 6.0.1 Server Engine
        run: |
          echo "=== Fetching Verified Stable Podman 6.0.1 Engine ==="
          curl -fsSL -o podman-linux-amd64.tar.gz https://github.com
          
          echo "=== Extracting and Overlaying Binaries ==="
          tar -xzf podman-linux-amd64.tar.gz
          
          # Move full static binaries and asset trees securely into the primary system path
          sudo cp -r podman-linux-amd64/usr/* /usr/
          sudo cp -r podman-linux-amd64/etc/* /etc/
          
          echo "=== Cleaning Up Installer Assets ==="
          rm -rf podman-linux-amd64 podman-linux-amd64.tar.gz

      - name: Configure Rootless User Namespaces
        run: |
          echo "=== Configuring Kernel Security for Rootless Execution ==="
          sudo sysctl -w kernel.unprivileged_userns_clone=1
          
          # Map execution spaces natively to the local virtual workspace runner user
          mkdir -p /home/runner/.local/share/containers/storage
          mkdir -p /home/runner/.config/containers

      - name: Verify Upgraded Podman Engine Version
        run: |
          podman --version
          podman info

      - name: Create Containerfile
        run: |
          cat <<EOF > Containerfile
          # Fully qualified name registry matching enforcement is required on Ubuntu 26.04
          FROM docker.io/library/ubuntu:26.04
          
          RUN apt-get update && apt-get install -y \
              curl \
              ca-certificates \
              && rm -rf /var/lib/apt/lists/*
              
          CMD ["echo", "Hello from Ubuntu 26.04 inside working Podman 6.0.1 Server Engine!"]
          EOF

      - name: Build image with Podman 6.0.1
        run: |
          podman build -t my-ubuntu-app:26.04 -f Containerfile .

      - name: Test the built image
        run: |
          podman run --rm my-ubuntu-app:26.04
