name: System Architecture Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  check-arch:
    runs-on: windows-11-arm

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Check System Architecture
      shell: bash
      run: |
        "C:\hostedtoolcache\windows\Python\3.13.14\x64\python.exe" -c "import platform; print('Python platform.machine():', platform.machine())"
        "C:\hostedtoolcache\windows\Python\3.13.14\x64\python.exe" -c "import platform; print('Python platform.architecture():', platform.architecture())"
        "C:\hostedtoolcache\windows\Python\3.13.14\x64\python.exe" -c "import platform; print('Python platform.processor():', platform.processor())"
