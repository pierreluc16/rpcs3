name: Build and Test Ubuntu 26.04 Image with Podman

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  podman-build:
    runs-on: ubuntu-26.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Native System Podman
        run: |
          echo "=== Updating package indexes ==="
          sudo apt-get update -y
          
          echo "=== Installing Native Podman Stack ==="
          # Les paquets officiels gèrent automatiquement les politiques d'isolation d'Ubuntu
          sudo apt-get install -y podman uidmap fuse-overlayfs
          
      - name: Configure Rootless User Namespaces
        run: |
          echo "=== Activating unprivileged user namespaces ==="
          # Permet au runner d'instancier des conteneurs isolés en mode rootless
          sudo sysctl -w kernel.unprivileged_userns_clone=1
          
          # Force la configuration de stockage par défaut dans le répertoire home de l'utilisateur
          mkdir -p /home/runner/.local/share/containers/storage
          mkdir -p /home/runner/.config/containers

      - name: Verify Podman installation
        run: |
          podman --version
          podman info

      - name: Create Containerfile
        run: |
          cat <<EOF > Containerfile
          # Le nom de registre complet (strict) reste obligatoire sur Ubuntu 26.04
          FROM docker.io/library/ubuntu:26.04
          
          RUN apt-get update && apt-get install -y \
              curl \
              ca-certificates \
              && rm -rf /var/lib/apt/lists/*
              
          CMD ["echo", "Hello from Ubuntu 26.04 inside working native Podman!"]
          EOF

      - name: Build image with Podman
        run: |
          podman build -t my-ubuntu-app:26.04 -f Containerfile .

      - name: Test the built image
        run: |
          podman run --rm my-ubuntu-app:26.04
