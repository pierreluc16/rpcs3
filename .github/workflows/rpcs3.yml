name: Check If LLVM and Libclang Are Installed

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  check-installation:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Check llvm-config Installation
        run: |
          echo "=== Checking for llvm-config ==="
          if command -v llvm-config &> /dev/null; then
            echo "✅ llvm-config is installed!"
            which llvm-config
            llvm-config --version
          else
            echo "❌ Generic 'llvm-config' command NOT found."
            echo "Checking for any versioned instances (e.g., llvm-config-18):"
            ls -l /usr/bin/llvm-config* || echo "No llvm-config binaries found at all."
          fi

      - name: Check libclang Installation
        run: |
          echo "=== Checking for libclang shared libraries ==="
          # Search common system directories for libclang binaries
          LIB_PATHS=$(find /usr/lib /usr/local/lib -name "libclang.so*" 2>/dev/null)
          
          if [ -n "$LIB_PATHS" ]; then
            echo "✅ libclang is installed at:"
            echo "$LIB_PATHS"
          else
            echo "❌ No libclang.so files found in standard library directories."
          fi

      - name: Check Clang C Headers Installation
        run: |
          echo "=== Checking for libclang Header Files ==="
          # Search for the core header file required for libclang development
          HEADER_PATHS=$(find /usr/include /usr/local/include /usr/lib/llvm* -name "Index.h" 2>/dev/null | grep "clang-c")
          
          if [ -n "$HEADER_PATHS" ]; then
            echo "✅ libclang headers are installed at:"
            echo "$HEADER_PATHS"
          else
            echo "❌ Index.h (clang-c) NOT found. Development headers are missing."
          fi
