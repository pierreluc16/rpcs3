name: Ubuntu 24.04 Core ICU Dev Environment Verification

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  verify-and-configure-icu:
    name: Validate and Build Toolchain Environment
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Execute Multi-Method ICU Verification
      shell: bash
      run: |
        set -euo pipefail

        # Isolated internal verification function
        audit_icu_toolchain() {
            local failed_checks=0
            
            echo "--------------------------------------------------------"
            echo "📊 RUNNING SYSTEM IDENTIFICATION & PATH CHECKS..."
            echo "--------------------------------------------------------"

            # METHOD 1: Query System Package Tree State
            if dpkg -s libicu-dev >/dev/null 2>&1; then
                CURRENT_DPKG_VERSION=$(dpkg-query -W -f='${Version}' libicu-dev)
                echo "✅ Method 1: dpkg Package Record Found -> Version: $CURRENT_DPKG_VERSION"
            else
                echo "❌ Method 1: dpkg Package Record Missing"
                failed_checks=$((failed_checks + 1))
            fi

            # METHOD 2: Check Modern Compiler Mapping Flags via pkg-config
            if pkg-config --exists icu-i18n >/dev/null 2>&1; then
                CURRENT_PKG_VERSION=$(pkg-config --modversion icu-i18n)
                echo "✅ Method 2: pkg-config Manifest Found  -> Version: $CURRENT_PKG_VERSION"
            else
                echo "❌ Method 2: pkg-config Manifest Missing (.pc files unmapped)"
                failed_checks=$((failed_checks + 1))
            fi

            # METHOD 3: Query Core Native ICU Engine Binaries directly
            if command -v icuinfo >/dev/null 2>&1; then
                CURRENT_BIN_VERSION=$(icuinfo | grep -i "International Components for Unicode" | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?')
                echo "✅ Method 3: Engine Binary Execution OK -> Version: $CURRENT_BIN_VERSION"
            else
                echo "❌ Method 3: Engine Binary 'icuinfo' Missing from PATH"
                failed_checks=$((failed_checks + 1))
            fi

            return $failed_checks
        }

        # Initialize environment control variables
        CURRENT_DPKG_VERSION="Unknown"
        CURRENT_PKG_VERSION="Unknown"
        CURRENT_BIN_VERSION="Unknown"

        echo "========================================================"
        echo "🚀 TARGET OS PLATFORM: UBUNTU 24.04 (NOBLE NUMBAT)"
        echo "========================================================"
        
        # Launch Step 1 initial assessment
        if ! audit_icu_toolchain; then
            echo -e "\n⚠️ WARNING: Deficiencies or incomplete tools detected on the host."
            echo "🔧 Launching Ubuntu 24.04 Automated Recovery Layer..."
            
            sudo apt-get update
            sudo apt-get install -y libicu-dev icu-devtools pkg-config
            
            echo -e "\n🔄 Executing post-remediation system validation cycle..."
            if ! audit_icu_toolchain; then
                echo -e "\n❌ CRITICAL ERROR: Environment remediation failed. Build step aborted."
                exit 1
            fi
        fi

        # Assertive Warning for Ubuntu 24.04 expected standards
        if [[ "$CURRENT_PKG_VERSION" != 74.* ]]; then
            echo -e "\n⚠️ OS NOTICE: Ubuntu 24.04 utilizes ICU 74.x natively."
            echo "   Detected customized or offset environment version: $CURRENT_PKG_VERSION"
        fi

        echo -e "\n========================================================"
        echo "🎉 SUCCESS: ENVIRONMENT VERIFIED READY FOR PRODUCTION BUILD"
        echo "========================================================"
        echo "• Fully Resolved System Target Version: $CURRENT_PKG_VERSION"
        
        # Safely pass variables downstream via GitHub Environment contexts
        echo "ICU_VER_VERIFIED=$CURRENT_PKG_VERSION" >> "$GITHUB_ENV"
        echo "========================================================"

    - name: Downstream Integration Check
      run: |
        echo "Pipeline context successfully initialized."
        echo "Target compiling sequence tracking version: ${{ env.ICU_VER_VERIFIED }}"
