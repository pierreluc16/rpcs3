name: Podman 6.0.1 on Ubuntu 26.04 LTS

on:
  push:
    branches: [ "main" ]
  # --- ADDED FOR MANUAL LAUNCH ---
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment Target Environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      debug_mode:
        description: 'Enable verbose logging'
        required: false
        default: false
        type: boolean

jobs:
  podman-6-pipeline:
    runs-on: ubuntu-26.04 
    
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Log Manual Triggers
      if: github.event_name == 'workflow_dispatch'
      run: |
        echo "🚀 Manual run initiated by: ${{ github.actor }}"
        echo "🎯 Target Environment: ${{ github.event.inputs.environment }}"
        echo "🔧 Debug Mode Status: ${{ github.event.inputs.debug_mode }}"

    - name: Bootstrap and Upgrade to Podman 6.0.1
      run: |
        sudo apt-get update
        sudo apt-get install -y uidmap dbus-user-session build-essential podman netavark aardvark-dns
        sudo usermod --add-subuids 100000-165535 --add-subgids 100000-165535 $USER
        podman system migrate
        podman --version

    - name: Execute Pod Workflow
      run: |
        podman build -t local/app:v6 -f - . <<EOF
        FROM ubuntu:26.04
        RUN apt-get update && apt-get install -y curl
        EXPOSE 80
        CMD ["python3", "-m", "http.server", "80"]
        EOF

        podman pod create --name active-pod -p 8080:80
        podman run -d --pod active-pod --name web-service local/app:v6
        
        sleep 3
        curl --fail http://localhost:8080

    - name: Generate Production K8s Resource
      run: |
        podman kube generate active-pod > deployment-26.04.yaml
