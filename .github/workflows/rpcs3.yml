strategy:
  matrix:
    include:
      - os: macos-latest   # resolves to macos-15-arm64
        name: macos
runs-on: ${{ matrix.os }}
steps:
  - uses: actions/checkout@v5
  - uses: actions/setup-python@v6
    with:
      python-version: "3.13"
  - run: pip install -e .
  - run: pytest # Replace with <project's test runner>
