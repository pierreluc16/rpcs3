name: ⚙️ Verify Pre-installed LLVM and LibClang on Ubuntu ARM

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  verify-preinstalled:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔍 Locate Pre-installed LLVM and LibClang Toolchain
        run: |
          echo "=================================================="
          echo "🔎 STEP 1: Locating llvm-config..."
          echo "=================================================="
          LLVM_CONF=$(which llvm-config-18 || which llvm-config-19 || which llvm-config-17 || which llvm-config)
          
          if [ -z "$LLVM_CONF" ]; then
            echo "❌ Error: llvm-config could not be found in the system path."
            exit 1
          fi
          
          echo "✅ Success: Found llvm-config at $LLVM_CONF"
          $LLVM_CONF --version
          echo "LLVM_CONFIG_PATH=$LLVM_CONF" >> $GITHUB_ENV
          
          echo ""
          echo "=================================================="
          echo "🔎 STEP 2: Locating libclang.so..."
          echo "=================================================="
          LIBCLANG_FILE=$(find /usr/lib/aarch64-linux-gnu /usr/lib -name "libclang.so*" 2>/dev/null | sort -V -r | head -n 1)
          
          if [ -z "$LIBCLANG_FILE" ]; then
            echo "❌ Error: libclang.so shared object could not be found."
            exit 1
          fi
          
          LIBCLANG_DIR=$(dirname "$LIBCLANG_FILE")
          echo "✅ Success: LibClang directory found at $LIBCLANG_DIR"
          echo "💡 Absolute file path: $LIBCLANG_FILE"
          
          echo "LIBCLANG_PATH=$LIBCLANG_DIR" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=$LIBCLANG_DIR:$LD_LIBRARY_PATH" >> $GITHUB_ENV
          
          echo ""
          echo "=================================================="
          echo "🎉 Verification successfully completed!"
          echo "=================================================="
