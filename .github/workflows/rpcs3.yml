name: Secure Download and Install US Chrome ARM64

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  install-chrome-arm64:
    runs-on: ubuntu-24.04-arm  # Explicitly runs on native ARM64 Linux runner hardware
    
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Download US Chrome Page Source via Firefox Agent
        run: |
          # 1. Official USA localized portal directory URL
          URL="https://google.com"
          
          # 2. Native ARM64 Mozilla Firefox User-Agent identity footprint
          FIREFOX_USER_AGENT="Mozilla/5.0 (X11; Linux aarch64; rv:128.0) Gecko/20100101 Firefox/128.0"
          
          # 3. Securely fetch the landing page using custom headers to simulate a real user
          wget --user-agent="$FIREFOX_USER_AGENT" \
               --header="Accept-Language: en-US,en;q=0.9" \
               --trust-server-names \
               -O google-chrome-usa-source.html \
               "$URL"

      - name: Clean Environment and Configure Official APT Infrastructure
        run: |
          # Safe Cleanup: Delete prior broken or mistyped repository assets to fix index locks
          sudo rm -f /etc/apt/sources.list.d/google-chrome.list
          
          sudo apt-get update
          sudo apt-get install -y curl gnupg
          
          # Setup local path verification security keyrings
          sudo mkdir -p /usr/share/keyrings
          
          # Securely stream official public keys without piping invalid raw HTML text
          curl -fSsL https://google.com | gpg --dearmor | sudo tee /usr/share/keyrings/google-chrome.gpg > /dev/null
          
          # Final Fix: Establish the official Chrome repository specifically targeting ARM64 builds
          echo "deb [arch=arm64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://google.com stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list

      - name: Update System Database and Install Chrome Stable
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Verify Live Installation and Version Profile
        run: |
          # System validation step ensures it executes properly on your architecture layout
          google-chrome --version

      - name: Lock Active Shell Pipeline Environment to English
        run: |
          # Sets systemic locale variables to enforce clear English terminal messaging
          echo "LANG=en_US.UTF-8" >> $GITHUB_ENV
          echo "LANGUAGE=en_US:en" >> $GITHUB_ENV

      - name: Upload Scraped Webpage Source to Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: google-chrome-us-source
          path: google-chrome-usa-source.html
          retention-days: 7
