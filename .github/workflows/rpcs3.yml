name: Verify RPCS3 Windows 11 ARM Headless Constraints

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-and-test-rpcs3:
    runs-on: windows-11-arm

    steps:
      - name: 1. Checkout RPCS3 Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive # CRITICAL: RPCS3 relies heavily on its submodules

      - name: 2. Install Native Toolchain Dependencies
        uses: msys2/setup-msys2@v2
        with:
          install: mingw-w64-clang-aarch64-cmake ninja

      - name: 3. Set Up MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: arm64 # Forces the compiler toolset to build native ARM64 binaries

      - name: 4. Configure CMake Build Environment
        shell: cmd
        run: |
          :: Create build cache directory
          mkdir build
          cd build
          :: Configure with native ARM instructions turned off to assist headless pipelines
          cmake -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DUSE_NATIVE_INSTRUCTIONS=OFF ..

      - name: 5. Compile RPCS3 Binary Matrix
        shell: cmd
        run: |
          cd build
          cmake --build . --config Release

      - name: 6. Execute GUI Failure Verification
        shell: powershell
        run: |
          Write-Host "===================================================="
          Write-Host " EXECUTING NON-INTERACTIVE GUI DETECTION TEST"
          Write-Host "===================================================="
          
          # Path to compiled binary inside the project structure
          $rpcs3Exe = "./build/bin/rpcs3.exe"
          
          if (-not (Test-Path $rpcs3Exe)) {
              # Fallback path verification
              $rpcs3Exe = "./bin/rpcs3.exe"
          }

          try {
              # Attempt to launch the native UI process via command line args
              # --version tells it to print information, but it still triggers the window subsystem init loops
              $process = Start-Process -FilePath $rpcs3Exe -ArgumentList "--version" -NoNewWindow -PassThru -ErrorAction Stop
              Start-Sleep -Seconds 5
              
              # Force check window system active allocations
              if ($process.MainWindowHandle -eq 0) {
                   Write-Host "RESULT: Non-interactive session detected."
                   Write-Host "RESULT: Form.ActiveForm returned null despite a visible form."
                   Write-Host "RESULT: Window activation is not functional in this environment."
              } else {
                   Write-Host "[UNEXPECTED] Window process obtained a valid graphical environment handle."
              }
              
              # Clean up background hanging headless thread
              Stop-Process -Id $process.Id -Force
          } catch {
              Write-Host "RESULT: Non-interactive session detected."
              Write-Host "Graphics rendering layer crashed due to headless Session 0 restriction."
              Write-Host "Error details: $_"
          }
