name: Windows 11 ARM OOBE Win32 API Verification

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  check-oobe-state:
    name: Execute Low-Level OOBE API Check
    # Ensure this runs on an ARM64-compatible runner if testing native ARM states
    runs-on: windows-11-arm

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      # Step 1: Execute your custom Win32 API detection block
      - name: Run Win32 OOBEComplete Detection Script
        id: win32_oobe_check
        continue-on-error: true
        shell: powershell
        run: |
          $TypeDef = @"
          using System;
          using System.Runtime.InteropServices;
          namespace Win32API {
              public class OobeCheck {
                  [DllImport("kernel32.dll", CharSet = CharSet.Auto, SetLastError = true)]
                  public static extern int OOBEComplete(ref int bIsOOBEComplete);
              }
          }
          "@

          # Compile the C# snippet into the session
          Add-Type -TypeDefinition $TypeDef -Language CSharp

          $IsOOBEComplete = 0
          $Result = [Win32API::OobeCheck]::OOBEComplete([ref]$IsOOBEComplete)

          if ($IsOOBEComplete -eq 0) {
              Write-Host "[DETECTED] Windows is currently inside the OOBE phase."
              exit 0
          } else {
              Write-Host "[NOT DETECTED] OOBE is already complete. System is at standard desktop."
              exit 1
          }

      # Step 2: Evaluate the outcome of the detection script
      - name: Process OOBE Detection Telemetry
        shell: powershell
        run: |
          # If Step 1 returned 'exit 0' (Outcome: success), the machine is still stuck in OOBE
          if ("${{ steps.win32_oobe_check.outcome }}" -eq "success") {
              Write-Error "[OOBE STATE CRITICAL] Detection verified that the system is trapped in the active OOBE phase!"
              exit 1
          }
          
          # If Step 1 returned 'exit 1' (Outcome: failure), OOBE is complete and the system is safe
          if ("${{ steps.win32_oobe_check.outcome }}" -eq "failure") {
              Write-Host "[OOBE STATE VALIDATED] Verification successful! OOBE is finished and desktop environment is active."
              exit 0
          }
