name: Verify Legacy Container Config Rejection (Exact Versions)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  verify-v1-format:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.22' # Optimal Go compiler version for the mid-2026 container stack

      - name: Install Compilation Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgpgme-dev \
            libassuan-dev \
            libbtrfs-dev \
            libdevmapper-dev \
            libglib2.0-dev \
            libostree-dev \
            libseccomp-dev \
            pkg-config \
            make \
            git \
            go-md2man

      - name: Compile and Install Skopeo v1.23.0
        run: |
          echo "=== Compiling Skopeo v1.23.0 ==="
          git clone --depth 1 --branch v1.23.0 https://github.com src/skopeo
          cd src/skopeo
          make bin/skopeo
          sudo cp bin/skopeo /usr/local/bin/skopeo
          skopeo --version

      - name: Compile and Install Buildah v1.44.0
        run: |
          echo "=== Compiling Buildah v1.44.0 ==="
          git clone --depth 1 --branch v1.44.0 https://github.com src/buildah
          cd src/buildah
          make buildah
          sudo cp buildah /usr/local/bin/buildah
          buildah --version

      - name: Compile and Install Podman v6.0.0
        run: |
          echo "=== Compiling Podman v6.0.0 ==="
          git clone --depth 1 --branch v6.0.0 https://github.com src/podman
          cd src/podman
          make podman
          sudo cp bin/podman /usr/local/bin/podman
          podman --version

      - name: Run v1 Format Rejection Tests
        run: |
          # 1. Create an isolated configuration directory
          TEST_DIR=$(mktemp -d -t container-cfg-XXXXXX)
          export CONTAINERS_REGISTRIES_CONF="$TEST_DIR/registries.conf"
          
          echo "=== 1. Writing Legacy v1 Format to: $CONTAINERS_REGISTRIES_CONF ==="
          cat << 'EOF' > "$CONTAINERS_REGISTRIES_CONF"
          # Legacy v1 flat format (Now explicitly unsupported)
          [registries.search]
          registries = ['docker.io', 'quay.io']
          EOF
          
          # Initialize validation tracking variable
          TEST_FAILED=0
          
          echo -e "\n=== 2. Testing BUILDAH ==="
          if error_msg=$(buildah images 2>&1); then
              echo "❌ FAILURE: Buildah accepted the legacy v1 format!"
              TEST_FAILED=1
          else
              echo "✅ SUCCESS: Buildah successfully rejected the v1 format."
              echo "Captured Error: $error_msg"
          fi
          
          echo -e "\n=== 3. Testing PODMAN ==="
          if error_msg=$(podman info 2>&1); then
              echo "❌ FAILURE: Podman accepted the legacy v1 format!"
              TEST_FAILED=1
          else
              echo "✅ SUCCESS: Podman successfully rejected the v1 format."
              echo "Captured Error: $error_msg"
          fi
          
          echo -e "\n=== 4. Testing SKOPEO ==="
          if error_msg=$(skopeo list-tags docker://docker.io/library/alpine 2>&1); then
              echo "❌ FAILURE: Skopeo accepted the legacy v1 format!"
              TEST_FAILED=1
          else
              echo "✅ SUCCESS: Skopeo successfully rejected the v1 format."
              echo "Captured Error: $error_msg"
          fi
          
          # Cleanup environment configuration space
          rm -rf "$TEST_DIR"
          
          # 5. Output programmatic evaluation status
          if [ $TEST_FAILED -ne 0 ]; then
              echo -e "\n❌ CRITICAL PIPELINE ERROR: A tool accepted the legacy configuration."
              exit 1
          else
              echo -e "\n🎉 ALL TESTS PASSED: Legacy v1 formats strictly blocked by the container engine stack."
              exit 0
          fi
