name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_call:
    inputs:
      attest-package:
        description: "Create GitHub provenance attestation for the package."
        default: "false"
        type: string
    outputs:
      artifact-basename:
        description: "Base name of the uploaded artifacts; use for artifact retrieval."
        value: ${{ jobs.package.outputs.artifact-basename }}
  workflow_dispatch:

env:
  min_python_version: "3.10"
  FORCE_COLOR: "1"

defaults:
  run:
    shell: bash

# Cancel active CI runs for a PR before starting another run
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.min_python_version }}
      - name: Run Pre-commit
        uses: pre-commit/action@v3.0.1

  towncrier:
    name: Check towncrier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.min_python_version }}
      - name: Install Dependencies
        run: python -m pip install --group tox-uv
      - name: Check Changelog Fragment
        run: python -m tox -e towncrier-check

  package:
    name: Package Toga
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      attestations: write
    strategy:
      matrix:
        wheel:
          - "android"
          - "cocoa"
          - "core"
          - "demo"
          - "dummy"
          - "gtk"
          - "qt"
          - "iOS"
          - "toga"
          - "positron"
          - "travertino"
          - "textual"
          - "web"
          - "winforms-x64"
          - "winforms-arm64"
        include:
          - subdir: ""
          - wheel: "winforms-x64"
            subdir: "winforms"
            plat-name: "win_amd64"
            exclude-runtime: "win-arm64"
          - wheel: "winforms-arm64"
            subdir: "winforms"
            arch: "arm64"
            plat-name: "win_arm64"
            exclude-runtime: "win-x64"
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          repository: ${{ github.repository }}
          fetch-depth: 0

      - name: Configure platform tag
        if: ${{ matrix.subdir }}
        run: |
          printf '[tool.distutils.bdist_wheel]\nplat-name = "${{ matrix.plat-name }}"\n' >> winforms/pyproject.toml

      - name: Remove other-arch native DLL
        if: ${{ matrix.subdir }}
        run: |
          rm -rf winforms/src/toga_winforms/libs/WebView2/runtimes/${{ matrix.exclude-runtime }}

      - name: Build Package & Upload Artifact
        id: package_step
        uses: hynek/build-and-inspect-python-package@v2.15.0
        with:
          path: ${{ matrix.subdir || matrix.wheel }}
          upload-name-suffix: ${{ format('-{0}', matrix.wheel) }}
          attest-build-provenance-github: ${{ inputs.attest-package || 'false' }}

  docs-lint:
    name: Documentation linting
    needs: [ pre-commit ]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            .pre-commit-config.yaml
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aspell aspell-en
      - name: Update pip
        run: python -m pip install -U pip
      - name: Install Tox
        run: python -m pip install --group 'tox-uv'
      - name: Perform lint checks
        run: python -m tox -e docs-lint

  core-and-travertino:
    name: Test ${{ matrix.package }} (${{ matrix.platform }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.platform }}
    needs: [ pre-commit, towncrier, package ]
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        platform: [ "macos-latest", "ubuntu-latest", "windows-latest" ]
        python-version: [ "3.10", "3.11", "3.12", "3.13", "3.14" ]
        package: ["core", "travertino"]
        include:
          - experimental: false
          - package: "core"
            tox-suffix: ""
          - package: "travertino"
            tox-suffix: "-trav"
        exclude:
          - package: travertino
            platform: macos-latest
          - package: travertino
            platform: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Install Tox
        run: python -m pip install --group tox-uv
      - name: Get Packages
        uses: actions/download-artifact@v4
        with:
          pattern: "Packages-*"
          merge-multiple: true
          path: dist
      - name: Test
        run: |
          export TOGA_INSTALL_COMMAND="uv pip install ../$(ls dist/toga_core-*.whl) ../$(ls dist/travertino-*.whl) ../$(ls dist/toga_dummy-*.whl) --group test"
          tox -e py-cov${{ matrix.tox-suffix }}
          tox -qe coverage$(tr -dc "0-9" <<< "${{ matrix.python-version }}")${{ matrix.tox-suffix }}
          mv ${{ matrix.package }}/.coverage ${{ matrix.package }}/.coverage.${{ matrix.platform }}.${{ matrix.python-version }}
      - name: Store Coverage Data
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}-coverage-data-${{ matrix.platform }}-${{ matrix.python-version }}
          path: "${{ matrix.package }}/.coverage.*"
          if-no-files-found: error
          include-hidden-files: true

  core-and-travertino-coverage:
    name: "Coverage: ${{ matrix.package }}"
    needs: core-and-travertino
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: ["core", "travertino"]
        include:
          - package: "core"
            tox-suffix: ""
          - package: "travertino"
            tox-suffix: "-trav"
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Python ${{ env.min_python_version }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.min_python_version }}
      - name: Install Tox
        run: python -m pip install --group 'tox-uv'
      - name: Retrieve Coverage Data
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ matrix.package }}-coverage-data-*
          path: ${{ matrix.package }}
          merge-multiple: true
      - name: Generate Coverage Report
        run: tox -e coverage${{ matrix.tox-suffix }}-html-platform
      - name: Upload HTML Coverage Report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: html-coverage-report-${{ matrix.package }}
          path: ${{ matrix.package }}/htmlcov

  travertino-backwards-compatibility:
    name: Test Travertino backwards compatibility with Toga 0.4.8
    runs-on: "ubuntu-latest"
    needs: [ pre-commit, towncrier, package ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.min_python_version }}
      - name: Install Tox
        run: python -m pip install --group 'tox-uv'
      - name: Get Package
        uses: actions/download-artifact@v4
        with:
          pattern: "Packages-travertino"
          merge-multiple: true
          path: dist
      - name: Test
        run: |
          export TRAVERTINO_INSTALL_COMMAND="uv pip install ../$(ls dist/travertino-*.whl)"
          tox -e trav-compat

  testbed:
    name: Testbed (${{ matrix.backend }})
    needs: [ package, core-and-travertino ]
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        backend:
          - "windows-netfx-x86_64"
          - "windows-netcore-x86_64"
          - "windows-netcore-arm64"
          - "textual-linux"
          - "textual-macOS"
          - "textual-windows"
        include:
          - backend: "windows-netfx-x86_64"
            runs-on: "windows-latest"
          - backend: "windows-netcore-x86_64"
            runs-on: "windows-latest"
          - backend: "windows-netcore-arm64"
            runs-on: "windows-latest"
          - backend: "textual-linux"
            runs-on: "ubuntu-latest"
          - backend: "textual-macOS"
            runs-on: "macos-latest"
          - backend: "textual-windows"
            runs-on: "windows-latest"
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.min_python_version }}
      - name: Install Tox
        run: python -m pip install --group tox-uv
      - name: Get Packages
        uses: actions/download-artifact@v4
        with:
          pattern: "Packages-*"
          merge-multiple: true
          path: dist
      - name: Run Testbed
        run: |
          echo "Executing testbed suite for ${{ matrix.backend }}"
          # Custom script or tox call execution would go here depending on project requirements
