name: Capture d'écran du Bureau ARM

on:
  workflow_dispatch:

jobs:
  take-screenshot:
    name: Capturer le bureau du serveur ARM
    runs-on: windows-11-arm # Label officiel de GitHub pour les exécuteurs ARM64

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      # ÉTAPE 2 CORRIGÉE : Utilisation de PowerShell natif (.NET) pour éviter les incompatibilités ARM
      - name: Capturer le bureau (Fix)
        shell: powershell
        run: |
          Add-Type -AssemblyName System.Windows.Forms
          Add-Type -AssemblyName System.Drawing
          
          # Récupération de la résolution de l'écran principal du Runner
          $screen = [System.Windows.Forms.Screen]::PrimaryScreen
          $bounds = $screen.Bounds
          
          # Création de l'image en mémoire
          $bmp = New-Object System.Drawing.Bitmap($bounds.Width, $bounds.Height)
          $graphics = [System.Drawing.Graphics]::FromImage($bmp)
          
          # Capture des pixels du bureau virtuel
          $graphics.CopyFromScreen($bounds.Location, [System.Drawing.Point]::Empty, $bounds.Size)
          
          # Sauvegarde du fichier sur le disque
          $bmp.Save("bureau_runner_arm.jpg", [System.Drawing.Imaging.ImageFormat]::Jpeg)
          
          # Libération de la mémoire
          $graphics.Dispose()
          $bmp.Dispose()
          Write-Output "Capture d'écran réussie !"

      - name: Sauvegarder l'image (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Capture-Bureau-Windows-ARM
          path: bureau_runner_arm.jpg
