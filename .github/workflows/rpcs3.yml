name: Reproduce Windows 11 ARM Headless Issue

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  test-gui-interactivity:
    runs-on: windows-11-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pythonnet clr-loader

      - name: Create and Run Test Script
        shell: pwsh
        run: |
          # 1. Write runtime.json
          @'
          {
            "runtimeOptions": {
              "tfm": "net8.0-windows",
              "frameworks": [
                {
                  "name": "Microsoft.WindowsDesktop.App",
                  "version": "8.0.0"
                }
              ]
            }
          }
          '@ | Out-File -FilePath runtime.json -Encoding utf8

          # 2. Write the complete Python reproduction script
          @'
          import sys
          from pathlib import Path
          import clr_loader
          from pythonnet import set_runtime

          def main():
              print("Initializing .NET Core runtime environment...")
              try:
                  # Bind using local runtime config
                  config_path = Path("runtime.json").resolve()
                  rt = clr_loader.get_coreclr(runtime_config=str(config_path))
                  set_runtime(rt)
                  
                  # Import Windows Forms components
                  import clr
                  clr.AddReference("System.Windows.Forms")
                  from System.Windows.Forms import Form, FormCollection, Application
                  
                  print("Testing interactive UI context...")
                  test_form = Form()
                  test_form.Show()
                  
                  # If headless/non-interactive, ActiveForm evaluation or collection is null/empty
                  if Form.ActiveForm is None:
                      print("ERROR: Non-interactive session detected! ActiveForm is None.")
                      return 1
                      
                  print("SUCCESS: Interactive Windows session detected.")
                  test_form.Close()
                  return 0
                  
              except Exception as e:
                  print(f"Exception encountered during evaluation: {e}")
                  return 1

          if __name__ == "__main__":
              sys.exit(main())
          '@ | Out-File -FilePath demo.py -Encoding utf8

          # 3. Run the generated file
          python demo.py
