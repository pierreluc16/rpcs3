name: Reproduce Windows 11 ARM Headless Issue

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  test-gui-interactivity:
    runs-on: windows-11-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pythonnet clr-loader

      # STEP 1: Bypass Windows 11 OOBE and background setup prompts
      - name: Dismiss Windows OOBE and Online Account Setup
        shell: pwsh
        run: |
          $RegistryPath = "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\OOBE"
          if (-not (Test-Path $RegistryPath)) { 
              New-Item -Path $RegistryPath -Force | Out-Null
          }
          
          # Force network bypass and deactivate background account link prompts
          Set-ItemProperty -Path $RegistryPath -Name "BypassNRO" -Value 1 -Type DWord -Force
          Set-ItemProperty -Path $RegistryPath -Name "HideOnlineAccountScreens" -Value 1 -Type DWord -Force
          
          # Kill the background broker process if it triggered and captured the session focus
          Stop-Process -Name "UserOOBEBroker" -Force -ErrorAction SilentlyContinue

      # STEP 2: Allow Session 0 to interact with the virtual desktop context
      - name: Configure Windows Session Interaction
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\Windows' -Name 'NoInteractiveServices' -Value 0 -Type DWord -Force

      # STEP 3: Generate and execute the interactive PythonNet test script
      - name: Create and Run Test Script
        shell: pwsh
        run: |
          # 1. Write runtime.json (.NET Core 8 for Windows Desktop ARM Architecture)
          @'
          {
            "runtimeOptions": {
              "tfm": "net8.0-windows",
              "frameworks": [
                {
                  "name": "Microsoft.WindowsDesktop.App",
                  "version": "8.0.0"
                }
              ]
            }
          }
          '@ | Out-File -FilePath runtime.json -Encoding utf8

          # 2. Write the interactive Python reproduction script
          @'
          import sys
          from pathlib import Path
          import clr_loader
          from pythonnet import set_runtime
          
          def main():
              print("Initializing .NET Core runtime environment...")
              try:
                  # Bind using local runtime config
                  config_path = Path("runtime.json").resolve()
                  rt = clr_loader.get_coreclr(runtime_config=str(config_path))
                  set_runtime(rt)
                  
                  # Import Windows Forms graphic components
                  import clr
                  clr.AddReference("System.Windows.Forms")
                  from System.Windows.Forms import Form, Application
                  
                  print("Testing interactive UI context...")
                  test_form = Form()
                  
                  # Key Action: Allocate a native Win32 window handle to force GUI instantiation
                  handle = test_form.Handle 
                  test_form.Show()
                  
                  # Force the message queue loop to process the window creation event
                  Application.DoEvents()
                  
                  # If headless environment persists despite the bypass, ActiveForm remains None
                  if Form.ActiveForm is None:
                      print("ERROR: Non-interactive session detected! ActiveForm is None.")
                      return 1
                      
                  print("SUCCESS: Interactive Windows session detected.")
                  test_form.Close()
                  return 0
                  
              except Exception as e:
                  print(f"Exception encountered during evaluation: {e}")
                  return 1
                  
          if __name__ == "__main__":
              sys.exit(main())
          '@ | Out-File -FilePath demo.py -Encoding utf8

          # 3. Launch verification script
          python demo.py
