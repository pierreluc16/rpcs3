name: Reproduce Chromium SDK Missing Tool Bug

on:
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  assert-bug:
    runs-on: windows-11-arm

    steps:
    - name: Assert Chromium Toolchain Prerequisites
      shell: powershell
      run: |
        Write-Host "Simulating vs_toolchain.py sanity check for Chromium..."
        
        # Chromium looks for cdb.exe to verify the 'Debugging Tools for Windows' feature
        $expectedCdbX64 = "C:\Program Files (x86)\Windows Kits\10\Debuggers\x64\cdb.exe"
        $expectedCdbArm = "C:\Program Files (x86)\Windows Kits\10\Debuggers\arm64\cdb.exe"
        
        $x64Exists = Test-Path $expectedCdbX64
        $armExists = Test-Path $expectedCdbArm
        
        Write-Host "Checking path: $expectedCdbX64 -> Status: $x64Exists"
        Write-Host "Checking path: $expectedCdbArm -> Status: $armExists"
        
        if (-not $x64Exists -and -not $armExists) {
            Write-Output "--------------------------------------------------------"
            Write-Output "ERROR at //build/toolchain/win/BUILD.gn:24:3:"
            Write-Output "Script returned non-zero exit code."
            Write-Output "You must install Windows 10 SDK version 10.0.26100.0 including the 'Debugging Tools for Windows' feature."
            Write-Output "--------------------------------------------------------"
            exit 1
        } else {
            Write-Output "Verification passed unexpectedly. Bug might be resolved on this image."
        }
