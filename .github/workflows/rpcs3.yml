name: Test Python Architecture Regression

on: [push, workflow_dispatch]

jobs:
  test-launcher:
    runs-on: windows-11-arm # Target the affected runner
    steps:
      - name: Install ARM64 Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          architecture: 'arm64'

      - name: Verify Architecture Misalignment
        run: |
          echo "=== 1. Checking expected path execution ==="
          python -c "import platform; print('Direct python executable:', platform.machine())"
          
          echo "=== 2. Checking py launcher execution ==="
          py -3.13 -c "import platform; print('Py launcher selection:', platform.machine())"
