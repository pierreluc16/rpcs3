name: Demonstrate Missing Libicu Failure

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  must-fail:
    runs-on: ubuntu-latest
    
    # We use an alpine container to guarantee libicu-dev is missing completely
    container:
      image: alpine:latest

    steps:
    - name: Install basic compiler tools
      run: apk add --no-cache gcc musl-dev pkgconfig

    - name: Attempt compilation check (This step will FAIL)
      run: |
        echo "=== Trying to look up libicu development configuration ==="
        
        # pkg-config will return an error exit code (1) because icu-i18n is missing.
        # This will immediately crash the GitHub Action job.
        pkg-config --cflags --libs icu-i18n
