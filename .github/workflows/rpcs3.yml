name: Ubuntu ARM Python Architectures Check

on: 
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check-inventory:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Diagnostics Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y file

      - name: System OS Architecture
        run: |
          echo "=== OS Architecture ==="
          uname -m
          dpkg --print-architecture

      # ÉTAPE CORRIGÉE : Filtre strict pour exclure les scripts utilitaires de configuration
      - name: List All Python Binaries and their Native Architectures
        run: |
          echo "=== Analyzing Python Binary Structures ==="
          
          # La regex exclut expressément tout fichier se terminant par '-config'
          for py_bin in $(ls /usr/bin/python[0-9]* 2>/dev/null | grep -v '\-config$'); do
            echo "----------------------------------------"
            echo "Binary Path: $py_bin"
            
            # Affiche la version
            $py_bin --version 2>&1
            
            # Analyse la structure du fichier de bas niveau
            file $py_bin
            
            # Interroge la plateforme
            $py_bin -c "import platform; print('Python Platform Engine:', platform.machine(), platform.architecture())"
          done

      - name: Check APT Package Architectures
        run: |
          echo "=== Installed Python System Package Architectures ==="
          dpkg -l | grep python | awk '{print $2, "\t[", $4, "]"}' | head -n 40
