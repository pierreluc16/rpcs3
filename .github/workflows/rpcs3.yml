name: Detect Windows 11 ARM OOBE Issues

on:
  push:
  workflow_dispatch:

jobs:
  check-oobe:
    runs-on: windows-11-arm

    steps:
    - name: Scan for OOBE Blockers
      shell: powershell
      run: |
        Write-Host "Scanning for active OOBE, CloudExperienceHost, or Privacy Consent windows..."
        
        # Check for known OOBE and welcome-screen background executables
        $OobeProcesses = Get-Process -Name "CloudExperienceHost*", "wwahost", "ConsentUx" -ErrorAction SilentlyContinue
        
        # Search window titles for common OOBE / Privacy phrases
        $TargetWindows = Get-Process | Where-Object { $_.MainWindowTitle -match "Privacy" -or $_.MainWindowTitle -match "Experience" -or $_.MainWindowTitle -match "OOBE" }

        if ($OobeProcesses -or $TargetWindows) {
            Write-Error "CRITICAL: Windows 11 ARM OOBE / Privacy screen detected!"
            
            if ($OobeProcesses) { 
                Write-Host "Blocked by running processes:"
                $OobeProcesses | Select-Object Name, Id, Path | Format-Table 
            }
            if ($TargetWindows) { 
                Write-Host "Blocked by active window titles:"
                $TargetWindows | Select-Object Name, MainWindowTitle | Format-Table 
            }
            
            # Fail the step immediately
            exit 1
        } else {
            Write-Host "SUCCESS: No OOBE block screens detected. Environment clean."
        }
