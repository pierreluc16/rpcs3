name: Check Requirements

on:
  push:
  pull_request:
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  verify-dependencies:
    runs-on: ubuntu-24.04

    steps:
      - name: Check if libicu-dev is installed
        run: |
          if ! dpkg -s libicu-dev >/dev/null 2>&1; then
            echo "Error: libicu-dev is missing!"
            exit 1
          fi
          echo "libicu-dev is installed."
