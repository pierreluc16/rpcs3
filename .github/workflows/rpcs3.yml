name: Windows 11 ARM OOBE Win32 API Verification

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  check-oobe-state:
    name: Execute Low-Level OOBE API Check
    runs-on: windows-11-arm

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      # Step 1: Execute the custom low-level Win32 API OOBE check (Syntax Fixed)
      - name: Execute Native Win32 OOBE Detection Script
        id: win32_oobe_check
        continue-on-error: true
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          
          # Define the C# signature to access kernel32.dll natively
          $TypeDef = @"
          using System;
          using System.Runtime.InteropServices;
          namespace Win32API {
              public class OobeCheck {
                  [DllImport("kernel32.dll", CharSet = CharSet.Auto, SetLastError = true)]
                  public static extern int OOBEComplete(ref int bIsOOBEComplete);
              }
          }
          "@

          Write-Host "Compiling Win32 C# type definition..."
          Add-Type -TypeDefinition $TypeDef -Language CSharp

          $IsOOBEComplete = 0
          Write-Host "Querying system OOBE state via Kernel32 API..."
          
          # FIXED SYNTAX: Changed from [Win32API::OobeCheck]::OOBEComplete to [Win32API.OobeCheck]::OOBEComplete
          $Result = [Win32API.OobeCheck]::OOBEComplete([ref]$IsOOBEComplete)

          # Evaluate API flag response
          if ($IsOOBEComplete -eq 0) {
              Write-Host "[DETECTED] Windows is currently inside the OOBE phase."
              exit 0
          } else {
              Write-Host "[NOT DETECTED] OOBE is already complete. System is at standard desktop."
              exit 1
          }

      # Step 2: Evaluate the outcome and trigger a critical failure if stuck
      - name: Process OOBE Detection Telemetry
        shell: powershell
        run: |
          # Evaluate the boolean status of the preceding Win32 step
          $IsOobeTrapped = ("${{ steps.win32_oobe_check.outcome }}" -eq "success")

          if ($IsOobeTrapped) {
              Write-Output "::error::[CRITICAL FAILURE] OOBE state validation failed. The Windows 11 ARM system did not reach the desktop."
              exit 1
          }

          Write-Output "[OOBE VALIDATED] Clean deployment confirmed. The system is ready."
          exit 0
