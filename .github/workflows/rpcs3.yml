name: Build and Test Ubuntu 26.04 Image with Podman 6.0.1

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  podman-build:
    runs-on: ubuntu-26.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Podman Core Dependencies
        run: |
          sudo apt-get update
          # Mandatory Linux network and runtime mapping engines
          sudo apt-get install -y uidmap fuse-overlayfs iptables

      - name: Fetch and Deploy Explicit Podman 6.0.1 Binary
        run: |
          echo "=== Pulling Official Release Archive ==="
          # Directly downloads the exact v6.0.1 remote release asset from the source project
          curl -fsSL https://github.com -o podman.tar.gz
          
          echo "=== Extracting Client Binaries ==="
          tar -xzf podman.tar.gz
          
          echo "=== Deploying Executable onto Host System Path ==="
          # Moves and transforms the binary cleanly into the primary path to satisfy AppArmor constraints
          sudo mv bin/podman-remote-static-linux_amd64 /usr/bin/podman
          sudo chmod +x /usr/bin/podman
          
          echo "=== Cleaning Up Environment ==="
          rm -rf bin podman.tar.gz

      - name: Configure Rootless User Namespaces
        run: |
          echo "=== Configuring Kernel Security for Rootless Execution ==="
          sudo sysctl -w kernel.unprivileged_userns_clone=1
          
          # Initialize directory trees for unprivileged workflow tasks
          mkdir -p /home/runner/.local/share/containers/storage
          mkdir -p /home/runner/.config/containers

      - name: Verify Exact Version Target
        run: |
          podman --version

      - name: Create Containerfile
        run: |
          cat <<EOF > Containerfile
          # Fully qualified name registry matching enforcement is required on Ubuntu 26.04
          FROM docker.io/library/ubuntu:26.04
          
          RUN apt-get update && apt-get install -y \
              curl \
              ca-certificates \
              && rm -rf /var/lib/apt/lists/*
              
          CMD ["echo", "Hello from Ubuntu 26.04 inside working Podman 6.0.1!"]
          EOF

      - name: Build image with Podman 6.0.1
        run: |
          podman build --add-host=host.docker.internal:127.0.0.1 -t my-ubuntu-app:26.04 -f Containerfile .

      - name: Test the built image
        run: |
          podman run --rm my-ubuntu-app:26.04
