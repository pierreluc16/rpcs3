name: LLVM Audit - ARM vs Intel Percentage Scan

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  audit-llvm:
    runs-on: windows-11-arm

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Scan LLVM Installation (ARM vs Intel)
      shell: pwsh
      run: |
        $llvmPath = "C:\Program Files\LLVM"
        
        if (-not (Test-Path $llvmPath)) {
            Write-Error "The LLVM installation directory was not found at: $llvmPath"
            exit 1
        }
        
        Write-Host "🔍 Initiating deep architectural scanning on components inside: $llvmPath"
        $files = Get-ChildItem -Path $llvmPath -Recurse -Include *.exe, *.dll
        
        $arm64Count  = 0
        $intel64Count = 0  # x86_64 / AMD64
        $intel32Count = 0  # x86 / i386
        $otherCount   = 0
        $totalFiles   = 0
        
        $componentList = @()

        foreach ($file in $files) {
            try {
                $stream = New-Object System.IO.FileStream($file.FullName, [System.IO.FileMode]::Open, [System.IO.FileAccess]::Read, [System.IO.FileShare]::Read)
                $reader = New-Object System.IO.BinaryReader($stream)
                
                # Check DOS Header magic number (MZ)
                $mz = $reader.ReadBytes(2)
                if ($mz -ne 0x4D -or $mz -ne 0x5A) { $reader.Close(); $stream.Close(); continue }
                
                # Seek to PE header offset (stored at address 0x3C)
                $stream.Seek(0x3C, [System.IO.SeekOrigin]::Begin)
                $peOffset = $reader.ReadUInt32()
                
                # Seek to Machine field in COFF File Header (PE offset + 4 bytes)
                $stream.Seek(($peOffset + 4), [System.IO.SeekOrigin]::Begin)
                $machineType = $reader.ReadUInt16()
                
                $reader.Close()
                $stream.Close()
                $totalFiles++
                
                # Identify Machine Type Architectures
                # 0xAA64 = Native ARM64
                # 0x8664 = Emulated Intel x86_64 / AMD64
                # 0x014c = Emulated Intel x86 32-bit
                $archLabel = "Unknown"
                $family = "Other"

                if ($machineType -eq 0xAA64) {
                    $arm64Count++
                    $archLabel = "ARM64 (Native)"
                    $family = "ARM"
                } elseif ($machineType -eq 0x8664) {
                    $intel64Count++
                    $archLabel = "x86_64 (64-bit Intel Emulated)"
                    $family = "Intel"
                } elseif ($machineType -eq 0x014c) {
                    $intel32Count++
                    $archLabel = "x86 (32-bit Intel Emulated)"
                    $family = "Intel"
                } else {
                    $otherCount++
                    $archLabel = "Other (0x{0:X4})" -f $machineType
                    $family = "Other"
                }

                # Capture component metrics object
                $componentList += [PSCustomObject]@{
                    FileName     = $file.Name
                    Family       = $family
                    Architecture = $archLabel
                    RelativePath = $file.FullName.Replace($llvmPath, "")
                }
            } catch {
                # Safe skip for locked files
            }
        }

        if ($totalFiles -eq 0) {
            Write-Error "No valid binaries found to audit inside $llvmPath."
            exit 1
        }

        # Mathematical Percentage Math Evaluation
        $armPercentage   = [Math]::Round(($arm64Count / $totalFiles) * 100, 2)
        $intelPercentage = [Math]::Round((($intel64Count + $intel32Count) / $totalFiles) * 100, 2)
        $otherPercentage = [Math]::Round(($otherCount / $totalFiles) * 100, 2)

        # 1. Standard Terminal Output Logging Summary
        Write-Host "`n=========================================================="
        Write-Host "📊 COMPOSITION SUMMARY REPORT: ARM vs INTEL"
        Write-Host "=========================================================="
        Write-Host "• Native ARM64 Binaries : $arm64Count"
        Write-Host "• Emulated Intel Binaries: $($intel64Count + $intel32Count) ($intel64Count x64 / $intel32Count x86)"
        Write-Host "• Total Validated Files : $totalFiles"
        Write-Host "----------------------------------------------------------"
        Write-Host "➔ TOTAL NATIVE ARM CONCENTRATION  : $armPercentage %"
        Write-Host "➔ TOTAL EMULATED INTEL EFFICIENCY : $intelPercentage %"
        Write-Host "==========================================================`n"

        # Output complete sorted inventory to the workflow terminal log
        $componentList | Sort-Object Family, FileName | Format-Table -Property FileName, Architecture, RelativePath -AutoSize

        # 2. Rich Markdown Generation for the GitHub Run Summary UI Page
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### 📊 Composition Breakdown: ARM vs Intel (LLVM)"
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Architecture | Quantity | Percentage |"
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| :--- | :--- | :--- |"
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| 🟩 **Native ARM64** | $arm64Count | **$armPercentage %** |"
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| 🟦 **Emulated Intel (x86/x64)** | $($intel64Count + $intel32Count) | **$intelPercentage %** |"
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| 🟨 Other | $otherCount | $otherPercentage % |"
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| **Total** | **$totalFiles** | **100 %** |"
        
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### 📂 Detailed Inventory of Non-ARM64 / Emulated Components"
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| File Name | Detected Architecture | Relative Path |"
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| :--- | :--- | :--- |"
        
        $nonArmFiles = $componentList | Where-Object { $_.Family -ne "ARM" } | Sort-Object FileName
        if ($nonArmFiles.Count -gt 0) {
            foreach ($item in $nonArmFiles) {
                Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| \`$($item.FileName)\` | $($item.Architecture) | \`$($item.RelativePath)\` |"
            }
        } else {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| *None* | *All components inside this directory are 100% Native ARM64* | *N/A* |"
        }
