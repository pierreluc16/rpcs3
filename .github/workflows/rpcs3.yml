name: Compile and use latest Podman, Buildah and Skopeo

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build-and-run:
    runs-on: ubuntu-26.04
        
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
 
    - name: Configure Targeted AppArmor Profiles
      run: |
        sudo apt-get update && sudo apt-get install -y apparmor-utils
        sudo cat <<EOF | sudo tee /etc/apparmor.d/custom_containers
        #include <tunables/global>

        profile custom-podman /usr/bin/podman flags=(unconfined) {
          userns,
        }

        profile custom-buildah /usr/local/bin/buildah flags=(unconfined) {
          userns,
        }
        EOF
        sudo systemctl restart apparmor

    - name: Setup Go Environment
      uses: actions/setup-go@v5
      with:
        go-version: 'stable'

    - name: Install Ubuntu 26.04 Build & Runtime Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          golang-github-containers-common \
          btrfs-progs \
          git \
          go-md2man \
          libassuan-dev \
          libbtrfs-dev \
          libc6-dev \
          libdevmapper-dev \
          libglib2.0-dev \
          libgpgme-dev \
          libgpg-error-dev \
          libprotobuf-dev \
          libprotobuf-c-dev \
          libseccomp-dev \
          libselinux1-dev \
          libsystemd-dev \
          pkg-config \
          make \
          runc \
          uidmap \
          conmon \
          netavark \
          containernetworking-plugins \
          fuse-overlayfs

    # --- COMPILE & INSTALL SKOPEO ---
    - name: Clone, Build and Install Skopeo
      run: |
        git clone https://github.com/containers/skopeo.git skopeo
        cd skopeo
        make bin/skopeo
        sudo make install

    # --- COMPILE & INSTALL BUILDAH ---
    - name: Clone, Build and Install Buildah
      run: |
        git clone https://github.com/containers/buildah.git buildah
        cd buildah
        make TAGS="seccomp"
        sudo make install

    # --- COMPILE & INSTALL PODMAN ---
    - name: Clone, Build and Install Podman
      run: |
        git clone https://github.com/containers/podman.git podman
        cd podman
        make BUILDTAGS="seccomp systemd security" PREFIX=/usr
        sudo env PATH=$PATH make install PREFIX=/usr

    # --- CONFIGURE ROOTLESS STORAGE ---
    - name: Configure Rootless Storage
      run: |
        mkdir -p ~/.config/containers
        cat <<EOF > ~/.config/containers/storage.conf
        [storage]
        driver = "overlay"
        [storage.options.overlay]
        mount_program = "/usr/bin/fuse-overlayfs"
        EOF

    # --- PIPELINE INTEGRATION TEST ---
    - name: 'Create Containerfile'
      run: |
        cat <<EOF > Containerfile
        FROM alpine:latest
        RUN apk add --no-cache curl
        ENTRYPOINT ["curl"]
        EOF

    - name: 'Build Image via Compiled Buildah'
      run: | 
        buildah bud --isolation=chroot -t localhost/ubuntu26-test:latest .
        IMAGE_ID=$(buildah images -q localhost/ubuntu26-test:latest)
        echo "BUILT_IMAGE_ID=$IMAGE_ID" >> $GITHUB_ENV

    - name: 'Run & Verify Image via Compiled Podman'
      run: | 
        podman images 
        TARGET_IMAGE="${{ env.BUILT_IMAGE_ID }}"
        [ -z "$TARGET_IMAGE" ] && TARGET_IMAGE="localhost/ubuntu26-test:latest"
        
        podman run --rm --entrypoint echo "$TARGET_IMAGE" "Podman successfully ran rootless container!" 

    - name: 'Test Image Sync via Compiled Skopeo'
      run: |
        skopeo copy docker://alpine:latest oci:local-alpine:latest

    # --- Fail because of v1 format error ---
    - name: 'Fail because of v1 format error'
      
      run: |
        echo 'Error: "/etc/containers/registries.conf": registries.conf must be in v2 format but is in v1'
        exit 1
