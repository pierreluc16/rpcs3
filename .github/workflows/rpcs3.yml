name: Strict OOBE Validation

on: [push, workflow_dispatch]

jobs:
  validate:
    runs-on: windows-11-arm
    steps:
    - name: Scan and Fail on Blocker
      shell: powershell
      run: |
        $blockers = Get-Process | Where-Object { 
          $_.Name -match 'CloudExperienceHost|wwahost|ConsentUx' -or 
          $_.MainWindowTitle -match 'Privacy|Experience|OOBE' 
        }
        if ($blockers) {
          [System.Console]::Error.WriteLine("::error title=CRITICAL SYSTEM BLOCKER DETECTED::Windows 11 OOBE/Privacy dialog is currently freezing the UI automation context.")
          exit 1
        }
        Write-Host "No blocking interfaces found."
