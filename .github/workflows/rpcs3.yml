  demo:
    name: Demo (${{ matrix.runs-on }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        runs-on: ["windows-latest", "windows-11-arm"]
    steps:
    - name: Checkout Local Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Checkout Official Toga Repository
      uses: actions/checkout@v4
      with:
        repository: beeware/toga
        path: toga-upstream

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Dependencies
      shell: pwsh
      run: |
        python -m pip install -U pip
        python -m pip install pythonnet
        
        # Pre-install editable travertino so core and demo can find the exact required dev dependency version
        python -m pip install -e ./toga-upstream/travertino -e ./toga-upstream/core -e ./toga-upstream/demo

    - name: Run test
      run: |
        python -m demo
