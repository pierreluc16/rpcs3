name: Verify Windows ARM64 SDK Tools Missing (#14061)
on:
  workflow_dispatch: # Allows manual pipeline triggering from the GitHub Actions dashboard

jobs:
  verify_environment:
    runs-on: windows-11-arm
    steps:
      - name: 1. System Metadata Dump
        shell: pwsh
        run: |
          Write-Host "=== Runner Host Context ==="
          Write-Host "Processor Architecture: $env:PROCESSOR_ARCHITECTURE"
          Write-Host "OS Version Context:"
          [System.Environment]::OSVersion | Format-List

      - name: 2. Inspect Windows Kits Folder Topology
        shell: pwsh
        run: |
          Write-Host "=== Inspecting Extant Windows SDK Folders ==="
          $sdkPath = "C:\Program Files (x86)\Windows Kits\10\Debuggers"
          if (Test-Path $sdkPath) {
              Get-ChildItem -Path $sdkPath -Recurse -ErrorAction SilentlyContinue | 
              Select-Object FullName, Length
          } else {
              Write-Host "Base Debuggers directory path does not exist: $sdkPath"
          }

      - name: 3. Verify Target Tooling Binary (Reproduce Bug)
        shell: pwsh
        run: |
          # Chromium's vs_toolchain.py explicitly enforces the existence of cdb.exe
          $targetBinary = "C:\Program Files (x86)\Windows Kits\10\Debuggers\arm64\cdb.exe"
          
          Write-Host "=== Scanning target validation endpoint ==="
          Write-Host "Target Path: $targetBinary"
          
          if (Test-Path $targetBinary) {
              Write-Host "SUCCESS: cdb.exe has been found in the system path."
              Write-Host "The GitHub environment image has been updated to remediate this issue."
          } else {
              Write-Host "CRITICAL FAILURE: cdb.exe was not detected in the platform image topology."
              Write-Host "This system configuration replicates Issue #14061."
              
              # Emits the precise terminal exit condition generated by the build engine hooks
              [Console]::Error.WriteLine("You must install Windows 10 SDK version 10.0.26100.0 including the 'Debugging Tools for Windows' feature.")
              [Console]::Error.WriteLine("ERROR at //build/toolchain/win/BUILD.gn:24:3: Script returned non-zero exit code.")
              exit 1
          }
