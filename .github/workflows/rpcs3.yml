name: LLVM Installation ARM Percentage Scan

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  calculate-arm-percentage:
    runs-on: windows-11-arm

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Run Deep Binary Architecture Scan
      shell: pwsh
      run: |
        $llvmPath = "C:\Program Files\LLVM"
        
        if (-not (Test-Path $llvmPath)) {
            Write-Error "LLVM folder not found at default location: $llvmPath"
            exit 1
        }
        
        Write-Host "🔍 Initiating recursive binary analysis on: $llvmPath"
        $files = Get-ChildItem -Path $llvmPath -Recurse -Include *.exe, *.dll
        
        $arm64Count = 0
        $x86_64Count = 0
        $otherCount = 0
        $totalFiles = 0

        foreach ($file in $files) {
            try {
                $stream = New-Object System.IO.FileStream($file.FullName, [System.IO.FileMode]::Open, [System.IO.FileAccess]::Read, [System.IO.FileShare]::Read)
                $reader = New-Object System.IO.BinaryReader($stream)
                
                # Check DOS Header magic number (MZ)
                $mz = $reader.ReadBytes(2)
                if ($mz[0] -ne 0x4D -or $mz[1] -ne 0x5A) {
                    $reader.Close(); $stream.Close(); continue
                }
                
                # Seek to PE header offset (stored at 0x3C)
                $stream.Seek(0x3C, [System.IO.SeekOrigin]::Begin)
                $peOffset = $reader.ReadUInt32()
                
                # Seek to COFF File Header Machine field (PE offset + 4 bytes of PE signature)
                $stream.Seek(($peOffset + 4), [System.IO.SeekOrigin]::Begin)
                $machineType = $reader.ReadUInt16()
                
                $reader.Close()
                $stream.Close()
                
                $totalFiles++
                
                # Identify Machine Type Architectures
                # 0xAA64 = IMAGE_FILE_MACHINE_ARM64
                # 0x8664 = IMAGE_FILE_MACHINE_AMD64 (x86_64)
                if ($machineType -eq 0xAA64) {
                    $arm64Count++
                } elseif ($machineType -eq 0x8664) {
                    $x86_64Count++
                } else {
                    $otherCount++
                }
            }
            catch {
                # Skip files locked by processes or lacking execution privileges
            }
        }

        if ($totalFiles -eq 0) {
            Write-Error "No valid executable or dynamic library targets found to scan."
            exit 1
        }

        # Percentage Math Calculation
        $arm64Percentage = [Math]::Round(($arm64Count / $totalFiles) * 100, 2)
        $emulatedPercentage = [Math]::Round(($x86_64Count / $totalFiles) * 100, 2)

        Write-Host "`n================================================"
        Write-Host "📊 LLVM BINARY COMPOSITION AUDIT REPORT"
        Write-Host "================================================"
        Write-Host "• Native ARM64 Binaries  : $arm64Count files"
        Write-Host "• Emulated x86_64 Binaries: $x86_64Count files"
        Write-Host "• Other Architectures    : $otherCount files"
        Write-Host "• Total Analyzed Binaries: $totalFiles files"
        Write-Host "------------------------------------------------"
        Write-Host "➔ NATIVE ARM64 DISTRIBUTION : $arm64Percentage %"
        Write-Host "➔ EMULATED DISTRIBUTION     : $emulatedPercentage %"
        Write-Host "================================================`n"
