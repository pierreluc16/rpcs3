name: Download and Install US Google Chrome via Firefox Identity

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  install-chrome-arm64:
    runs-on: ubuntu-24.04-arm  # Deploys on a native Linux ARM64 hardware runner
    
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Download US Chrome Landing Page via Firefox Agent
        run: |
          # 1. Base USA portal directory URL forcing explicit English language pathways
          URL="https://google.com"
          
          # 2. Native ARM64 Mozilla Firefox User-Agent identity footprint
          FIREFOX_USER_AGENT="Mozilla/5.0 (X11; Linux aarch64; rv:128.0) Gecko/20100101 Firefox/128.0"
          
          # 3. Download the landing page stream passing explicit US English fallback headers
          wget --user-agent="$FIREFOX_USER_AGENT" \
               --header="Accept-Language: en-US,en;q=0.9" \
               --trust-server-names \
               -O google-chrome-usa-source.html \
               "$URL"

      - name: Configure Secure APT Repository Infrastructure
        run: |
          # Fixes prior crashes by purging any malformed repository configuration files
          sudo rm -f /etc/apt/sources.list.d/google-chrome.list
          
          sudo apt-get update
          sudo apt-get install -y curl gnupg
          
          # Create safe systemic directory path for verification elements
          sudo mkdir -p /usr/share/keyrings
          
          # Securely fetch public keys following redirects and convert to GPG format
          curl -fSsL https://dl.google.com/linux/linux_signing_key.pub | gpg --dearmor | sudo tee /usr/share/keyrings/google-chrome.gpg > /dev/null
          
          # Fixes release error: Maps directly to the official Chrome distribution endpoint
          echo "deb [arch=arm64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list

      - name: Refresh System Index and Install Browser Package
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Verify Installation and Check Chrome Version
        run: |
          # Confirms the stable package runs natively on the ARM architecture layout
          google-chrome --version

      - name: Upload HTML Source to Artifact Storage
        uses: actions/upload-artifact@v4
        with:
          name: chrome-us-web-source
          path: google-chrome-usa-source.html
          retention-days: 7
