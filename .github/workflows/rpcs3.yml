name: Check libicu70 Presence on Ubuntu 24.04

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  detect-dependency:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Detect libicu70
        run: |
          TARGET_PKG="libicu70"
          
          echo "=== [START] DETECTION WORKFLOW FOR UBUNTU 24.04 ==="
          echo "[INFO] Vérification de la présence de $TARGET_PKG..."
          
          if dpkg -s "$TARGET_PKG" >/dev/null 2>&1; then
              VERSION=$(dpkg-query -W -f='${Version}' "$TARGET_PKG")
              echo "[OK] $TARGET_PKG est installé sur le runner (Version : $VERSION)."
              echo "=== [SUCCESS] WORKFLOW PASSED ==="
              exit 0
          else
              echo "[ERREUR] $TARGET_PKG est ABSENT de ce système."
              echo "[NOTE] Ubuntu 24.04 n'intègre que libicu74 par défaut."
              echo "=== [FAILURE] WORKFLOW FAILED ==="
              exit 1
          fi
