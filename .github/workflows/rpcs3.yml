name: Check Clang and LLVM Binaries (Ubuntu 24.04 ARM)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  diagnostic:
    name: Locate Clang Tools Natively
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # --- STEP 1: SEARCH FOR LLVM-CONFIG ---
      - name: Find llvm-config Path
        run: |
          echo "=========================================================="
          echo "        1. SEARCHING FOR LLVM-CONFIG BINARIES             "
          echo "=========================================================="
          
          echo "Checking default system PATH..."
          if command -v llvm-config &> /dev/null; then
            echo "✅ Global binary found at: $(which llvm-config)"
          else
            echo "❌ 'llvm-config' is NOT available in the default system PATH."
          fi
          
          echo ""
          echo "Scanning filesystem for versioned LLVM tools..."
          sudo find /usr -name "llvm-config*" 2>/dev/null || echo "No llvm-config variants found."

      # --- STEP 2: SEARCH FOR LIBCLANG.SO ---
      - name: Find libclang.so Path
        run: |
          echo "=========================================================="
          echo "        2. SEARCHING FOR LIBCLANG SHARED LIBRARIES        "
          echo "=========================================================="
          
          echo "Checking system dynamic linker registry (ldconfig)..."
          if ldconfig -p 2>/dev/null | grep -q "libclang"; then
            echo "✅ Shared libraries registered in cache:"
            ldconfig -p | grep libclang
          else
            echo "❌ No libclang references tracked in ldconfig cache."
          fi
          
          echo ""
          echo "Scanning filesystem for exact or versioned libclang files..."
          sudo find /usr -name "libclang.so*" 2>/dev/null || echo "No libclang.so files found."
