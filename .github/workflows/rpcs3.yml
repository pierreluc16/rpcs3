name: Take Website Screenshot via Mozilla Firefox

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  capture-screenshot:
    runs-on: ubuntu-24.04-arm  # Optimized for ARM64 runners
    
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set Up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright Automation Engine
        run: |
          npm init -y
          npm install playwright

      - name: Install Firefox Browser and System Dependencies
        run: |
          npx playwright install firefox --with-deps

      - name: Execute Automated Screenshot Script
        run: |
          node -e "
          const { firefox } = require('playwright');
          (async () => {
            // Launch headless Mozilla Firefox
            const browser = await firefox.launch();
            const context = await browser.newContext({
              viewport: { width: 1280, height: 800 },
              locale: 'en-US'
            });
            const page = await context.newPage();
            
            // Navigate to the target page and wait for assets to load
            await page.goto('https://www.google.com/chrome/', { waitUntil: 'networkidle' });
            
            // Capture a crisp full-page image file
            await page.screenshot({ path: 'chrome-website-screenshot.png', fullPage: true });
            
            await browser.close();
          })();
          "

      - name: Upload Screenshot to Job Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: google-chrome-page-screenshot
          path: chrome-website-screenshot.png
          retention-days: 7
