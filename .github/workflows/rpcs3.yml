name: System Architecture Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  check-arch:
    runs-on: windows-11-arm

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Check System Architecture
      shell: bash
      env:
        TARGET_PYTHON_DIR: 'C:\hostedtoolcache\windows\Python\3.13.14\x64'
      run: |
        # Inject the forced x64 path to the front of the local PATH environment variable
        export PATH="$TARGET_PYTHON_DIR:$PATH"
        
        echo "=== Direct Absolute Path Execution ==="
        "$TARGET_PYTHON_DIR\python.exe" -c "import platform; print('Python platform.machine():', platform.machine())"
        "$TARGET_PYTHON_DIR\python.exe" -c "import platform; print('Python platform.architecture():', platform.architecture())"
        "$TARGET_PYTHON_DIR\python.exe" -c "import platform; print('Python platform.processor():', platform.processor())"
        
        echo "=== Global Alias Verification ==="
        python -c "import sys; print('Active Executable Path:', sys.executable)"
