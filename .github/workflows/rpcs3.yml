name: System Architecture Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  check-arch:
    # Target the official GitHub Windows 11 ARM64 image
    runs-on: windows-11-arm

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Check System Architecture
      shell: bash
      run: |
        # Explicitly declare paths inside subshell interpolation to prevent falling back to the native host alias
        echo "Python platform.machine(): $("C:\hostedtoolcache\windows\Python\3.13.14\x64\python.exe" -c 'import platform; print(platform.machine())')"
        echo "Python platform.architecture(): $("C:\hostedtoolcache\windows\Python\3.13.14\x64\python.exe" -c 'import platform; print(platform.architecture())')"
        echo "Python platform.processor(): $("C:\hostedtoolcache\windows\Python\3.13.14\x64\python.exe" -c 'import platform; print(platform.processor())')"
