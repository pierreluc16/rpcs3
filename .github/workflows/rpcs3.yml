name: CI Automation Tests on Ubuntu 24.04 ARM64

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  run-tests-on-arm:
    # Targets the official GitHub-hosted Ubuntu 24.04 ARM64 runner
    runs-on: ubuntu-24.04-arm

    steps:
      # 1. Pull the source code from your repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Update packages and install modern 24.04 system dependencies
      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y wget curl xvfb libxi6 libnss3 libgbm1 libasound2t64

      # 3. Download the ARM64 bundle directly from the official Google Chrome server
      # Using curl -L follows redirects from the website down to the raw data stream
      - name: Download from Google Chrome Website
        run: |
          curl -L "
