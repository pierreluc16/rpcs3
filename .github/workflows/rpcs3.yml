name: Download and Install Google Chrome

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  install-chrome-arm64:
    runs-on: ubuntu-24.04-arm  # Deploys on a native Linux ARM64 hardware runner
    
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Clean and Configure Secure APT Repository Pointers
        run: |
          # Clear out old or invalid repository listings to avoid update collision crashes
          sudo rm -f /etc/apt/sources.list.d/google-chrome.list
          
          sudo apt-get update
          sudo apt-get install -y curl gnupg
          
          # Provision safe system verification directory paths
          sudo mkdir -p /usr/share/keyrings
          
          # Fetch public keys cleanly following server redirections and decode to binary GPG format
          curl -fSsL https://google.com | gpg --dearmor | sudo tee /usr/share/keyrings/google-chrome.gpg > /dev/null
          
          # Map repository configurations explicitly to the correct Linux ARM64 target base URL
          echo "deb [arch=arm64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://google.com stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list

      - name: Refresh System Package Indexes and Install Chrome Stable
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Verify Installation and Version Check
        run: |
          # Confirms the execution engine runs natively on the ARM architecture layout
          google-chrome --version
