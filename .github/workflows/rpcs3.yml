name: Windows Desktop Screenshot

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  screenshot-job:
    runs-on: windows-11-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # No applications are opened here; it captures the native background state
      - name: Capture Clean Desktop
        shell: powershell
        run: |
          Add-Type -AssemblyName System.Windows.Forms
          Add-Type -AssemblyName System.Drawing
          
          # Grab primary display boundaries
          $screen = [System.Windows.Forms.Screen]::PrimaryScreen
          $bounds = $screen.Bounds
          
          # Generate empty canvas matching resolution
          $bitmap = New-Object System.Drawing.Bitmap($bounds.Width, $bounds.Height)
          $graphics = [System.Drawing.Graphics]::FromImage($bitmap)
          
          # Snap the background
          $graphics.CopyFromScreen($bounds.X, $bounds.Y, 0, 0, $bounds.Size)
          
          # Export to workspace root
          $bitmap.Save("clean-desktop-screenshot.png", [System.Drawing.Imaging.ImageFormat]::Png)
          
          # Free resources
          $graphics.Dispose()
          $bitmap.Dispose()
          Write-Host "Captured clean desktop environment!"

      - name: Upload Desktop Artifact
        uses: actions/upload-artifact@v4
        with:
          name: raw-desktop-view
          path: clean-desktop-screenshot.png
