name: System Architecture Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  check-arch:
    # Target the official GitHub Windows 11 ARM image
    runs-on: windows-11-arm

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Check System Architecture
      shell: bash
      run: |
        # Call the absolute target path directly inside the print block.
        # This allows Windows Prism Emulation to accurately intercept the x64 binary execution.
        
        echo "Python platform.machine():"
        "C:\hostedtoolcache\windows\Python\3.13.14\x64\python.exe" -c "import platform; print(platform.machine())"
        
        echo "Python platform.architecture():"
        "C:\hostedtoolcache\windows\Python\3.13.14\x64\python.exe" -c "import platform; print(platform.architecture())"
        
        echo "Python platform.processor():"
        "C:\hostedtoolcache\windows\Python\3.13.14\x64\python.exe" -c "import platform; print(platform.processor())"
