name: Check for New Ubuntu Kernel

on:
  push:
    branches:
      - main
  workflow_dispatch:
    # Allows you to trigger the check manually from the GitHub UI

jobs:
  check-kernel:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest package lists from Ubuntu repositories
        run: |
          sudo apt-get update

      - name: Check latest available Azure kernel version
        id: kernel-check
        run: |
          TARGET_PACKAGE="linux-azure"
          
          # Extract the candidate (newest available) version from apt cache
          LATEST_VERSION=$(apt-cache policy $TARGET_PACKAGE | grep "Candidate:" | awk '{print $2}')
          echo "Latest available version for $TARGET_PACKAGE is: $LATEST_VERSION"
          
          # Save the version as an output variable for subsequent steps
          echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Issue with version info
        uses: actions/github-script@v7
        with:
          script: |
            const version = "${{ steps.kernel-check.outputs.latest_version }}";
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📦 Kernel Status: ${version}`,
              body: `The manual kernel check workflow was triggered.\n\n**Target Package:** \`linux-azure\`\n**Latest Candidate Version:** \`${version}\``
            });
