name: Reproduce Windows 11 ARM Headless Issue

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  test-gui-interactivity:
    runs-on: windows-11-arm
    steps:
      - name: 'Dismiss Windows privacy experience (windows-11-arm workaround)'
        # The windows-11-arm image does not suppress the Windows 11 first-logon
        # "Choose privacy settings for your device" screen. It steals foreground on the
        # interactive desktop, blocking NVDA system tests. See:
        # https://github.com
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          
          Write-Host "::group::Applying OOBE & Privacy Registry Keys"
          $oobePath = "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\OOBE"
          $policyOobePath = "HKLM:\SOFTWARE\Policies\Microsoft\Windows\OOBE"
          
          if (!(Test-Path $oobePath)) { New-Item -Path $oobePath -Force | Out-Null }
          if (!(Test-Path $policyOobePath)) { New-Item -Path $policyOobePath -Force | Out-Null }
          
          Set-ItemProperty -Path $oobePath -Name "DisablePrivacyExperience" -Type DWord -Value 1
          Set-ItemProperty -Path $oobePath -Name "PrivacyConsentStatus" -Type DWord -Value 1
          Set-ItemProperty -Path $oobePath -Name "ProtectYourPC" -Type DWord -Value 3
          Set-ItemProperty -Path $oobePath -Name "DisableVoice" -Type DWord -Value 1
          Set-ItemProperty -Path $policyOobePath -Name "DisablePrivacyExperience" -Type DWord -Value 1
          
          Write-Host "OOBE Registry keys applied successfully."
          Write-Host "::endgroup::"
          
          Write-Host "::group::Terminating Active Welcome UI Processes"
          $targets = @('CloudExperienceHostBroker', 'UserOOBEBroker', 'ShellExperienceHost', 'StartMenuExperienceHost')
          $killed = Get-Process -Name $targets -ErrorAction SilentlyContinue
          if ($killed) {
              $killed | ForEach-Object { Write-Host "Stopping process: $($_.ProcessName) (PID $($_.Id))" }
              $killed | Stop-Process -Force -ErrorAction SilentlyContinue
          } else {
              Write-Host "No active OOBE background processes found."
          }
          Start-Sleep -Seconds 3
          Write-Host "::endgroup::"
          
          Write-Host "::group::Verifying and Restoring Windows Explorer"
          $explorer = Get-Process -Name 'explorer' -ErrorAction SilentlyContinue
          if ($explorer) {
              Write-Host "explorer.exe is already running (PID $($explorer.Id -join ', '))."
          } else {
              Write-Host "explorer.exe is missing. Starting desktop interface..."
              Start-Process 'explorer.exe'
              Start-Sleep -Seconds 5
          }
          Write-Host "::endgroup::"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pythonnet clr-loader

      - name: Create and Run Test Script
        shell: pwsh
        run: |
          # 1. Write runtime.json
          @'
          {
            "runtimeOptions": {
              "tfm": "net8.0-windows",
              "frameworks": [
                {
                  "name": "Microsoft.WindowsDesktop.App",
                  "version": "8.0.0"
                }
              ]
            }
          }
          '@ | Out-File -FilePath runtime.json -Encoding utf8
          
          # 2. Write the complete Python reproduction script (FIXED UI Evaluation Logic)
          @'
          import sys
          import time
          from pathlib import Path
          import clr_loader
          from pythonnet import set_runtime
          
          def main():
              print("Initializing .NET Core runtime environment...")
              try:
                  config_path = Path("runtime.json").resolve()
                  rt = clr_loader.get_coreclr(runtime_config=str(config_path))
                  set_runtime(rt)
                  
                  import clr
                  clr.AddReference("System.Windows.Forms")
                  from System.Windows.Forms import Form, Application
                  
                  print("Testing interactive UI context...")
                  test_form = Form()
                  test_form.Text = "CI Interactivity Test Window"
                  
                  # Fix: Display form window frame
                  test_form.Show()
                  
                  # Fix: Explicitly pump Win32 message loop queue to allow window handle activation
                  Application.DoEvents()
                  time.sleep(0.5) 
                  Application.DoEvents()
                  
                  # Fallback check: If ActiveForm is still None, evaluate Form open collection status
                  active_window = Form.ActiveForm
                  opened_forms = Application.OpenForms
                  
                  if active_window is None and opened_forms.Count == 0:
                      print("ERROR: Non-interactive session detected! Desktop UI handle binding failed.")
                      return 1
                      
                  print(f"SUCCESS: Interactive Windows session detected. (ActiveForm bound: {active_window is not None}, Open Count: {opened_forms.Count})")
                  test_form.Close()
                  return 0
              except Exception as e:
                  print(f"Exception encountered during evaluation: {e}")
                  return 1
                  
          if __name__ == "__main__":
              sys.exit(main())
          '@ | Out-File -FilePath demo.py -Encoding utf8
          
          # 3. Run the generated file
          python demo.py
