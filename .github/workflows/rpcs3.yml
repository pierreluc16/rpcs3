name: Build and Test Ubuntu 26.04 Image with Podman

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Enables manual triggering from the GitHub UI

jobs:
  podman-build:
    runs-on: ubuntu-26.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upgrade Podman to Latest Upstream Version
        run: |
          echo "=== Preelevate default tool information ==="
          podman --version || true
          
          echo "=== Updating package indexes ==="
          sudo apt-get update -y
          
          echo "=== Installing Homebrew to fetch newest upstream Podman ==="
          # Homebrew provides the fastest path to cutting-edge Podman lines (e.g. 5.8 / 6.x+) on Ubuntu runners
          NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://githubusercontent.com)"
          
          echo "=== Evaluating Homebrew environment variables ==="
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          
          echo "=== Installing Podman via brew ==="
          brew install podman
          
          # Inject brew's bin path dynamically into subsequent steps of the GitHub runner
          echo "/home/linuxbrew/.linuxbrew/bin" >> $GITHUB_PATH
          
          echo "=== Upgrade completed successfully ==="

      - name: Verify Podman installation
        run: |
          podman --version
          podman info

      - name: Create Containerfile
        run: |
          cat <<EOF > Containerfile
          # Always use the fully qualified registry URL
          FROM docker.io/library/ubuntu:26.04
          
          RUN apt-get update && apt-get install -y \
              curl \
              ca-certificates \
              && rm -rf /var/lib/apt/lists/*
              
          CMD ["echo", "Hello from Ubuntu 26.04 inside Podman!"]
          EOF

      - name: Build image with Podman
        run: |
          podman build -t my-ubuntu-app:26.04 -f Containerfile .

      - name: Test the built image
        run: |
          podman run --rm my-ubuntu-app:26.04
