name: Ubuntu 26.04 Podman CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/ubuntu-app
  IMAGE_TAG: 26.04

jobs:
  build-and-deploy:
    runs-on: ubuntu-26.04 # Natively targets the Ubuntu 26.04 runner
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Registry Authentication
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | podman login ${{ env:REGISTRY }} \
          -u "${{ secrets.DOCKER_USERNAME }}" \
          --password-stdin

    - name: Build Container Image
      run: |
        podman build \
          --pull \
          -t ${{ env:REGISTRY }}/${{ env:IMAGE_NAME }}:${{ env:IMAGE_TAG }} \
          -f Containerfile .

    - name: Execute Security & Unit Tests
      run: |
        # Run test suite inside the newly built Ubuntu 26.04 environment
        podman run --rm ${{ env:REGISTRY }}/${{ env:IMAGE_NAME }}:${{ env:IMAGE_TAG }} apt-get check

    - name: Push Image to Registry
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        podman push ${{ env:REGISTRY }}/${{ env:IMAGE_NAME }}:${{ env:IMAGE_TAG }}
