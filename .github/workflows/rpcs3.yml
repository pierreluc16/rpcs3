name: Build and Test Ubuntu 26.04 Image with Explicit Podman 6.0.1

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  podman-build:
    runs-on: ubuntu-26.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Network & Storage Tooling
        run: |
          sudo apt-get update
          # Native isolation helpers required by any raw Podman core binary
          sudo apt-get install -y uidmap fuse-overlayfs iptables

      - name: Download and Deploy Podman 6.0.1 Binary Group
        run: |
          echo "=== Fetching Verified Upstream Podman 6.0.1 Release Package ==="
          # Pulls the official, complete x86_64 system package release asset
          curl -fsSL -O https://github.com
          
          echo "=== Extracting Core Assets ==="
          tar -xzf podman-v6.0.1.tar.gz
          
          echo "=== Moving Binaries Into System Spaces ==="
          # Places the executable inside /usr/bin to natively comply with OS security rules
          sudo cp -r podman-v6.0.1/usr/* /usr/
          sudo cp -r podman-v6.0.1/etc/* /etc/ || true
          
          echo "=== Setting Permissions ==="
          sudo chmod +x /usr/bin/podman
          
          echo "=== Workspace Cleanup ==="
          rm -rf podman-v6.0.1 podman-v6.0.1.tar.gz

      - name: Configure Rootless User Namespaces
        run: |
          echo "=== Configuring Kernel Security for Rootless Execution ==="
          sudo sysctl -w kernel.unprivileged_userns_clone=1
          
          # Map execution spaces natively to the local virtual workspace runner user
          mkdir -p /home/runner/.local/share/containers/storage
          mkdir -p /home/runner/.config/containers

      - name: Verify Exact Installed Version
        run: |
          podman --version
          podman info

      - name: Create Containerfile
        run: |
          cat <<EOF > Containerfile
          # Fully qualified name registry matching enforcement is required on Ubuntu 26.04
          FROM docker.io/library/ubuntu:26.04
          
          RUN apt-get update && apt-get install -y \
              curl \
              ca-certificates \
              && rm -rf /var/lib/apt/lists/*
              
          CMD ["echo", "Hello from Ubuntu 26.04 inside working Podman 6.0.1!"]
          EOF

      - name: Build image with Podman 6.0.1
        run: |
          podman build -t my-ubuntu-app:26.04 -f Containerfile .

      - name: Test the built image
        run: |
          podman run --rm my-ubuntu-app:26.04
