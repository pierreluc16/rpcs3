name: Test LLVM and Clang Errors From Scratch

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Enables manual launch via the GitHub Actions Web UI
  workflow_dispatch:

jobs:
  run-test-script:
    runs-on: ubuntu-24.04-arm64

    steps:
    - name: Step 1 - Checkout repository code
      uses: actions/checkout@v4

    - name: Step 2 - Execute Script Logic Without Installation
      run: |
        #!/bin/bash

        # Exit immediately if a command exits with a non-zero status, 
        # except for the cargo command which we expect to fail.
        set -e

        echo "=== Step 1: Cleaning Environment Variables ==="
        # Force the error by unsetting any active paths
        unset LLVM_CONFIG_PATH
        unset LIBCLANG_PATH

        echo "=== Step 2: Running Cargo Check ==="
        # Execute cargo check, capture all outputs, and prevent script from crashing
        cargo check > manual_build.log 2>&1 || true

        # Display the output to your terminal screen
        cat manual_build.log

        echo ""
        echo "========================================================"
        echo "=== Step 3: Verifying Error 1 (llvm-config warning) ==="
        echo "========================================================"
        if grep -q "could not execute llvm-config one or more times" manual_build.log && grep -q "error: No such file or directory (os error 2)" manual_build.log; then
            echo "✅ SUCCESS: Missing llvm-config warning detected."
        else
            echo "❌ FAILURE: Expected llvm-config warning not found."
            exit 1
        fi

        echo ""
        echo "========================================================"
        echo "=== Step 4: Verifying Error 2 (unwrap panic)        ==="
        echo "========================================================"
        if grep -q "called Result::unwrap() on an Err value:" manual_build.log && grep -q "couldn't find any valid shared libraries matching" manual_build.log; then
            echo "✅ SUCCESS: Result::unwrap() panic detected."
        else
            echo "❌ FAILURE: Expected libclang shared library panic not found."
            exit 1
        fi

        echo ""
        echo "🎉 Manual test finished: Both errors are confirmed present on this Ubuntu ARM system."
        # Clean up log file
        rm manual_build.log
